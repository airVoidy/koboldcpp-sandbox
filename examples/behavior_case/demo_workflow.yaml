dsl: workflow/v2
let:
  input: >
    написать 4 описания внешности демониц в разных образах
    [проверить, что разные образы, разный цвет глаз,
    разный цвет волос, разные позы,
    в описании должны быть элементы, по которым даже без указания расы понятно, что перед тобой демоница,
    стиль: аниме, должен быть явно указан в описании]
flow:
  - bootstrap:
      in_parallel:
        - analyzer -> $claims:
            prompt: claims($input)
            temperature: 0.1
            max_tokens: 2048
            tag: claims
        - generator -> $answer:
            prompt: $input
            temperature: $settings.temperature
            max_tokens: $settings.max_tokens
            tag: answer
  - parse_claims:
      from: $claims
      export: [$entities, $axioms, $hypotheses]
  - set:
      "@root.answer": $answer
  - analyzer -> $table:
      prompt: table($answer)
      temperature: 0.1
      max_tokens: 2048
      tag: table
  - parse_table:
      from: $table
      into: "@root.entities"
      export: $entity_nodes
  - set:
      "$entity_nodes": enrich_entities($entity_nodes, $answer)
  - "for $entity in $entity_nodes":
      - generator -> $endLineNumber:
          mode: probe_continue
          grammar: |
            root ::= digits term
            digits ::= [0-9] | [0-9][0-9] | [0-9][0-9][0-9]
            term ::= " " | "\n" | "\""
          capture:
            regex: "[0-9]+"
            coerce: int
          stop: [" ", "\n", "\""]
          messages:
            - user: numbered($answer)
            - assistant: |
                <think>
                Разделю текст на блоки.
                Описание "{$entity._title}" начинается со строки
                под номером "{$entity._startNum}" "{$entity._firstLine}"
                и длится до строки под номером "line number:
          max_tokens: 4
          temperature: 0
          tag: trim
      - set:
          "$entity.answer": slice_lines($answer, $entity._startNum, $endLineNumber)
      - generator -> $confirmed:
          mode: probe_continue
          grammar: |
            root ::= digit term
            digit ::= "0" | "1"
            term ::= " " | "\n" | "\""
          capture:
            regex: "[01]"
            coerce: int
          stop: [" ", "\n", "\""]
          messages:
            - user: numbered($answer)
            - assistant: |
                <think>
                Описание "{$entity._title}":
                {$entity.answer}
                ((answer generated) == true) ===
          max_tokens: 2
          temperature: 0
          tag: confirm
  - verify_axioms:
      items: concat($axioms, $hypotheses)
      answer: $answer
      table: $table
      worker: analyzer
      tag: verify
  - "for $entity in $entity_nodes":
      - analyzer -> $style_check:
          mode: probe_continue
          grammar: |
            root ::= digit term
            digit ::= "0" | "1"
            term ::= " " | "\n" | "\""
          capture:
            regex: "[01]"
            coerce: int
          stop: [" ", "\n", "\""]
          messages:
            - user: |
                Описание:
                {$entity.answer}
                Вопрос: Соответствует ли стиль "аниме"?
            - assistant: |
                <think>
                ((стиль аниме) == true) ===
          max_tokens: 2
          temperature: 0
          tag: style_check
      - set:
          "$entity.style_check": $style_check
  - "for $entity in $entity_nodes":
      - analyzer -> $reaction:
          prompt: |
            Evaluate this text. Reply PASS if good, FAIL + reason if not.
            {$entity.answer}
          temperature: 0.2
          max_tokens: 512
          no_think: true
          tag: check
      - set:
          "$entity.reaction": $reaction
          "$entity.reactionStatus": check_status($reaction)
      - comfyui:
          workflow: "C:/Users/vAiry/.lmstudio/models/Z-Image +LoRA.json"
          node: "6"
          field: "text"
          value: $entity.answer
          server: "http://127.0.0.1:8188"
          export: $entity.imageUrl
triggers:
  check:
    - "for $entity in $entity_nodes":
        - analyzer -> $reaction:
            prompt: |
              Evaluate this text. Reply PASS if good, FAIL + reason if not.
              {$entity.answer}
            no_think: true
            tag: check
        - set:
            "$entity.reaction": $reaction
            "$entity.reactionStatus": check_status($reaction)
  generate:
    - "for $entity in $entity_nodes":
        - comfyui:
            workflow: "C:/Users/vAiry/.lmstudio/models/Z-Image +LoRA.json"
            node: "6"
            field: "text"
            value: $entity.answer
            server: "http://127.0.0.1:8188"
            export: $entity.imageUrl
