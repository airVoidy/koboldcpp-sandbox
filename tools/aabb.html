<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AABB</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#0a0a0a; color:#b0b0b0; overflow:hidden; }
#scr {
  position:absolute; inset:0; overflow:hidden;
  font: 13px/1 'Consolas','Courier New',monospace;
  white-space: pre;
  cursor: default;
  user-select: none;
}
#scr span { display:inline; }
.hi { color:#58a6ff; }
.dim { color:#555; }
.br { color:#444; }
.acc { color:#f78166; }
.grn { color:#3fb950; }
.inv { background:#58a6ff; color:#000; }
.cur { background:#333; }
</style>
</head>
<body>
<div id="scr"></div>
<script>
// ══════════════════════════════════════════════════════
// ASCII grid engine — everything is cells in an N×M buffer
// ══════════════════════════════════════════════════════

const CW = 8, CH = 15; // char size in px (monospace)
let COLS, ROWS;
let buf = [];    // [row][col] = { ch, cls }
let boxes = [];  // all AABBs: { id, x, y, w, h, title, content, edit, focused, scroll }
let _bid = 0;
let sel = null;  // selected box id
let drag = null; // { id, ox, oy, mx, my }
let cursor = null; // { id, cx, cy } for edit mode
let editBuf = {}; // id → lines[]
const scr = document.getElementById('scr');

function init() {
  COLS = Math.floor(window.innerWidth / CW);
  ROWS = Math.floor(window.innerHeight / CH);
  buf = [];
  for (let r = 0; r < ROWS; r++) {
    buf[r] = [];
    for (let c = 0; c < COLS; c++) buf[r][c] = { ch: ' ', cls: '' };
  }
}

// ── Buffer ops ──────────────────────────────────────
function put(r, c, ch, cls) {
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    buf[r][c] = { ch: ch || ' ', cls: cls || '' };
  }
}

function putStr(r, c, s, cls, maxW) {
  const lim = maxW !== undefined ? Math.min(s.length, maxW) : s.length;
  for (let i = 0; i < lim; i++) put(r, c + i, s[i], cls);
}

function hLine(r, c, w, cls) {
  put(r, c, '\u250c', cls);
  for (let i = 1; i < w - 1; i++) put(r, c + i, '\u2500', cls);
  put(r, c + w - 1, '\u2510', cls);
}

function bLine(r, c, w, cls) {
  put(r, c, '\u2514', cls);
  for (let i = 1; i < w - 1; i++) put(r, c + i, '\u2500', cls);
  put(r, c + w - 1, '\u2518', cls);
}

function vLines(r, c, w, h, cls) {
  for (let i = 1; i < h - 1; i++) {
    put(r + i, c, '\u2502', cls);
    put(r + i, c + w - 1, '\u2502', cls);
  }
}

// ── Box management ──────────────────────────────────
function addBox(o) {
  const id = _bid++;
  const b = {
    id, x: o.x || 0, y: o.y || 0, w: o.w || 12, h: o.h || 3,
    title: o.title || '', content: o.content || [],
    edit: !!o.edit, click: o.click || null, scroll: 0
  };
  if (b.edit) editBuf[id] = (o.content || ['']).slice();
  boxes.push(b);
  return id;
}

function boxAt(gx, gy) {
  // top-most (last drawn)
  for (let i = boxes.length - 1; i >= 0; i--) {
    const b = boxes[i];
    if (gx >= b.x && gx < b.x + b.w && gy >= b.y && gy < b.y + b.h) return b;
  }
  return null;
}

function canPlace(id, nx, ny) {
  const me = boxes.find(b => b.id === id);
  if (!me) return false;
  // bounds
  if (nx < 0 || ny < 0 || nx + me.w > COLS || ny + me.h > ROWS) return false;
  // collision with other boxes
  for (const b of boxes) {
    if (b.id === id) continue;
    if (nx < b.x + b.w && nx + me.w > b.x && ny < b.y + b.h && ny + me.h > b.y) return false;
  }
  return true;
}

// ── Draw ────────────────────────────────────────────
function draw() {
  // clear
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) buf[r][c] = { ch: ' ', cls: '' };

  // grid dots
  for (let r = 0; r < ROWS; r += 4)
    for (let c = 0; c < COLS; c += 6) put(r, c, '\u00b7', 'dim');

  // draw boxes
  for (const b of boxes) {
    const isSel = sel === b.id;
    const bCls = isSel ? 'hi' : 'br';

    // border
    hLine(b.y, b.x, b.w, bCls);
    bLine(b.y + b.h - 1, b.x, b.w, bCls);
    vLines(b.y, b.x, b.w, b.h, bCls);

    // title bar
    if (b.title) {
      const t = ' ' + b.title.slice(0, b.w - 4) + ' ';
      putStr(b.y, b.x + 1, t, isSel ? 'hi' : '', b.w - 2);
    }

    // content area
    const innerW = b.w - 2;
    const innerH = b.h - 2;
    const lines = b.edit ? (editBuf[b.id] || ['']) : b.content;
    const scrollOff = b.scroll || 0;

    for (let row = 0; row < innerH; row++) {
      const li = row + scrollOff;
      if (li >= lines.length) break;
      const line = lines[li] || '';
      putStr(b.y + 1 + row, b.x + 1, line.slice(0, innerW), '', innerW);
    }

    // cursor for edit mode
    if (b.edit && cursor && cursor.id === b.id) {
      const cr = b.y + 1 + cursor.cy - (b.scroll || 0);
      const cc = b.x + 1 + cursor.cx;
      if (cr > b.y && cr < b.y + b.h - 1 && cc > b.x && cc < b.x + b.w - 1) {
        put(cr, cc, buf[cr][cc].ch || ' ', 'inv');
      }
    }
  }

  // render to DOM
  let html = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = buf[r][c];
      const ch = cell.ch === '<' ? '&lt;' : cell.ch === '>' ? '&gt;' : cell.ch === '&' ? '&amp;' : cell.ch;
      if (cell.cls) html += `<span class="${cell.cls}">${ch}</span>`;
      else html += ch;
    }
    html += '\n';
  }
  scr.innerHTML = html;
}

// ── Mouse ───────────────────────────────────────────
function gPos(e) {
  return { gx: Math.floor(e.clientX / CW), gy: Math.floor(e.clientY / CH) };
}

scr.addEventListener('mousedown', (e) => {
  const { gx, gy } = gPos(e);
  const b = boxAt(gx, gy);

  if (b) {
    sel = b.id;
    // title bar click → start drag
    if (gy === b.y) {
      drag = { id: b.id, ox: b.x, oy: b.y, mx: gx, my: gy };
    }
    // click inside editable → set cursor
    else if (b.edit && gy > b.y && gy < b.y + b.h - 1) {
      cursor = { id: b.id, cx: Math.min(gx - b.x - 1, (editBuf[b.id][(gy - b.y - 1 + (b.scroll||0))] || '').length), cy: gy - b.y - 1 + (b.scroll || 0) };
    }
    // click on clickable
    else if (b.click) {
      b.click(b);
    }
  } else {
    sel = null;
    cursor = null;
  }
  draw();
});

scr.addEventListener('mousemove', (e) => {
  if (!drag) return;
  const { gx, gy } = gPos(e);
  const dx = gx - drag.mx;
  const dy = gy - drag.my;
  const nx = drag.ox + dx;
  const ny = drag.oy + dy;
  if (canPlace(drag.id, nx, ny)) {
    const b = boxes.find(b => b.id === drag.id);
    b.x = nx; b.y = ny;
    draw();
  }
});

scr.addEventListener('mouseup', () => { drag = null; });

// scroll inside box
scr.addEventListener('wheel', (e) => {
  const { gx, gy } = gPos(e);
  const b = boxAt(gx, gy);
  if (!b) return;
  e.preventDefault();
  const lines = b.edit ? (editBuf[b.id] || ['']) : b.content;
  const maxScroll = Math.max(0, lines.length - (b.h - 2));
  b.scroll = Math.max(0, Math.min(maxScroll, (b.scroll || 0) + (e.deltaY > 0 ? 1 : -1)));
  draw();
}, { passive: false });

// ── Keyboard (edit mode) ────────────────────────────
document.addEventListener('keydown', (e) => {
  if (!cursor) return;
  const b = boxes.find(b => b.id === cursor.id);
  if (!b || !b.edit) return;
  const lines = editBuf[b.id];
  const innerW = b.w - 2;

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (cursor.cx > 0) {
      lines[cursor.cy] = lines[cursor.cy].slice(0, cursor.cx - 1) + lines[cursor.cy].slice(cursor.cx);
      cursor.cx--;
    } else if (cursor.cy > 0) {
      cursor.cx = lines[cursor.cy - 1].length;
      lines[cursor.cy - 1] += lines[cursor.cy];
      lines.splice(cursor.cy, 1);
      cursor.cy--;
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (e.shiftKey || lines.length < b.h - 2 + 10) {
      const rest = lines[cursor.cy].slice(cursor.cx);
      lines[cursor.cy] = lines[cursor.cy].slice(0, cursor.cx);
      lines.splice(cursor.cy + 1, 0, rest);
      cursor.cy++;
      cursor.cx = 0;
    }
    // fire send on Enter without shift if single-line
    if (!e.shiftKey && b._onEnter) b._onEnter(b);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (cursor.cx > 0) cursor.cx--;
    else if (cursor.cy > 0) { cursor.cy--; cursor.cx = lines[cursor.cy].length; }
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (cursor.cx < lines[cursor.cy].length) cursor.cx++;
    else if (cursor.cy < lines.length - 1) { cursor.cy++; cursor.cx = 0; }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cursor.cy > 0) { cursor.cy--; cursor.cx = Math.min(cursor.cx, lines[cursor.cy].length); }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cursor.cy < lines.length - 1) { cursor.cy++; cursor.cx = Math.min(cursor.cx, lines[cursor.cy].length); }
  } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    lines[cursor.cy] = lines[cursor.cy].slice(0, cursor.cx) + e.key + lines[cursor.cy].slice(cursor.cx);
    cursor.cx++;
  }

  // auto-scroll to cursor
  const visY = cursor.cy - (b.scroll || 0);
  if (visY < 0) b.scroll = cursor.cy;
  if (visY >= b.h - 2) b.scroll = cursor.cy - (b.h - 3);

  draw();
});

// ── Helpers ─────────────────────────────────────────
function getEdit(id) { return (editBuf[id] || ['']).join('\n'); }
function setEdit(id, s) { editBuf[id] = s.split('\n'); }
function addLine(id, s) {
  const b = boxes.find(b => b.id === id);
  if (!b) return;
  b.content.push(s);
  const maxScroll = Math.max(0, b.content.length - (b.h - 2));
  b.scroll = maxScroll;
  draw();
}

// ════════════════════════════════════════════════════
// Layout
// ════════════════════════════════════════════════════
init();
window.addEventListener('resize', () => { init(); draw(); });

// workers
const wp = addBox({ x:0, y:0, w:30, h:8, title:'Workers' });
boxes.find(b=>b.id===wp).content = [
  '\u25CF 127.0.0.1:5001  gen',
  '\u25CF 192.168.1.15    ana',
  '',
  '  [+ worker]'
];

// title
addBox({ x:31, y:0, w:COLS-31, h:3, title:'AABB Sandbox', content:[''] });

// chat
const chat = addBox({ x:0, y:9, w:COLS, h:ROWS-12, title:'Chat' });

// message input
const msg = addBox({ x:0, y:ROWS-3, w:COLS-10, h:3, title:'message', edit:true, content:[''] });

// send button
const send = addBox({ x:COLS-10, y:ROWS-3, w:10, h:3, title:'send',
  click: () => {
    const t = getEdit(msg).trim();
    if (!t) return;
    setEdit(msg, '');
    cursor = { id: msg, cx: 0, cy: 0 };
    addLine(chat, '> ' + t);
  }
});
boxes.find(b=>b.id===send).content = ['  Send'];

// Enter in message → send
boxes.find(b=>b.id===msg)._onEnter = () => {
  const t = getEdit(msg).trim();
  if (!t) return;
  setEdit(msg, '');
  cursor = { id: msg, cx: 0, cy: 0 };
  addLine(chat, '> ' + t);
};

draw();
</script>
</body>
</html>
