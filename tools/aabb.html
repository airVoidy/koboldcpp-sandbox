<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AABB</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#0a0a0a; color:#b0b0b0; font-family:'Consolas','Courier New',monospace; overflow:hidden; }

#shell { display:flex; height:100%; flex-direction:column; }
#main { display:flex; flex:1; min-height:0; }

/* ── Left: renderer ── */
#scr {
  flex:1; min-width:0;
  font: 13px/15px 'Consolas','Courier New',monospace;
  white-space:pre; cursor:default; user-select:none; overflow:auto;
  padding:2px; outline:none;
}

/* ── Right: DSL editor ── */
#editor {
  width:420px; min-width:200px; border-left:1px solid #222;
  display:flex; flex-direction:column; background:#0d0d0d;
}
#editor header {
  display:flex; align-items:center; justify-content:space-between;
  padding:4px 8px; border-bottom:1px solid #222; font-size:11px; color:#666;
}
#editor header button {
  background:none; border:1px solid #333; color:#888; font:11px/14px monospace;
  padding:2px 8px; cursor:pointer;
}
#editor header button:hover { color:#ccc; border-color:#555; }
#dsl-src {
  flex:1; resize:none; border:none; outline:none;
  background:#0a0a0a; color:#b0b0b0;
  font:12px/16px 'Consolas','Courier New',monospace;
  padding:8px; tab-size:2;
}
#dsl-err { color:#f85149; font-size:11px; padding:4px 8px; min-height:18px; }

/* ── Status bar ── */
#status {
  height:18px; border-top:1px solid #222; padding:0 8px;
  font:11px/18px monospace; color:#555; display:flex; gap:16px;
}
#status .sep { color:#333; }

/* ── Colors ── */
span.h { color:#58a6ff; } span.d { color:#333; } span.b { color:#383838; }
span.g { color:#3fb950; } span.r { color:#f85149; } span.y { color:#d29922; }
span.w { color:#b0b0b0; } span.i { background:#58a6ff; color:#000; }
span.sel { background:#1a3a5c; }
</style>
</head>
<body>
<div id="shell">
  <div id="main">
    <div id="scr" tabindex="0"></div>
    <div id="editor">
      <header>
        <span>DSL</span>
        <div>
          <button id="btn-apply">Apply</button>
          <button id="btn-reset">Reset</button>
        </div>
      </header>
      <textarea id="dsl-src" spellcheck="false"></textarea>
      <div id="dsl-err"></div>
    </div>
  </div>
  <div id="status">
    <span id="st-pos">-</span>
    <span class="sep">|</span>
    <span id="st-inst">-</span>
    <span class="sep">|</span>
    <span id="st-edit">-</span>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// AABB Engine — Step 2: Data + Binds + Interactivity
// ══════════════════════════════════════════════════════

let CW = 8, CH = 15;
let BW = 120, BH = 50;
let G = [];

// Measure real character cell size from the font
function measureCell() {
  const scr = document.getElementById('scr');
  const span = document.createElement('span');
  span.textContent = 'X';
  span.style.font = getComputedStyle(scr).font;
  span.style.whiteSpace = 'pre';
  scr.appendChild(span);
  const r = span.getBoundingClientRect();
  CW = r.width;
  CH = r.height;
  span.remove();
}

// ── Grid primitives ─────────────────────────────────
function clear() {
  G = [];
  for (let r = 0; r < BH; r++) { G[r] = []; for (let c = 0; c < BW; c++) G[r][c] = { ch:' ', cl:'' }; }
}
function put(r, c, ch, cl) { if (r >= 0 && r < BH && c >= 0 && c < BW) G[r][c] = { ch, cl:cl||'' }; }
function str(r, c, s, cl, max) {
  s = String(s || '');
  const n = max != null ? Math.min(s.length, max) : s.length;
  for (let i = 0; i < n; i++) put(r, c+i, s[i], cl);
}
function box(y, x, w, h, cl) {
  if (h < 2 || w < 2) return;
  put(y,x,'┌',cl); put(y,x+w-1,'┐',cl); put(y+h-1,x,'└',cl); put(y+h-1,x+w-1,'┘',cl);
  for (let i=1;i<w-1;i++){put(y,x+i,'─',cl);put(y+h-1,x+i,'─',cl);}
  for (let i=1;i<h-1;i++){put(y+i,x,'│',cl);put(y+i,x+w-1,'│',cl);}
}
function flush() {
  let o = '';
  for (let r = 0; r < BH; r++) {
    for (let c = 0; c < BW; c++) {
      const {ch,cl} = G[r][c];
      const e = ch==='<'?'&lt;':ch==='>'?'&gt;':ch==='&'?'&amp;':ch;
      o += cl ? `<span class="${cl}">${e}</span>` : e;
    }
    o += '\n';
  }
  document.getElementById('scr').innerHTML = o;
}

// ── DSL Parser ──────────────────────────────────────
function parseDSL(text) {
  const s = { layout:[], data:{}, bind:{}, events:[] };
  let cur = null, curEv = null;
  for (const raw of text.split('\n')) {
    const line = raw.replace(/\r$/, '');
    const t = line.trim();
    if (!t || t.startsWith('#')) continue;
    if (t === 'layout:')  { cur='layout'; curEv=null; continue; }
    if (t === 'data:')    { cur='data';   curEv=null; continue; }
    if (t === 'bind:')    { cur='bind';   curEv=null; continue; }
    if (t.startsWith('on ')) { cur='events'; curEv={trigger:t.slice(3).trim().replace(/:$/,''),actions:[]}; s.events.push(curEv); continue; }
    const indent = line.length - line.trimStart().length;
    if (cur==='layout') s.layout.push({indent,line:t});
    else if (cur==='data') { const m=t.match(/^(\w+)(?:\(([^)]*)\))?:\s*(.+)$/); if(m) s.data[m[1]]={args:m[2]||null,def:m[3]}; }
    else if (cur==='bind') { const m=t.match(/^([\w.]+)\s*<-\s*(.+)$/); if(m) s.bind[m[1]]=m[2].trim(); }
    else if (cur==='events'&&curEv) curEv.actions.push(t);
  }
  return s;
}

function parseLayoutLine(line) {
  const m = line.match(/^(\w+)\s+(\w+)\s+\[([^\]]+)\]:?$/);
  if (!m) return null;
  return { type:m[1], name:m[2], rect: m[3].split(',').map(s => { s=s.trim(); return s==='auto'?'auto':parseInt(s); }) };
}

function buildLayoutTree(lines) {
  const root = { children:[] };
  const stack = [{ node:root, indent:-1 }];
  for (const {indent,line} of lines) {
    const p = parseLayoutLine(line);
    if (!p) continue;
    const node = { ...p, children:[] };
    while (stack.length>1 && stack[stack.length-1].indent>=indent) stack.pop();
    stack[stack.length-1].node.children.push(node);
    stack.push({ node, indent });
  }
  return root.children;
}

// ── Data Layer ──────────────────────────────────────
let DS = {};       // dataStore
let DF = {};       // data functions
let storageKeys = {};

function initData(dataDefs) {
  DS = {}; DF = {}; storageKeys = {};
  for (const [name, def] of Object.entries(dataDefs)) {
    if (def.args !== null) {
      DF[name] = def;
    } else {
      // "local <storage_key>" — load from localStorage
      const localM = def.def.match(/^local\s+(\S+)$/);
      if (localM) {
        storageKeys[name] = localM[1];
        try { DS[name] = JSON.parse(localStorage.getItem(localM[1]) || '[]'); } catch(_) { DS[name] = []; }
        continue;
      }
      // "GET <url> -> <storage_key>" — fetch + persist
      const getM = def.def.match(/^GET\s+(\S+)(?:\s*->\s*(\S+))?$/);
      if (getM) {
        const skey = getM[2] || null;
        storageKeys[name] = skey;
        if (skey) {
          try { DS[name] = JSON.parse(localStorage.getItem(skey) || '[]'); } catch(_) { DS[name] = []; }
        } else {
          DS[name] = [];
        }
      }
    }
  }
}

function saveDS(name) {
  if (storageKeys[name]) localStorage.setItem(storageKeys[name], JSON.stringify(DS[name] || []));
}

async function probe(url) {
  try {
    const r = await fetch(url + '/v1/models', { signal: AbortSignal.timeout(3000) });
    return r.ok ? 'ok' : 'fail';
  } catch(_) { return 'fail'; }
}

// ── Bind resolver ───────────────────────────────────
function parseColorMap(mapStr) {
  // "ok=g fail=r ?=y" → { ok:'g', fail:'r', '?':'y' }
  const map = {};
  for (const pair of mapStr.trim().split(/\s+/)) {
    const [k, v] = pair.split('=');
    if (k && v) map[k] = v;
  }
  return map;
}

function resolveBind(expr, item) {
  // split off color map: "... :: ok=g fail=r ?=y"
  let colorMap = null;
  const ccIdx = expr.indexOf('::');
  if (ccIdx !== -1) {
    colorMap = parseColorMap(expr.slice(ccIdx + 2));
    expr = expr.slice(0, ccIdx).trim();
  }

  if (expr.startsWith('"') && expr.endsWith('"')) return { value: expr.slice(1,-1), colorMap };
  const eM = expr.match(/^each\s+data\.(\w+)\s+as\s+(\w+)$/);
  if (eM) return { each: eM[1], as: eM[2], colorMap };
  if (expr.includes('|')) {
    const [field, fn] = expr.split('|').map(s=>s.trim());
    return { field, transform: fn, item, colorMap };
  }
  if (expr.startsWith('item.') && item) return { value: item[expr.slice(5)], colorMap };
  return { value: expr, colorMap };
}

function getBound(binds, path, item) {
  // exact match first
  if (binds[path] !== undefined) return resolveBind(binds[path], item);
  // suffix match: bind key matches end of instance path
  for (const [k, v] of Object.entries(binds)) {
    if (path.endsWith('.'+k) || path.endsWith('.'+k.split('.').pop())) {
      return resolveBind(v, item);
    }
  }
  return null;
}

// find which data field an input is bound to (from DSL bind like "item.role")
function findBoundField(inst) {
  if (!_dsl) return null;
  // search binds for one that targets this instance's name
  for (const [k, v] of Object.entries(_dsl.bind)) {
    if (k.endsWith('.'+inst.name) || k === inst.id) {
      // v should be like "item.role"
      if (v.startsWith('item.')) return v.slice(5);
    }
  }
  return inst.name; // fallback: use the element name as field name
}

// ── Instance Resolution ─────────────────────────────
let instances = []; // { id, type, name, x, y, w, h, value, parentId, item, idx }
let editState = { id:null, buf:'', cur:0 };
let selId = null;

function resolveInstances(tree, binds) {
  instances = [];

  function walk(nodes, px, py, parentPath, item) {
    let autoY = 0;
    for (const node of nodes) {
      let [rx, ry, rw, rh] = node.rect;
      if (ry === 'auto') ry = autoY;
      const ax = px + (rx === 'auto' ? 0 : rx);
      const ay = py + ry;
      const path = parentPath ? parentPath+'.'+node.name : node.name;

      if (node.type === 'template') {
        // check for "each" bind
        const b = getBound(binds, path, null);
        if (b && b.each) {
          const list = DS[b.each] || [];
          list.forEach((dataItem, i) => {
            const iPath = path+'_'+i;
            const iy = ay + i * rh;
            instances.push({ id:iPath, type:'card', name:node.name, x:ax, y:iy, w:rw, h:rh, value:'', parentId:parentPath, item:dataItem, idx:i });
            walk(node.children, ax, iy, iPath, dataItem);
          });
          autoY = ry + list.length * rh;
        } else {
          // static template — single ghost
          if (rh === 'auto') rh = 4;
          instances.push({ id:path, type:'template', name:node.name, x:ax, y:ay, w:rw, h:rh, value:'', parentId:parentPath, item:null });
          walk(node.children, ax, ay, path, null);
          autoY = ry + rh;
        }
        continue;
      }

      if (rh === 'auto') rh = 3;

      // resolve value from binds
      let value = '';
      const b = getBound(binds, path, item);
      if (b) {
        if (b.value !== undefined) value = String(b.value ?? '');
        if (b.transform) value = '?'; // async, resolved later
      }

      instances.push({ id:path, type:node.type, name:node.name, x:ax, y:ay, w:rw, h:rh, value, parentId:parentPath, item, transform:b?.transform, transformField:b?.field });

      if (node.type === 'panel') {
        // panel: render children, measure auto height
        const childAutoY = walk(node.children, ax, ay, path, item);
        // fix panel height if auto
        const inst = instances.find(i => i.id === path);
        if (node.rect[3] === 'auto' && inst) {
          inst.h = Math.max(rh, childAutoY + 1);
        }
        autoY = ry + inst.h;
        continue;
      }

      if (node.children.length) walk(node.children, ax, ay, path, item);
      autoY = ry + rh;
    }
    return autoY;
  }

  walk(tree, 0, 0, '', null);

  // resolve async transforms (probe)
  for (const inst of instances) {
    if (inst.transform && inst.item) {
      const field = inst.transformField;
      let val = '';
      if (field.startsWith('item.') && inst.item) val = inst.item[field.slice(5)] || '';
      probe(val).then(r => { inst.value = r; draw(); });
    }
  }
}

// ── Draw ────────────────────────────────────────────
let _dsl = null;
let _tree = [];

function draw() {
  clear();
  // bg dots
  for (let r = 0; r < BH; r += 4) for (let c = 0; c < BW; c += 4) put(r, c, '·', 'd');

  for (const inst of instances) {
    const { id, type, x, y, w, h, value, name } = inst;
    const isSel = selId === id;
    const bc = isSel ? 'h' : 'b';

    if (type === 'panel' || type === 'card') {
      box(y, x, w, h, bc);
    } else if (type === 'template') {
      box(y, x, w, h, 'd');
      str(y, x+1, ' tpl:'+name+' ', 'd');
    } else if (type === 'label') {
      str(y, x, value || name, 'h', w);
    } else if (type === 'input') {
      const isEditing = editState.id === id;
      if (h >= 3) {
        // boxed input
        box(y, x, w, h, isEditing ? 'h' : bc);
        const ty = y + 1;
        if (isEditing) {
          str(ty, x+1, editState.buf, '', w-2);
          const cc = x + 1 + editState.cur;
          if (cc < x+w-1) put(ty, cc, G[ty]?.[cc]?.ch || ' ', 'i');
        } else {
          str(ty, x+1, value, value ? '' : 'd', w-2);
        }
      } else {
        // inline input (h:1) — no box, just text on the line
        if (isEditing) {
          str(y, x, editState.buf, '', w);
          const cc = x + editState.cur;
          if (cc < x+w) put(y, cc, G[y]?.[cc]?.ch || ' ', 'i');
        } else {
          str(y, x, value, value ? '' : 'd', w);
        }
      }
    } else if (type === 'button') {
      if (h >= 3) {
        box(y, x, w, h, bc);
        str(y+1, x+1, value || name, 'h', w-2);
      } else {
        // inline button (h:1) — just colored text
        str(y, x, value || name, 'h', w);
      }
    } else if (type === 'dot') {
      const cl = value === 'ok' ? 'g' : value === 'fail' ? 'r' : 'y';
      str(y, x, '●', cl);
    } else if (type === 'text') {
      const display = String(value || '').replace(/^https?:\/\//, '');
      str(y, x, display || name, display ? '' : 'd', w);
    }
  }
  flush();
}

// ── Click handling ──────────────────────────────────
const $scr = document.getElementById('scr');

function cell(e) {
  const rect = $scr.getBoundingClientRect();
  const pad = parseFloat(getComputedStyle($scr).paddingLeft) || 0;
  return {
    c: Math.floor((e.clientX - rect.left - pad + $scr.scrollLeft) / CW),
    r: Math.floor((e.clientY - rect.top - pad + $scr.scrollTop) / CH)
  };
}

function instAt(r, c) {
  let found = null;
  for (const inst of instances) {
    const h = Math.max(1, inst.h);
    if (c >= inst.x && c < inst.x + inst.w && r >= inst.y && r < inst.y + h) found = inst;
  }
  return found;
}

// click item context for event actions
let _clickItem = null;

$scr.addEventListener('mousedown', (e) => {
  $scr.focus();
  const {r,c} = cell(e);
  const inst = instAt(r, c);

  // commit any active edit — flush buf into inst.value so read() can pick it up
  if (editState.id) {
    const prev = instances.find(i => i.id === editState.id);
    if (prev) prev.value = editState.buf;
    editState.id = null;
  }

  if (!inst) { selId = null; draw(); return; }

  selId = inst.id;
  _clickItem = inst.item || null;

  if (inst.type === 'button') {
    fireButton(inst);
    draw();
    return;
  }

  if (inst.type === 'input') {
    const curVal = inst.value || (inst.item ? (inst.item.role||'') : '');
    editState = { id: inst.id, buf: curVal, cur: curVal.length };
    draw();
    return;
  }

  draw();
});

// ── Cursor tracking for status bar ──────────────────
$scr.addEventListener('mousemove', (e) => {
  const {r,c} = cell(e);
  document.getElementById('st-pos').textContent = `r:${r} c:${c}`;
  const inst = instAt(r, c);
  document.getElementById('st-inst').textContent = inst ? `${inst.type}:${inst.id} [${inst.x},${inst.y},${inst.w},${inst.h}]` : '-';
});

// ── Keyboard ────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  // only capture when canvas is focused
  if (document.activeElement !== $scr) return;

  if (!editState.id) return;
  if (e.key === 'Escape') { editState.id = null; draw(); return; }
  if (e.key === 'Enter') {
    e.preventDefault();
    const inst = instances.find(i => i.id === editState.id);
    if (inst) {
      // store typed value into instance for read() to pick up
      inst.value = editState.buf;
      // if item-bound input, write back to the bound field
      if (inst.item && inst.transformField) {
        const field = inst.transformField.startsWith('item.') ? inst.transformField.slice(5) : inst.name;
        inst.item[field] = editState.buf;
        for (const [n, v] of Object.entries(DS)) { if (Array.isArray(v) && v.includes(inst.item)) { saveDS(n); break; } }
      } else if (inst.item) {
        // find which field this input is bound to via DSL bind
        const bindField = findBoundField(inst);
        if (bindField) { inst.item[bindField] = editState.buf; }
        for (const [n, v] of Object.entries(DS)) { if (Array.isArray(v) && v.includes(inst.item)) { saveDS(n); break; } }
      }
      // fire on input_name.enter if defined
      const enterTriggers = [inst.id+'.enter', inst.name+'.enter'];
      if (inst.parentId) {
        const parent = instances.find(p => p.id === inst.parentId);
        if (parent) enterTriggers.push(parent.name+'.'+inst.name+'.enter');
      }
      for (const t of enterTriggers) {
        const ev = _dsl?.events.find(e => e.trigger === t);
        if (ev) { for (const a of ev.actions) execAction(a); break; }
      }
    }
    editState.id = null;
    draw();
    return;
  }
  if (e.key === 'Backspace') { e.preventDefault(); if (editState.cur>0) { editState.buf=editState.buf.slice(0,editState.cur-1)+editState.buf.slice(editState.cur); editState.cur--; } draw(); return; }
  if (e.key === 'Delete') { e.preventDefault(); if (editState.cur<editState.buf.length) { editState.buf=editState.buf.slice(0,editState.cur)+editState.buf.slice(editState.cur+1); } draw(); return; }
  if (e.key === 'ArrowLeft') { e.preventDefault(); if (editState.cur>0) editState.cur--; draw(); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); if (editState.cur<editState.buf.length) editState.cur++; draw(); return; }
  if (e.key === 'Home') { e.preventDefault(); editState.cur=0; draw(); return; }
  if (e.key === 'End') { e.preventDefault(); editState.cur=editState.buf.length; draw(); return; }
  if (e.key.length===1 && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    editState.buf = editState.buf.slice(0,editState.cur)+e.key+editState.buf.slice(editState.cur);
    editState.cur++;
    draw();
    return;
  }
});

// ── Events ──────────────────────────────────────────
function fireTrigger(trigger) {
  if (!_dsl) return;
  const ev = _dsl.events.find(e => e.trigger === trigger);
  if (!ev) return;
  for (const action of ev.actions) execAction(action);
}

function fireButton(inst) {
  if (!_dsl) return;
  // build candidate triggers
  const triggers = [
    inst.id + '.click',
    inst.name + '.click',
  ];
  // with parent prefix
  const parent = instances.find(p => p.id === inst.parentId);
  if (parent) {
    triggers.push(parent.name + '.' + inst.name + '.click');
    const gp = instances.find(p => p.id === parent.parentId);
    if (gp) triggers.push(gp.name + '.' + parent.name + '.' + inst.name + '.click');
  }
  // strip index suffixes for template children: workers.card_0.del_btn -> workers.card.del_btn
  const cleaned = triggers.map(t => t.replace(/_\d+\./g, '.'));
  const all = [...new Set([...triggers, ...cleaned])];

  for (const t of all) {
    const ev = _dsl.events.find(e => e.trigger === t);
    if (ev) {
      _clickItem = inst.item || null;
      for (const action of ev.actions) execAction(action);
      return;
    }
  }
}

function execAction(action) {
  // data.X.push { ... }
  const pushM = action.match(/^data\.(\w+)\.push\s*\{(.+)\}$/);
  if (pushM) {
    const list = DS[pushM[1]];
    if (!Array.isArray(list)) return;
    const obj = {};
    pushM[2].split(',').forEach(pair => {
      const [k, ...rest] = pair.split(':');
      const v = rest.join(':').trim();
      if (v.startsWith('read(') && v.endsWith(')')) {
        const ref = v.slice(5,-1);
        // find instance by name suffix
        const inst = instances.find(i => i.id.endsWith(ref) || i.id.endsWith('.'+ref.split('.').pop()));
        // read from active edit buf if still editing, otherwise from committed inst.value
        obj[k.trim()] = inst ? (editState.id === inst.id ? editState.buf : (inst.value || '')) : '';
      } else {
        obj[k.trim()] = v.replace(/"/g, '');
      }
    });
    // don't push if all read() fields are empty
    const hasValue = Object.values(obj).some(v => v !== '');
    if (!hasValue) return;
    list.push(obj);
    saveDS(pushM[1]);
    editState = { id:null, buf:'', cur:0 };
    rebuildAndDraw();
    return;
  }

  // data.X.remove item
  const rmM = action.match(/^data\.(\w+)\.remove\s+item$/);
  if (rmM && _clickItem) {
    const list = DS[rmM[1]];
    if (Array.isArray(list)) {
      const idx = list.indexOf(_clickItem);
      if (idx >= 0) list.splice(idx, 1);
      saveDS(rmM[1]);
      rebuildAndDraw();
    }
    return;
  }

  // clear X
  const clrM = action.match(/^clear\s+([\w.]+)$/);
  if (clrM) {
    editState = { id:null, buf:'', cur:0 };
    return;
  }
}

// ── Rebuild + draw ──────────────────────────────────
function rebuildAndDraw() {
  if (!_dsl || !_tree.length) return;
  resolveInstances(_tree, _dsl.bind);
  draw();
}

// ── Default DSL ─────────────────────────────────────
const DEFAULT_DSL = `# Workers panel
layout:
  panel workers [0,0,32,auto]:
    label title [2,1,10,1]
    input url_input [1,2,25,3]
    button add_btn [26,2,5,3]
    template card [1,auto,30,3]:
      dot status [2,1,1,1]
      text endpoint [4,1,18,1]
      input role [22,1,7,1]
      button del_btn [29,1,2,1]

data:
  worker_list: local reactive_workers
  probe_status(url): GET {url}/v1/models timeout 3s

bind:
  workers.title <- "WORKERS"
  workers.add_btn <- "+"
  workers.card <- each data.worker_list as item
  workers.card.status <- item.url | probe_status
  workers.card.endpoint <- item.url
  workers.card.role <- item.role
  workers.card.del_btn <- "x"

on workers.add_btn.click:
  data.worker_list.push { url: read(workers.url_input), role: "gen" }
  clear workers.url_input

on workers.url_input.enter:
  data.worker_list.push { url: read(workers.url_input), role: "gen" }
  clear workers.url_input

on workers.card.del_btn.click:
  data.worker_list.remove item
`.trim();

// ── UI wiring ───────────────────────────────────────
const $src = document.getElementById('dsl-src');
const $err = document.getElementById('dsl-err');

function apply() {
  $err.textContent = '';
  try {
    _dsl = parseDSL($src.value);
    _tree = buildLayoutTree(_dsl.layout);
    initData(_dsl.data);
    resolveInstances(_tree, _dsl.bind);
    draw();
    document.getElementById('st-edit').textContent = `${instances.length} inst`;
  } catch(e) {
    $err.textContent = e.message;
  }
}

$src.value = localStorage.getItem('aabb_dsl') || DEFAULT_DSL;
document.getElementById('btn-apply').onclick = () => { localStorage.setItem('aabb_dsl', $src.value); apply(); };
document.getElementById('btn-reset').onclick = () => { $src.value = DEFAULT_DSL; localStorage.removeItem('aabb_dsl'); apply(); };
$src.addEventListener('keydown', e => { if (e.key==='Enter'&&e.ctrlKey) { e.preventDefault(); document.getElementById('btn-apply').click(); } });

// ── Boot ────────────────────────────────────────────
measureCell();
apply();

// re-resolve transforms (probes etc.) periodically
setInterval(() => rebuildAndDraw(), 15000);
</script>
