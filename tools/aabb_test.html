<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AABB</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:#0a0a0a; color:#b0b0b0; overflow:hidden; font:12px/1 'Consolas','Courier New',monospace; }
#app { display:flex; height:100%; }

/* ── Tree (left) ────────────────────────────────── */
#tree {
  width:200px; min-width:200px;
  background:#0d0d0d; border-right:1px solid #222;
  overflow-y:auto; padding:6px; font-size:11px;
}
.th { color:#58a6ff; font-size:10px; margin-bottom:4px; }
.tn { padding:1px 2px; cursor:pointer; white-space:nowrap; overflow:hidden; }
.tn:hover { background:#1a1a1a; }
.tn.sel { color:#58a6ff; background:#111828; }
.tn .nm { }
.tn .al { color:#555; font-size:9px; }
.tn .rc { color:#333; font-size:9px; }

/* ── Canvas (center) ────────────────────────────── */
#canvas { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#toolbar { height:28px; display:flex; align-items:center; gap:8px; padding:0 8px; border-bottom:1px solid #222; background:#0d0d0d; font-size:10px; color:#555; }
#toolbar .lbl { color:#58a6ff; }
#toolbar button { background:#161b22; border:1px solid #222; color:#b0b0b0; font:inherit; padding:2px 8px; cursor:pointer; }
#toolbar button:hover { border-color:#58a6ff; }
#toolbar button.active { border-color:#58a6ff; color:#58a6ff; }
#screen-wrap { flex:1; overflow:auto; padding:8px; background:#050508; position:relative; }
#screen { white-space:pre; line-height:15px; user-select:none; cursor:crosshair; display:inline-block; }
#overlay { position:absolute; top:8px; left:8px; pointer-events:none; }
.aabb-ov { position:absolute; border:1px solid rgba(88,166,255,0.3); background:rgba(88,166,255,0.02); pointer-events:none; }
.aabb-ov.sel { border-color:#58a6ff; background:rgba(88,166,255,0.08); }
#command-bar { display:flex; gap:6px; padding:6px 8px; border-top:1px solid #222; background:#0d0d0d; }
#command { flex:1; background:#0a0a0a; border:1px solid #222; color:#b0b0b0; font:inherit; padding:4px 6px; }
#command:focus { border-color:#58a6ff; outline:none; }
#cmd-run { background:#161b22; border:1px solid #222; color:#b0b0b0; font:inherit; padding:4px 10px; cursor:pointer; }
#status { height:20px; padding:2px 8px; font-size:10px; color:#555; border-top:1px solid #1a1a1a; }
.ok { color:#3fb950; }
.err { color:#f85149; }

/* ── Props (right) ──────────────────────────────── */
#props {
  width:280px; min-width:280px;
  background:#0d0d0d; border-left:1px solid #222;
  overflow-y:auto; padding:6px; font-size:10px;
}
.ph { color:#58a6ff; font-size:10px; margin:6px 0 3px; }
.pr { display:flex; gap:4px; padding:1px 0; }
.pr .pk { color:#555; width:50px; text-align:right; flex-shrink:0; }
.pr .pv { color:#b0b0b0; word-break:break-all; }
.tabs { display:flex; gap:4px; margin:6px 0 4px; flex-wrap:wrap; }
.tab { background:#161b22; border:1px solid #222; color:#b0b0b0; padding:2px 6px; cursor:pointer; font:inherit; font-size:9px; }
.tab:hover { border-color:#58a6ff; }
.tab.active { border-color:#58a6ff; color:#58a6ff; }
#editor { width:100%; min-height:200px; background:#0a0a0a; border:1px solid #222; color:#b0b0b0; font:inherit; font-size:10px; padding:4px; resize:vertical; }
#editor:focus { border-color:#58a6ff; outline:none; }
#save-btn { background:#161b22; border:1px solid #222; color:#b0b0b0; font:inherit; padding:3px 10px; cursor:pointer; margin-top:4px; }
</style>
</head>
<body>
<div id="app">
  <div id="tree"></div>
  <div id="canvas">
    <div id="toolbar">
      <span class="lbl">AABB</span>
      <span id="screen-info"></span>
      <span id="sel-info"></span>
      <span style="flex:1"></span>
      <button id="mode-move" class="active">Move</button>
      <button id="mode-resize">Resize</button>
      <button id="mode-create">Create</button>
    </div>
    <div id="screen-wrap">
      <pre id="screen"></pre>
      <div id="overlay"></div>
    </div>
    <div id="command-bar">
      <input id="command" type="text" placeholder="add label: [1,1,10,1] | delete subtree | undo">
      <button id="cmd-run">Run</button>
    </div>
    <div id="status"></div>
  </div>
  <div id="props"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
// AABB client — loads everything from /api/ui-proto2/
// ══════════════════════════════════════════════════════

const API = '/api/ui-proto2';
let S = null; // current state from server
let selectedId = null;
let focusId = null;
let mode = 'move';
let currentTab = 'yaml';
let CW = 8, CH = 15; // char cell px

// ── Fetch ───────────────────────────────────────────
async function load() {
  const params = new URLSearchParams();
  if (selectedId) params.set('selected_id', selectedId);
  if (focusId) params.set('focus_id', focusId);
  const res = await fetch(`${API}/state?${params}`);
  S = await res.json();
  if (!selectedId && S.selected_id) selectedId = S.selected_id;
  if (!focusId && S.focus_id) focusId = S.focus_id;
  render();
}

async function serverAction(endpoint, body) {
  const res = await fetch(`${API}/${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  S = await res.json();
  if (S.selected_id) selectedId = S.selected_id;
  setStatus(S.message || (S.ok ? 'ok' : 'error'), !S.ok);
  render();
}

async function runCommand(cmd) {
  await serverAction('command', { command: cmd, selected_id: selectedId, focus_id: focusId });
}

// ── Render ──────────────────────────────────────────
function render() {
  if (!S) return;
  renderScreen();
  renderOverlay();
  renderTree();
  renderProps();
  document.getElementById('screen-info').textContent = `${S.screen.cols}×${S.screen.rows}`;
  document.getElementById('sel-info').textContent = selectedId ? `sel: ${selectedId}` : '';
}

function renderScreen() {
  const el = document.getElementById('screen');
  el.textContent = (S.render.lines || []).join('\n');
}

function renderOverlay() {
  const ov = document.getElementById('overlay');
  ov.innerHTML = '';
  if (!S.tree) return;
  for (const n of S.tree) {
    const [x, y, w, h] = n.rect;
    const div = document.createElement('div');
    div.className = 'aabb-ov' + (n.id === selectedId ? ' sel' : '');
    div.style.left = (x * CW) + 'px';
    div.style.top = (y * CH) + 'px';
    div.style.width = (w * CW) + 'px';
    div.style.height = (h * CH) + 'px';
    div.dataset.id = n.id;
    ov.appendChild(div);
  }
}

function renderTree() {
  const el = document.getElementById('tree');
  let h = '<div class="th">AABB Tree</div>';
  if (S.tree) {
    for (const n of S.tree) {
      const indent = '\u00a0'.repeat(n.depth * 2);
      const isSel = n.id === selectedId;
      h += `<div class="tn${isSel ? ' sel' : ''}" data-id="${n.id}">`;
      h += `${indent}<span class="nm">${n.name || n.id}</span>`;
      if (n.alias) h += `<span class="al">.${n.alias}</span>`;
      h += `<span class="rc"> [${n.rect.join(',')}]</span>`;
      h += `</div>`;
    }
  }
  el.innerHTML = h;
  el.querySelectorAll('.tn').forEach(tn => {
    tn.addEventListener('click', () => {
      selectedId = tn.dataset.id;
      load();
    });
  });
}

function renderProps() {
  const el = document.getElementById('props');
  if (!S.selected) { el.innerHTML = '<div class="ph">Properties</div><div style="color:#333">No selection</div>'; return; }
  const s = S.selected;

  let h = '<div class="ph">Selected</div>';
  h += `<div class="pr"><span class="pk">id:</span><span class="pv">${s.id}</span></div>`;
  h += `<div class="pr"><span class="pk">name:</span><span class="pv">${s.name || ''}</span></div>`;
  h += `<div class="pr"><span class="pk">alias:</span><span class="pv">${s.alias || ''}</span></div>`;
  h += `<div class="pr"><span class="pk">rect:</span><span class="pv">[${(s.rect||[]).join(', ')}]</span></div>`;

  // Tabs
  h += '<div class="tabs">';
  for (const [key, label] of [['yaml','Node YAML'],['json','Node JSON'],['base','Base.txt'],['base_json','Base.json'],['events','events.dsl']]) {
    h += `<div class="tab${currentTab === key ? ' active' : ''}" data-tab="${key}">${label}</div>`;
  }
  h += '</div>';

  // Editor content
  let content = '';
  if (currentTab === 'yaml') content = s.yaml || '';
  else if (currentTab === 'json') content = typeof s.json === 'string' ? s.json : JSON.stringify(s.json, null, 2);
  else if (currentTab === 'base') content = S.layers?.base || '';
  else if (currentTab === 'base_json') content = typeof S.layers?.base_json === 'string' ? S.layers.base_json : JSON.stringify(S.layers?.base_json, null, 2);
  else if (currentTab === 'events') content = S.layers?.events_dsl || '';

  h += `<textarea id="editor">${esc(content)}</textarea>`;
  h += '<button id="save-btn">Save</button>';

  // Diff
  if (S.latest_diff && S.latest_diff.length) {
    h += '<div class="ph">Latest Diff</div>';
    h += `<div style="font-size:9px;color:#444;white-space:pre-wrap;">${esc(JSON.stringify(S.latest_diff, null, 2))}</div>`;
  }

  el.innerHTML = h;

  // Wire tabs
  el.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      currentTab = tab.dataset.tab;
      renderProps();
    });
  });

  // Wire save
  const saveBtn = document.getElementById('save-btn');
  if (saveBtn) {
    saveBtn.addEventListener('click', async () => {
      const text = document.getElementById('editor').value;
      if (currentTab === 'yaml') {
        await serverAction('node/save', { node_id: selectedId, yaml_text: text, focus_id: focusId });
      } else if (currentTab === 'base' || currentTab === 'events' || currentTab === 'base_json') {
        const files = {};
        if (currentTab === 'base') files.base = text;
        else if (currentTab === 'events') files.events_dsl = text;
        else if (currentTab === 'base_json') files.base_json = text;
        await serverAction('files/save', { files, focus_id: focusId, selected_id: selectedId });
      }
    });
  }
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function setStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : 'ok';
}

// ── Mouse: click on canvas → select ─────────────────
function cellFromEvent(e) {
  const wrap = document.getElementById('screen-wrap');
  const scr = document.getElementById('screen');
  const rect = scr.getBoundingClientRect();
  // Measure actual cell size from rendered pre
  const actualCW = rect.width / Math.max(1, S.screen.cols);
  const actualCH = rect.height / Math.max(1, S.screen.rows);
  CW = actualCW; CH = actualCH;
  return {
    x: Math.floor((e.clientX - rect.left) / actualCW),
    y: Math.floor((e.clientY - rect.top) / actualCH)
  };
}

let dragStart = null;

document.getElementById('screen-wrap').addEventListener('mousedown', async (e) => {
  const cell = cellFromEvent(e);
  if (mode === 'move' || mode === 'resize') {
    // select via server (picks deepest AABB at cell)
    await serverAction('select', { x: cell.x, y: cell.y, selected_id: selectedId, focus_id: focusId });
    if (mode === 'move' && selectedId) {
      dragStart = { x: cell.x, y: cell.y, origRect: S.selected?.rect?.slice() };
    }
  } else if (mode === 'create') {
    dragStart = { x: cell.x, y: cell.y };
  }
});

document.addEventListener('mousemove', (e) => {
  if (!dragStart) return;
  // visual feedback only — actual move on mouseup
});

document.addEventListener('mouseup', async (e) => {
  if (!dragStart) return;
  const cell = cellFromEvent(e);
  const dx = cell.x - dragStart.x;
  const dy = cell.y - dragStart.y;

  if (mode === 'move' && selectedId && dragStart.origRect && (dx !== 0 || dy !== 0)) {
    const [ox, oy, ow, oh] = dragStart.origRect;
    await serverAction('gui-action', {
      action: 'move',
      selected_id: selectedId,
      focus_id: focusId,
      rect: [ox + dx, oy + dy, ow, oh]
    });
  } else if (mode === 'resize' && selectedId && dragStart.origRect && (dx !== 0 || dy !== 0)) {
    const [ox, oy, ow, oh] = dragStart.origRect;
    await serverAction('gui-action', {
      action: 'resize',
      selected_id: selectedId,
      focus_id: focusId,
      rect: [ox, oy, ow + dx, oh + dy]
    });
  } else if (mode === 'create' && (dx !== 0 || dy !== 0)) {
    const x1 = Math.min(dragStart.x, cell.x);
    const y1 = Math.min(dragStart.y, cell.y);
    const x2 = Math.max(dragStart.x, cell.x);
    const y2 = Math.max(dragStart.y, cell.y);
    await serverAction('gui-action', {
      action: 'create',
      selected_id: selectedId,
      focus_id: focusId,
      rect: [x1, y1, x2 - x1 + 1, y2 - y1 + 1],
      parent_id: selectedId
    });
  }
  dragStart = null;
});

// ── Command bar ─────────────────────────────────────
document.getElementById('cmd-run').addEventListener('click', () => {
  const cmd = document.getElementById('command').value.trim();
  if (cmd) runCommand(cmd);
});
document.getElementById('command').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const cmd = e.target.value.trim();
    if (cmd) runCommand(cmd);
  }
});

// ── Mode buttons ────────────────────────────────────
for (const m of ['move', 'resize', 'create']) {
  document.getElementById(`mode-${m}`).addEventListener('click', () => {
    mode = m;
    document.querySelectorAll('#toolbar button').forEach(b => b.classList.remove('active'));
    document.getElementById(`mode-${m}`).classList.add('active');
  });
}

// ── Init ────────────────────────────────────────────
load();
</script>
</body>
</html>
