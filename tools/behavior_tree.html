// ── Ops Pipeline Renderer ──

function renderOpsPipeline(ops, node, elementIndex) {
  const dslLog = node.meta?._dsl_log || [];

  let html = `<div style="padding:6px 16px;border-top:1px solid var(--border)">
    <div style="color:var(--accent2);font-size:10px;margin-bottom:4px;text-transform:uppercase">Op Pipeline (${ops.length} ops)</div>
    <div class="ops-pipeline">`;

  html += renderOpsRows(ops, dslLog, node, 0);

  html += '</div></div>';
  return html;
}

function renderOpsRows(ops, dslLog, node, depth) {
  let html = '';
  const indent = depth > 0 ? ` nested${depth > 1 ? '-2' : ''}` : '';

  for (let i = 0; i < ops.length; i++) {
    const op = ops[i];
    const opName = op.op || '?';
    const logEntry = dslLog.find(l => l.index === i && l.op === opName) || {};
    const status = logEntry.status || 'pending';
    const icon = getOpIcon(opName);
    const summary = getOpSummary(op, node);

    html += `<div class="op-row${indent}" onclick="toggleOpDetail(this)" title="${escHtml(JSON.stringify(op))}">
      <span class="op-idx">${i + 1}.</span>
      <span class="op-icon">${icon}</span>
      <span class="op-name">${opName}</span>
      <span class="op-summary">${summary}</span>
      <span class="op-status ${status}">${status === 'done' ? '✓' : status === 'error' ? '✗' : status === 'running' ? '▸' : '·'}</span>
    </div>`;

    // Error detail
    if (logEntry.error) {
      html += `<div class="op-detail" style="border-color:var(--red)"><span style="color:var(--red)">Error:</span> ${escHtml(logEntry.error)}</div>`;
    }

    // LLM response preview
    if (logEntry.llm_response) {
      html += `<div class="op-detail" style="display:none">
        <span class="op-badge temp">agent: ${escHtml(logEntry.llm_agent || '?')}</span>
        ${op.temperature ? `<span class="op-badge temp">temp=${op.temperature}</span>` : ''}
        ${op.max_tokens ? `<span class="op-badge maxtok">max=${op.max_tokens}</span>` : ''}
        ${op.no_think ? '<span class="op-badge nothink">no_think</span>' : ''}
        <pre>${escHtml(logEntry.llm_response)}</pre>
      </div>`;
    }

    // Nested ops for branch
    if (opName === 'branch') {
      if (op.then_ops?.length) {
        html += `<div class="op-branch-label"><b>├ then:</b></div>`;
        html += renderOpsRows(op.then_ops, [], node, depth + 1);
      }
      if (op.else_ops?.length) {
        html += `<div class="op-branch-label"><b>└ else:</b></div>`;
        html += renderOpsRows(op.else_ops, [], node, depth + 1);
      }
    }

    // Nested ops for loop
    if (opName === 'loop' && op.body_ops?.length) {
      html += `<div class="op-branch-label"><b>↻ body:</b> (max ${op.max_iterations || 5})</div>`;
      html += renderOpsRows(op.body_ops, [], node, depth + 1);
    }

    // Nested fallback ops
    if (opName === 'llm_call_or_fallback' && op.fallback_ops?.length) {
      html += `<div class="op-branch-label"><b>⚡ fallback:</b></div>`;
      html += renderOpsRows(op.fallback_ops, [], node, depth + 1);
    }
  }
  return html;
}

function getOpIcon(opName) {
  const icons = {
    set: '📝', copy: '📋', increment: '➕', append: '➕', delete: '🗑',
    var: '💠', expand: '📐',
    llm_call: '🤖', llm_call_or_fallback: '🤖',
    evaluate_claims: '✅', check_claims_pass: '🏁',
    truncate_sentences: '✂️', regex_replace: '🔄', strip: '✂️', join: '🔗',
    branch: '🔀', switch: '🔀', set_outcome: '🎯', set_return: '↩️', halt: '⛔', loop: '🔁',
    run_script: '🐍', log: '📌',
  };
  return icons[opName] || '◆';
}

function getOpSummary(op, node) {
  const f = (s) => `<span class="op-field">${escHtml(String(s))}</span>`;
  const v = (s) => `<span class="op-val">${escHtml(String(s)).substring(0, 40)}</span>`;
  const t = (s) => `<span class="op-tpl">${escHtml(String(s)).substring(0, 50)}</span>`;

  switch (op.op) {
    case 'set': return `${f(op.field)} = ${v(op.value)}`;
    case 'copy': return `${f(op.from)} → ${f(op.to)}`;
    case 'increment': return `${f(op.field)} += ${op.delta || 1}`;
    case 'append': return `${f(op.field)} << ${v(op.value)}`;
    case 'delete': return `del ${f(op.field)}`;
    case 'var': {
      const scope = op.scope ? `[${op.scope}]` : '';
      return `${f(op.name)}${scope} = ${op.template ? t(op.template) : v(op.value ?? '')}`;
    }
    case 'expand': return `${t(op.template?.substring(0, 40) || '...')} → ${f(op.output_field || op.output_var || '?')}`;
    case 'llm_call':
    case 'llm_call_or_fallback': {
      let s = `→ ${f(op.output_field || '_output')}`;
      if (op.agent_name) s += ` <span class="op-agent">${op.agent_name}</span>`;
      if (op.temperature) s += ` <span class="op-badge temp">t=${op.temperature}</span>`;
      if (op.max_tokens) s += ` <span class="op-badge maxtok">max=${op.max_tokens}</span>`;
      if (op.no_think) s += ` <span class="op-badge nothink">no_think</span>`;
      if (op.parse) {
        const p = Array.isArray(op.parse) ? op.parse : [op.parse];
        s += ` parse:${p.map(pp => `${pp.mode}→${f(pp.var || '?')}`).join(',')}`;
      }
      return s;
    }
    case 'evaluate_claims': return `scope=${op.scope || 'node'} → ${f(op.failure_field || 'failures')}`;
    case 'check_claims_pass': return `→ ${f(op.status_field || 'audit_status')}`;
    case 'truncate_sentences': return `${f(op.source_field || 'draft_text')} → ${f(op.target_field || 'final_text')}`;
    case 'regex_replace': return `${f(op.field)} s/${t(op.pattern)}/${v(op.replacement || '')}/`;
    case 'strip': return f(op.field);
    case 'join': return `${f(op.field)} → ${f(op.output_field || op.field)} sep="${op.separator || ', '}"`;
    case 'branch': {
      const c = op.condition || {};
      return `${f(c.field || '?')} ${c.test || '?'} ${c.value !== undefined ? v(c.value) : ''}`;
    }
    case 'switch': {
      if (op.field) {
        const cases = Object.entries(op.cases || {}).map(([k,o]) => `${v(k)}→${v(o)}`).join(' ');
        return `${f(op.field)} ${cases} default=${v(op.default || 'next')}`;
      }
      const onCases = (op.on || []).map(c => `${c.condition?.test || '?'}→${v(c.outcome || '?')}`).join(' ');
      return `${onCases} default=${v(op.default || 'next')}`;
    }
    case 'set_outcome': return v(op.outcome || 'next');
    case 'set_return': return op.field ? f(op.field) : v(op.value || '');
    case 'halt': return '';
    case 'loop': {
      const c = op.condition || {};
      return `while ${f(c.field || '?')} ${c.test || '?'} (max ${op.max_iterations || 5})`;
    }
    case 'run_script': return `${f(op.script)} timeout=${op.timeout || 5}s`;
    case 'log': return t(op.message || '');
    default: return JSON.stringify(op).substring(0, 60);
  }
}

function toggleOpDetail(row) {
  const detail = row.nextElementSibling;
  if (detail && detail.classList.contains('op-detail')) {
    detail.style.display = detail.style.display === 'none' ? '' : 'none';
  }
}

// ── Element Flow Editor ──

async function patchNodeElements(nodeId, elements) {
  const headers = { 'Content-Type': 'application/json' };
  const etag = nodeHeaders[nodeId]?.etag;
  if (etag) headers['If-Match'] = etag;
  const res = await fetch(baseUrl() + `/api/behavior/nodes/${nodeId}`, {
    method: 'PATCH', headers,
    body: JSON.stringify({ patch: { elements } }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  await refreshTree();
}

function addElement(nodeId) {
  const node = treeData.nodes[nodeId];
  if (!node) return;
  const id = prompt('Element ID (e.g. verify, draft2):');
  if (!id) return;
  const handler = prompt('Handler name:', 'generate_from_prompt');
  if (!handler) return;

  const transStr = prompt('Transitions JSON (e.g. {"pass":null,"fail":"repair"}):', '{"pass":null}');
  let transitions = {};
  try { transitions = JSON.parse(transStr || '{}'); } catch { }

  const newElements = [...node.elements, { element_id: id, handler, transitions }];
  patchNodeElements(nodeId, newElements).then(() => {
    selectNode(nodeId);
    setUiStatus('ok', `added element: ${id}`);
  }).catch(e => alert('Add element failed: ' + e.message));
}

function editElement(nodeId, index) {
  const node = treeData.nodes[nodeId];
  if (!node) return;
  const el = node.elements[index];
  if (!el) return;

  // Get list of all element IDs in this node (for transition targets)
  const allElIds = node.elements.map(e => e.element_id);
  // Known handlers
  const knownHandlers = [
    'generate_from_prompt', 'generate_description', 'local_check', 'repair_local',
    'compress_description', 'audit_description', 'root_plan', 'run_children',
    'global_check', 'repair_global_conflicts', 'collect_outputs',
  ];

  let transHtml = '';
  const trans = el.transitions || {};
  const outcomes = Object.keys(trans);
  // Always show pass/fail + any custom
  const allOutcomes = new Set(['pass', 'fail', ...outcomes]);
  for (const oc of allOutcomes) {
    const target = trans[oc] ?? '';
    const targetOpts = ['(next)', '(end)', ...allElIds.filter(id => id !== el.element_id)]
      .map(t => {
        const val = t === '(next)' ? '' : (t === '(end)' ? '__end__' : t);
        const sel = (target === '' && t === '(next)') || target === val ? ' selected' : '';
        return `<option value="${escHtml(val)}"${sel}>${escHtml(t)}</option>`;
      }).join('');
    const ocColor = oc === 'pass' ? 'var(--green)' : oc === 'fail' ? 'var(--red)' : 'var(--yellow)';
    transHtml += `<div style="display:flex;gap:6px;align-items:center;margin:3px 0">
      <input type="text" class="el-edit-outcome" value="${escHtml(oc)}" style="width:80px;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:${ocColor};font-size:12px;font-weight:600">
      <span style="color:var(--text-dim)">→</span>
      <select class="el-edit-target" style="padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--accent);font-size:12px">${targetOpts}</select>
      <button class="btn" style="font-size:10px;padding:0 4px;color:var(--red)" onclick="this.closest('div').remove()">✕</button>
    </div>`;
  }

  const handlerOpts = knownHandlers.map(h =>
    `<option value="${h}"${h === el.handler ? ' selected' : ''}>${h}</option>`
  ).join('');

  const modalContent = `
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px;font-size:12px">
      <div style="display:flex;gap:12px;align-items:center">
        <label style="color:var(--text-dim);width:80px">Element ID</label>
        <input type="text" id="elEditId" value="${escHtml(el.element_id)}" style="flex:1;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-weight:600">
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <label style="color:var(--text-dim);width:80px">Handler</label>
        <select id="elEditHandler" style="flex:1;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-size:12px">
          ${handlerOpts}
          <option value="__custom__"${!knownHandlers.includes(el.handler) ? ' selected' : ''}>(custom...)</option>
        </select>
        <input type="text" id="elEditHandlerCustom" value="${escHtml(el.handler)}" style="width:160px;padding:4px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;${knownHandlers.includes(el.handler) ? 'display:none' : ''}">
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <label style="color:var(--text-dim)">Transitions</label>
          <button class="btn" style="font-size:10px;padding:1px 6px" onclick="addTransitionRow()">+ outcome</button>
        </div>
        <div id="elEditTransitions">${transHtml}</div>
      </div>
    </div>`;

  // Use the existing modal
  const modal = document.getElementById('jsonModal');
  const editor = document.getElementById('jsonEditor');
  const title = document.getElementById('jsonModalTitle');
  const tabs = document.getElementById('jsonModalTabs');
  const saveBtn = document.getElementById('jsonSaveBtn');
  const errorEl = document.getElementById('jsonError');
  const readonlyBadge = document.getElementById('jsonReadonly');
  const body = document.querySelector('.modal-body');

  errorEl.classList.remove('visible');
  readonlyBadge.classList.add('hidden');
  title.textContent = `Edit Element: ${el.element_id}`;
  tabs.innerHTML = '';

  // Replace editor with form
  editor.style.display = 'none';
  let formDiv = document.getElementById('elEditForm');
  if (!formDiv) {
    formDiv = document.createElement('div');
    formDiv.id = 'elEditForm';
    formDiv.style.cssText = 'flex:1;overflow-y:auto';
    body.appendChild(formDiv);
  }
  formDiv.innerHTML = modalContent;
  formDiv.style.display = '';

  // Handler select logic
  const handlerSelect = document.getElementById('elEditHandler');
  const handlerCustom = document.getElementById('elEditHandlerCustom');
  handlerSelect.onchange = () => {
    handlerCustom.style.display = handlerSelect.value === '__custom__' ? '' : 'none';
    if (handlerSelect.value !== '__custom__') handlerCustom.value = handlerSelect.value;
  };

  // Save button
  saveBtn.textContent = 'Save Element';
  saveBtn.onclick = () => saveElementEdit(nodeId, index);

  modal.classList.remove('hidden');
}

function addTransitionRow() {
  const container = document.getElementById('elEditTransitions');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:6px;align-items:center;margin:3px 0';
  div.innerHTML = `
    <input type="text" class="el-edit-outcome" value="" placeholder="outcome" style="width:80px;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--yellow);font-size:12px;font-weight:600">
    <span style="color:var(--text-dim)">→</span>
    <input type="text" class="el-edit-target" value="" placeholder="target element" style="width:120px;padding:2px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--accent);font-size:12px">
    <button class="btn" style="font-size:10px;padding:0 4px;color:var(--red)" onclick="this.closest('div').remove()">✕</button>`;
  container.appendChild(div);
}

async function saveElementEdit(nodeId, index) {
  const node = treeData.nodes[nodeId];
  if (!node) return;

  const newId = document.getElementById('elEditId').value.trim();
  const handlerSelect = document.getElementById('elEditHandler');
  const handlerCustom = document.getElementById('elEditHandlerCustom');
  const handler = handlerSelect.value === '__custom__' ? handlerCustom.value.trim() : handlerSelect.value;

  // Collect transitions
  const transitions = {};
  const rows = document.getElementById('elEditTransitions').children;
  for (const row of rows) {
    const outcomeEl = row.querySelector('.el-edit-outcome');
    const targetEl = row.querySelector('.el-edit-target');
    if (!outcomeEl || !targetEl) continue;
    const oc = (outcomeEl.value || outcomeEl.textContent || '').trim();
    if (!oc) continue;
    let target = targetEl.value ?? '';
    if (target === '__end__') target = null;
    else if (target === '') target = null;
    transitions[oc] = target;
  }

  const newElements = [...node.elements];
  newElements[index] = { ...node.elements[index], element_id: newId || node.elements[index].element_id, handler: handler || node.elements[index].handler, transitions };

  try {
    await patchNodeElements(nodeId, newElements);
    closeJsonModal();
    selectNode(nodeId);
    setUiStatus('ok', `updated: ${newId}`);
  } catch (e) {
    const errorEl = document.getElementById('jsonError');
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.classList.add('visible');
  }
}

function moveElement(nodeId, index, direction) {
  const node = treeData.nodes[nodeId];
  if (!node) return;
  const newIndex = index + direction;
  if (newIndex < 0 || newIndex >= node.elements.length) return;

  const newElements = [...node.elements];
  [newElements[index], newElements[newIndex]] = [newElements[newIndex], newElements[index]];
  patchNodeElements(nodeId, newElements).then(() => {
    selectNode(nodeId);
    setUiStatus('ok', 'reordered elements');
  }).catch(e => alert('Move failed: ' + e.message));
}

function removeElement(nodeId, index) {
  const node = treeData.nodes[nodeId];
  if (!node) return;
  const el = node.elements[index];
  if (!confirm(`Удалить элемент "${el.element_id}"?`)) return;

  const newElements = node.elements.filter((_, i) => i !== index);
  patchNodeElements(nodeId, newElements).then(() => {
    selectNode(nodeId);
    setUiStatus('ok', `removed: ${el.element_id}`);
  }).catch(e => alert('Remove failed: ' + e.message));
}

// ── Agent Settings ──
function toggleAgentSettings() {
  const el = document.getElementById('agentSettings');
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

function toggleNamespacePanel() {
  const panel = document.getElementById('namespacePanel');
  if (panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    return;
  }
  renderNamespacePanel();
  panel.classList.add('visible');
}

function renderNamespacePanel() {
  const panel = document.getElementById('namespacePanel');
  let html = '';

  // ── @@ Global Meta ──
  const gm = treeData?.global_meta || {};
  html += '<div class="ns-section"><h4>@@ Global Meta</h4><table class="ns-table">';
  for (const [k, v] of Object.entries(gm)) {
    const val = typeof v === 'string' ? v : JSON.stringify(v);
    html += `<tr><td>@@${k}</td><td style="color:var(--accent3)">${typeof v}</td><td>${escHtml(String(val).substring(0, 120))}</td></tr>`;
  }
  if (!Object.keys(gm).length) html += '<tr><td colspan="3" style="color:var(--text-dim)">(empty)</td></tr>';
  html += '</table></div>';

  // ── Global Claims ──
  const gc = treeData?.global_claims || [];
  if (gc.length) {
    html += '<div class="ns-section"><h4># Global Claims</h4><table class="ns-table">';
    for (const c of gc) {
      const sc = c.status || 'pending';
      const scColor = sc === 'pass' ? 'var(--green)' : sc === 'fail' ? 'var(--red)' : 'var(--text-dim)';
      html += `<tr><td>#${c.claim_id}</td><td>${c.evaluator || '-'}</td><td style="color:${scColor};font-weight:600">${sc.toUpperCase()}</td></tr>`;
    }
    html += '</table></div>';
  }

  // ── @ Selected Node Data ──
  if (selectedNodeId && treeData?.nodes?.[selectedNodeId]) {
    const node = treeData.nodes[selectedNodeId];
    const data = node.data || {};
    html += `<div class="ns-section"><h4>@ Node Data — ${selectedNodeId}</h4><table class="ns-table">`;
    for (const [k, v] of Object.entries(data)) {
      const val = typeof v === 'string' ? v : JSON.stringify(v);
      const display = String(val).length > 80 ? String(val).substring(0, 80) + '…' : val;
      html += `<tr><td>@${k}</td><td style="color:var(--yellow)">${typeof v}</td><td>${escHtml(String(display))}</td></tr>`;
    }
    html += '</table></div>';

    // Node claims
    if (node.claims?.length) {
      html += `<div class="ns-section"><h4># Node Claims — ${selectedNodeId}</h4><table class="ns-table">`;
      for (const c of node.claims) {
        const sc = c.status || 'pending';
        const scColor = sc === 'pass' ? 'var(--green)' : sc === 'fail' ? 'var(--red)' : 'var(--text-dim)';
        html += `<tr><td>#${c.claim_id}</td><td>${c.evaluator || '-'}</td><td style="color:${scColor};font-weight:600">${sc.toUpperCase()}</td></tr>`;
      }
      html += '</table></div>';
    }

    // Node elements
    html += `<div class="ns-section"><h4>Elements — ${selectedNodeId}</h4><table class="ns-table">`;
    for (const el of node.elements || []) {
      const trans = Object.entries(el.transitions || {}).map(([k,v]) => `${k}→${v}`).join(' ') || '—';
      const dslCount = el.handler === '__dsl__' ? ` (${(el.meta?.do || el.meta?.ops || []).length} ops)` : '';
      html += `<tr><td>${el.element_id}</td><td>${el.handler}${dslCount}</td><td>${trans}</td></tr>`;
    }
    html += '</table></div>';
  }

  // ── All Nodes Overview ──
  const nodes = treeData?.nodes || {};
  html += '<div class="ns-section"><h4>All Nodes</h4><table class="ns-table">';
  for (const [nid, node] of Object.entries(nodes)) {
    const dataKeys = Object.keys(node.data || {}).join(', ');
    const claimCount = (node.claims || []).length;
    const elCount = (node.elements || []).length;
    html += `<tr>
      <td style="cursor:pointer;color:var(--accent)" onclick="selectNode('${nid}')">${nid}</td>
      <td>${node.kind || '-'}</td>
      <td>${elCount} els, ${claimCount} claims · ${dataKeys.substring(0, 60)}</td>
    </tr>`;
  }
  html += '</table></div>';

  // ── DSL Namespace Legend ──
  html += `<div class="ns-section"><h4>DSL Namespace Legend</h4>
    <table class="ns-table">
      <tr><td style="color:var(--yellow)">$x</td><td>local</td><td>Локальная переменная шага (временная, не сохраняется)</td></tr>
      <tr><td style="color:var(--yellow)">@x</td><td>node.data</td><td>Поле данных текущей ноды (сохраняется)</td></tr>
      <tr><td style="color:var(--accent3)">@@x</td><td>global_meta</td><td>Глобальные настройки дерева</td></tr>
      <tr><td style="color:var(--accent2)">#x</td><td>claim/ref</td><td>Ссылка на claim или служебное значение</td></tr>
      <tr><td style="color:var(--green)">{$@field}</td><td>template</td><td>Макрос в шаблоне: подставляется значение @field</td></tr>
      <tr><td style="color:var(--green)">{$$$var}</td><td>template</td><td>Макрос: подставляется локальная $var</td></tr>
      <tr><td style="color:var(--green)">{$@@key}</td><td>template</td><td>Макрос: подставляется @@global_meta.key</td></tr>
    </table>
  </div>`;

  panel.innerHTML = html;
}

async function registerAgents() {
  const workerUrl = document.getElementById('workerUrl').value.trim();
  const plannerUrl = document.getElementById('plannerUrl').value.trim();
  const statusEl = document.getElementById('agentStatus');

  try {
    const body = {};
    if (workerUrl) body.small_context_worker = workerUrl;
    if (plannerUrl) body.qwen_27b_planner = plannerUrl;

    const res = await fetch(baseUrl() + '/api/behavior/agents', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    statusEl.textContent = `✓ Registered: ${data.registered.join(', ')}`;
    statusEl.style.color = 'var(--green)';
    setTimeout(() => { statusEl.textContent = ''; }, 3000);

    // Save to localStorage
    localStorage.setItem('bt_workerUrl', workerUrl);
    localStorage.setItem('bt_plannerUrl', plannerUrl);
  } catch (e) {
    statusEl.textContent = `✗ ${e.message}`;
    statusEl.style.color = 'var(--red)';
  }
}

// Restore saved settings
(function restoreSettings() {
  const w = localStorage.getItem('bt_workerUrl');
  const p = localStorage.getItem('bt_plannerUrl');
  if (w) document.getElementById('workerUrl').value = w;
  if (p) document.getElementById('plannerUrl').value = p;
  // Generation settings
  const fields = ['genSentMin','genSentMax','genTemp','genMaxTokens','genLang','creativeAgent'];
  for (const f of fields) {
    const v = localStorage.getItem('bt_' + f);
    if (v != null) {
      const el = document.getElementById(f);
      if (el) el.value = v;
    }
  }
  // Save on change
  for (const f of fields) {
    const el = document.getElementById(f);
    if (el) el.addEventListener('change', () => localStorage.setItem('bt_' + f, el.value));
  }
})();

// Auto-register agents on page load
setTimeout(() => registerAgents(), 500);

// ── Live polling ──
let pollInterval = null;
let lastRevision = null;

async function pollTree() {
  try {
    const res = await fetch(baseUrl() + '/api/behavior/tree');
    if (!res.ok) return;
    const data = await res.json();
    const newRev = data.revision;

    if (newRev !== lastRevision) {
      const prevSelected = selectedNodeId;
      treeData = data;
      lastRevision = newRev;
      setTreeHeadersFromResponse(res);
      Object.values(treeData.nodes || {}).forEach(cacheNodeHeaders);
      document.getElementById('treeId').textContent = treeData.tree_id || '';
      renderTree();
      renderGlobalClaims();
      if (prevSelected && treeData.nodes[prevSelected]) {
        renderNodeDetail(prevSelected);
      }
      // Flash status
      setUiStatus('ok', 'live update');
    }
  } catch { }
}

function startPolling(ms = 2000) {
  stopPolling();
  lastRevision = treeData?.revision ?? null;
  pollInterval = setInterval(pollTree, ms);
}

function stopPolling() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

// Auto-load
refreshTree().then(() => startPolling());
</script>
