function ttsCleanText(text) {
  let t = text.replace(/<think(?:ing)?>[\s\S]*?<\/think(?:ing)?>/gi, '');
  t = t.replace(/<[^>]+>/g, '');
  t = t.replace(/```[\s\S]*?```/g, '');
  t = t.replace(/`[^`]+`/g, '');
  t = t.replace(/[*_~#>]+/g, '');
  t = t.replace(/\s+/g, ' ').trim();
  return t;
}

    if (data.voices.length === 0) {

        opt.value = v.name;
        opt.textContent = v.name + (v.design ? ` (${v.design.slice(0, 40)}...)` : '');

// Resolve TTS settings: per-agent voice overrides global settings
function resolveTtsSettings(agentIdx) {
  const globalBackend = document.getElementById('ttsBackend').value;
  const globalVoice = document.getElementById('ttsVoice').value;
  const globalLang = document.getElementById('ttsLang').value;
  const globalInstruct = document.getElementById('ttsInstruct').value;
  const globalDesign = document.getElementById('ttsVoiceDesign').value;
  const globalUrl = document.getElementById('ttsUrl').value.trim().replace(/\/$/, '');

  // Check per-agent voice override
  let agentVoice = '';
  if (agentIdx !== undefined && agentIdx !== null) {
    const sel = document.querySelector(`[data-agent-voice="${agentIdx}"]`);
    if (sel) agentVoice = sel.value; // format: "backend:voiceName" or ""
  }

  if (!agentVoice) {
    // Use global settings as-is
    return { backend: globalBackend, voice: globalVoice, lang: globalLang,
             instruct: globalInstruct, design: globalDesign, url: globalUrl };
  }

  // Parse "backend:voiceName"
  const colonIdx = agentVoice.indexOf(':');
  const avBackend = agentVoice.substring(0, colonIdx);
  const avVoice = agentVoice.substring(colonIdx + 1);

  if (avBackend === 'kobold') {
    return { backend: 'koboldcpp', voice: avVoice, lang: globalLang,
             instruct: '', design: '', url: globalUrl, savedVoice: '' };
  } else if (avBackend === 'qwen-custom') {
    return { backend: 'qwen-custom', voice: avVoice, lang: globalLang,
             instruct: globalInstruct, design: '', url: globalUrl, savedVoice: '' };
  } else if (avBackend === 'qwen-clone') {
    return { backend: 'qwen-clone', voice: '', lang: globalLang,
             instruct: '', design: '', url: globalUrl, savedVoice: avVoice };
  }

  return { backend: globalBackend, voice: globalVoice, lang: globalLang,
           instruct: globalInstruct, design: globalDesign, url: globalUrl };
}

async function ttsViaKoboldCpp(ttsUrl, cleanText, settings) {
  const resp = await fetch(ttsUrl + '/api/extra/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ input: cleanText, voice: settings.voice }),
  });
  if (!resp.ok) throw new Error(`KoboldCpp TTS error: ${resp.status}`);
  return await resp.blob();
}

async function ttsViaQwenServer(ttsUrl, cleanText, settings) {
  const form = new FormData();
  form.append('text', cleanText);
  form.append('language', settings.lang);

  let endpoint;
  if (settings.backend === 'qwen-custom') {
    endpoint = '/tts/custom';
    form.append('speaker', settings.voice);
    form.append('instruct', settings.instruct || '');
  } else if (settings.backend === 'qwen-design') {
    endpoint = '/tts/design';
    form.append('design', settings.design || 'A natural, clear voice.');
  } else if (settings.backend === 'qwen-clone') {
    endpoint = '/tts/clone';
    const voiceName = settings.savedVoice || document.getElementById('ttsSavedVoice').value;
    if (!voiceName) throw new Error('No saved voice selected');
    form.append('voice_name', voiceName);
  }

  const resp = await fetch(ttsUrl + endpoint, { method: 'POST', body: form });
  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`Qwen TTS error (${resp.status}): ${errText}`);
  }
  return await resp.blob();
}

async function ttsSpeak(text, btn, agentIdx) {
  const settings = resolveTtsSettings(agentIdx);
  if (!settings.url) { setStatus('', 'TTS: no endpoint'); return; }

  const cleanText = ttsCleanText(text);
  if (!cleanText) { setStatus('', 'TTS: empty text'); return; }

  // Stop if already playing
  if (ttsCurrentAudio) {
    ttsCurrentAudio.pause();
    ttsCurrentAudio = null;
    document.querySelectorAll('.msg-action-btn.tts-playing').forEach(b => { b.classList.remove('tts-playing'); b.textContent = 'speak'; });
    setStatus('', 'Idle');
    return;
  }

  if (btn) { btn.classList.add('tts-loading'); btn.textContent = '...'; }
  setStatus('running', 'TTS generating...');

  try {
    let blob;
    if (settings.backend === 'koboldcpp') {
      blob = await ttsViaKoboldCpp(settings.url, cleanText, settings);
    } else {
      blob = await ttsViaQwenServer(settings.url, cleanText, settings);
    }

    const audioUrl = URL.createObjectURL(blob);
    const audio = new Audio(audioUrl);
    ttsCurrentAudio = audio;

    if (btn) { btn.classList.remove('tts-loading'); btn.classList.add('tts-playing'); btn.textContent = 'stop'; }
    setStatus('running', 'TTS playing...');

    audio.onended = () => {
      ttsCurrentAudio = null;
      URL.revokeObjectURL(audioUrl);
      if (btn) { btn.classList.remove('tts-playing'); btn.textContent = 'speak'; }
      setStatus('', 'Idle');
    };

    audio.onerror = () => {
      ttsCurrentAudio = null;
      URL.revokeObjectURL(audioUrl);
      if (btn) { btn.classList.remove('tts-playing', 'tts-loading'); btn.textContent = 'speak'; }
      setStatus('', 'TTS: playback error');
    };

    audio.play();
  } catch (err) {
    console.error('TTS error:', err);
    if (btn) { btn.classList.remove('tts-loading'); btn.textContent = 'speak'; }
    setStatus('', `TTS: ${err.message}`);
  }
}

// --- localStorage persistence ---
const LS_KEY_CFG = 'mac_config';
const LS_KEY_HIST = 'mac_history';

function saveToStorage() {
  if (_loadingFromStorage) return;
  try {
    const cfg = gatherConfig();
    const histJson = JSON.stringify(chatHistory);
    localStorage.setItem(LS_KEY_CFG, JSON.stringify(cfg));
    localStorage.setItem(LS_KEY_HIST, histJson);
  } catch (e) {
    console.error('saveToStorage failed:', e, e.stack);
  }
}

let _loadingFromStorage = false;

function loadFromStorage() {
  _loadingFromStorage = true;

  // Load history FIRST (before config, which triggers saveToStorage via events)
  let savedHistory = null;
  try {
    const histRaw = localStorage.getItem(LS_KEY_HIST);
    if (histRaw) {
      const history = JSON.parse(histRaw);
      if (Array.isArray(history) && history.length > 0) {
        savedHistory = history;
      }
    }
  } catch {}

  let configLoaded = false;
  try {
    const cfgRaw = localStorage.getItem(LS_KEY_CFG);
    if (cfgRaw) {
      const parsed = JSON.parse(cfgRaw);
      if (parsed && parsed.agents && parsed.agents.length > 0) {
        applyConfig(parsed);
        configLoaded = true;
      }
    }
  } catch {}
  if (!configLoaded) {
    initDefaultAgents();
  }
  renderInterceptorDebug();

  // Now restore history after config is applied
  if (savedHistory) {
    chatHistory = savedHistory;
    rebuildChat();
    undoStack = [];
  }

  _loadingFromStorage = false;
}

// Auto-save on every change
const _origAppendMessage = appendMessage;
appendMessage = function(entry) {
  _origAppendMessage(entry);
  saveToStorage();
};

// Save config when top-level sidebar fields change (user nick, shared context, settings)
// Agent-specific fields are handled by createAgentCard()
document.querySelectorAll('#userNick, #sharedContext, #temperature, #maxTokens, #maxRounds, #autoRun, #stripThink, #stripOwnPrevThink, #ttsBackend, #ttsUrl, #ttsVoice, #ttsLang, #ttsInstruct, #ttsAutoSpeak').forEach(el => {
  el.addEventListener('change', saveToStorage);
  el.addEventListener('input', saveToStorage);
});

// Save on clear
const _origClearHandler = btnClear.onclick;
btnClear.addEventListener('click', () => setTimeout(saveToStorage, 50));

// Load on startup
loadFromStorage();

// Load saved voices into per-agent dropdowns
setTimeout(refreshAgentSavedVoices, 2000);

setStatus('', 'Idle');
</script>
