<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Chat</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2129; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f85149; --yellow: #d29922;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font:12px/1.4 'Cascadia Code','Fira Code',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
button { cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; }
button:hover { background:var(--border); }
input, textarea { background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; padding:4px 6px; }
textarea { resize:vertical; }

.top-bar { display:flex; align-items:center; gap:8px; padding:4px 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.top-bar h1 { font-size:14px; font-weight:600; color:var(--accent); }
.spacer { flex:1; }
.btn { padding:4px 10px; }
.btn.sm { padding:2px 6px; font-size:11px; }
.btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }
.btn.danger { background:var(--red); color:#fff; border-color:var(--red); }

.page-tabs { display:flex; gap:0; padding:0 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.page-tab { padding:6px 16px; font-size:12px; font-weight:600; border:none; background:transparent; color:var(--text-dim); border-bottom:2px solid transparent; cursor:pointer; }
.page-tab:hover { color:var(--text); }
.page-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.page { display:none; flex:1; min-height:0; }
.page.active { display:flex; }

/* Main layout — sidebar + content */
.main-layout { flex:1; display:flex; min-height:0; }
.sidebar { width:200px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-hdr { padding:4px 8px; font-size:10px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; }
.sidebar-body { flex:1; overflow-y:auto; padding:4px; }
.channel-item { display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:11px; }
.channel-item:hover { background:var(--surface2); }
.channel-item.active { background:var(--accent); color:#000; }
.channel-item .ch-hash { color:var(--text-dim); font-weight:600; }
.channel-item.active .ch-hash { color:rgba(0,0,0,.5); }
.content-area { flex:1; display:flex; flex-direction:column; min-height:0; }

/* Chat */
.chat-thread { flex:1; overflow-y:auto; padding:8px 12px; }
.chat-msg { margin:6px 0; padding:8px 12px; border-radius:6px; font-size:11px; line-height:1.5; white-space:pre-wrap; word-break:break-word; background:var(--surface); border:1px solid var(--border); }
.chat-msg .msg-hdr { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.chat-msg .msg-id { font-size:9px; color:var(--accent); font-weight:600; }
.chat-msg .msg-kind { font-size:9px; padding:0 3px; border-radius:2px; background:var(--surface2); color:var(--text-dim); }
.chat-msg .msg-ts { font-size:9px; color:var(--text-dim); margin-left:auto; }
.chat-msg .msg-content { }
.chat-input-bar { display:flex; gap:4px; padding:6px 12px; border-top:1px solid var(--border); flex-shrink:0; }
.chat-input-bar textarea { flex:1; min-height:32px; max-height:120px; resize:vertical; font-size:11px; }
.chat-empty { padding:20px; color:var(--text-dim); font-style:italic; text-align:center; }
.channel-label { padding:4px 12px; font-size:11px; color:var(--text-dim); border-bottom:1px solid var(--border); flex-shrink:0; }
.channel-label strong { color:var(--accent); }

/* Nodes tab */
.data-view { flex:1; overflow-y:auto; padding:12px; min-height:0; }
.data-view pre { white-space:pre-wrap; word-break:break-word; font-size:11px; line-height:1.5; color:var(--text); }
.data-view .empty { color:var(--text-dim); font-style:italic; }

.node-list { flex:1; overflow-y:auto; padding:8px; min-height:0; }
.pnode { margin:4px 0; border:1px solid var(--border); border-radius:4px; background:var(--surface); }
.pnode-hdr { display:flex; align-items:center; gap:6px; padding:4px 8px; cursor:pointer; font-size:11px; }
.pnode-hdr:hover { background:var(--surface2); }
.pnode-id { color:var(--accent); font-weight:600; font-size:10px; }
.pnode-kind { font-size:9px; padding:1px 4px; border-radius:3px; background:var(--surface2); color:var(--text-dim); }
.pnode-preview { font-size:11px; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pnode-ts { font-size:9px; color:var(--text-dim); margin-left:auto; }
.pnode-body { display:none; padding:4px 8px 8px; border-top:1px solid var(--border); }
.pnode-body.open { display:block; }
.pnode-body pre { white-space:pre-wrap; word-break:break-word; font-size:10px; line-height:1.4; max-height:300px; overflow-y:auto; }

/* Views editor tab */
.views-layout { flex:1; display:flex; min-height:0; }
.views-sidebar { width:160px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.views-sidebar .sidebar-body { flex:1; overflow-y:auto; padding:4px; }
.view-item { padding:4px 8px; border-radius:3px; cursor:pointer; font-size:11px; }
.view-item:hover { background:var(--surface2); }
.view-item.active { background:var(--accent); color:#000; }
.views-panels { flex:1; display:flex; min-height:0; }
.view-panel { flex:1; display:flex; flex-direction:column; min-height:0; border-right:1px solid var(--border); }
.view-panel:last-child { border-right:none; }
.view-panel-hdr { padding:3px 8px; font-size:10px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); background:var(--surface2); flex-shrink:0; }
.view-panel-body { flex:1; overflow-y:auto; padding:4px; min-height:0; }
.view-panel-body textarea { width:100%; height:100%; border:none; background:transparent; color:var(--text); font:11px/1.4 'Cascadia Code','Fira Code',monospace; resize:none; outline:none; }
.view-panel-body pre { white-space:pre-wrap; word-break:break-word; font-size:10px; line-height:1.4; }
.view-panel-body .preview-frame { padding:8px; }
.view-sample-bar { display:flex; gap:4px; padding:3px 8px; border-bottom:1px solid var(--border); flex-shrink:0; align-items:center; font-size:10px; color:var(--text-dim); }
.view-sample-bar select { font-size:10px; padding:1px 3px; }

/* New channel input */
.new-ch { display:flex; gap:2px; padding:4px; border-top:1px solid var(--border); flex-shrink:0; }
.new-ch input { flex:1; font-size:10px; padding:2px 4px; }

/* Status */
.status-bar { font-size:10px; color:var(--text-dim); padding:2px 12px; border-top:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.status-bar.loading { color:var(--yellow); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Pipeline Chat</h1>
  <span class="spacer"></span>
  <button class="btn sm danger" onclick="resetAll()">Reset</button>
</div>

<div class="page-tabs">
  <button class="page-tab active" data-page="chat">Chat</button>
  <button class="page-tab" data-page="views">Views</button>
  <button class="page-tab" data-page="nodes">Nodes</button>
  <button class="page-tab" data-page="raw">Raw</button>
</div>

<!-- Chat Tab -->
<div class="page active" id="page-chat">
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-hdr">Channels</div>
      <div class="sidebar-body" id="channel-list"></div>
      <div class="new-ch">
        <input id="new-ch-input" placeholder="new channel" onkeydown="if(event.key==='Enter')createChannel()">
        <button class="btn sm" onclick="createChannel()">+</button>
      </div>
    </div>
    <div class="content-area">
      <div class="channel-label" id="channel-label">Select or create a channel</div>
      <div class="chat-thread" id="chat-thread">
        <div class="chat-empty">No channel selected</div>
      </div>
      <div class="chat-input-bar">
        <textarea id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="btn primary" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Views Tab -->
<div class="page" id="page-views">
  <div class="views-layout">
    <div class="views-sidebar">
      <div class="sidebar-hdr">Presets</div>
      <div class="sidebar-body" id="view-preset-list"></div>
    </div>
    <div class="views-panels" id="views-panels">
      <div class="view-panel">
        <div class="view-panel-hdr">Assembly Snippet</div>
        <div class="view-panel-body"><textarea id="view-asm" spellcheck="false" oninput="liveUpdateView()"></textarea></div>
      </div>
      <div class="view-panel">
        <div class="view-panel-hdr">Assembled JSON</div>
        <div class="view-sample-bar">
          Sample: <select id="view-sample-select" onchange="liveUpdateView()"></select>
        </div>
        <div class="view-panel-body"><pre id="view-json"></pre></div>
      </div>
      <div class="view-panel">
        <div class="view-panel-hdr">Rendered HTML</div>
        <div class="view-panel-body"><div id="view-html" class="preview-frame"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Nodes Tab -->
<div class="page" id="page-nodes">
  <div class="node-list" id="node-list"></div>
</div>

<!-- Raw Tab -->
<div class="page" id="page-raw">
  <div class="data-view">
    <pre id="raw-view" class="empty">Post a message to see raw node data</pre>
  </div>
</div>

<div class="status-bar" id="status-bar">Ready</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
//  jpath — dot-path traversal for any JSON
// ══════════════════════════════════════════════════════════
function jpath(data, path, def_val) {
  if (!path) return data;
  let obj = data;
  for (const p of path.split('.')) {
    if (obj == null) return def_val;
    if (Array.isArray(obj) && /^\d+$/.test(p)) obj = obj[+p];
    else if (typeof obj === 'object') obj = obj[p];
    else return def_val;
  }
  return obj !== undefined ? obj : def_val;
}

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════════
//  Assembly VM — minimal client-side DSL interpreter
// ══════════════════════════════════════════════════════════

function asmTokenize(line) {
  const tokens = []; let i = 0; const s = line.trim();
  while (i < s.length) {
    if (s[i] === ',' || s[i] === ' ' || s[i] === '\t') { i++; continue; }
    if (s[i] === '"' || s[i] === "'") {
      const q = s[i]; let j = i + 1;
      while (j < s.length && s[j] !== q) { if (s[j] === '\\') j++; j++; }
      tokens.push(s.slice(i + 1, j)); i = j + 1; continue;
    }
    let j = i;
    while (j < s.length && s[j] !== ',' && s[j] !== ' ' && s[j] !== '\t') j++;
    tokens.push(s.slice(i, j)); i = j;
  }
  return tokens;
}

function asmResolve(token, state) {
  if (token == null) return undefined;
  if (token === 'true') return true;
  if (token === 'false') return false;
  if (token === 'null') return null;
  if (token === '[]') return [];
  if (token === '{}') return ({});
  if (/^[+-]?\d+(\.\d+)?$/.test(token)) return +token;
  if (token.startsWith('@')) return jpath(state, token.slice(1));
  if (token.startsWith('+')) return +token;
  return token;
}

function asmStore(state, ref, value) {
  if (!ref || !ref.startsWith('@')) return;
  const path = ref.slice(1);
  const parts = path.split('.');
  let obj = state;
  for (let i = 0; i < parts.length - 1; i++) {
    const p = parts[i];
    if (obj[p] == null) obj[p] = {};
    obj = obj[p];
  }
  obj[parts[parts.length - 1]] = value;
}

const _builtins = {
  default(a) { return a[0] != null && a[0] !== '' ? a[0] : a[1]; },
  json(a) { try { return JSON.stringify(a[0], null, 2); } catch (_) { return String(a[0]); } },
  fmt(a) { let s = String(a[0] || ''); for (let i = 1; i < a.length; i++) s = s.replace(`{${i-1}}`, String(a[i] ?? '')); return s; },
  concat(a) { return String(a[0] ?? '') + String(a[1] ?? ''); },
  len(a) { return Array.isArray(a[0]) ? a[0].length : 0; },
  keys(a) { return a[0] != null && typeof a[0] === 'object' ? Object.keys(a[0]) : []; },
  slice(a) { return Array.isArray(a[0]) ? a[0].slice(+a[1]||0, a[2]!=null?+a[2]:undefined) : String(a[0]||'').slice(+a[1]||0, a[2]!=null?+a[2]:undefined); },
  get(a) { return a[0] != null ? a[0][a[1]] : undefined; },
  // generic array search
  find(a) { return Array.isArray(a[0]) ? a[0].find(s => s && s[a[1]] === a[2]) || null : null; },
  filter(a) { return Array.isArray(a[0]) ? a[0].filter(s => s && s[a[1]] === a[2]) : []; },
};

function execAsm(code, extraState) {
  if (!code || !code.trim()) return {};
  const state = { ...extraState };
  const lines = code.split('\n');
  let ip = 0; const max = lines.length * 20; let steps = 0;
  while (ip < lines.length && steps < max) {
    steps++;
    const line = lines[ip].trim();
    if (!line || line.startsWith(';') || line.startsWith('#')) { ip++; continue; }
    const tokens = asmTokenize(line);
    if (!tokens.length) { ip++; continue; }
    const op = tokens[0];
    if (op === 'MOV') {
      asmStore(state, tokens[1], asmResolve(tokens[2], state));
    } else if (op === 'CALL') {
      const dst = tokens[1], fn = tokens[2], args = tokens.slice(3).map(t => asmResolve(t, state));
      const b = _builtins[fn];
      if (b) { const r = b(args); if (dst !== '_') asmStore(state, dst, r); }
    }
    ip++;
  }
  return state;
}

// ══════════════════════════════════════════════════════════
//  View Presets — assembly snippet → json → html
// ══════════════════════════════════════════════════════════

const viewPresets = {
  'message/compact': {
    asm: [
      '; slots.1.1 = body slot, slots.2.2 = meta slot',
      'CALL @content, default, @n.data.slots.1.1.text, @n.data.content',
      'CALL @content, default, @content, ""',
      'MOV @time, @n.data.slots.2.2.ts',
      'CALL @time, default, @time, @n.ts',
      'MOV @id, @n.data.slots.2.2.id',
      'CALL @id, default, @id, @n.id',
    ].join('\n'),
    render(j) {
      const ts = j.time ? new Date(j.time).toLocaleTimeString() : '';
      return `<div class="chat-msg">
        <div class="msg-hdr"><span class="msg-id">${esc(j.id)}</span><span class="msg-ts">${esc(ts)}</span></div>
        <div class="msg-content">${esc(j.content)}</div>
      </div>`;
    },
  },
  'message/card': {
    asm: [
      '; slots.0.0 = slots meta, slots.1.1 = body, slots.2.2 = meta',
      'CALL @content, default, @n.data.slots.1.1.text, @n.data.content',
      'CALL @content, default, @content, ""',
      'CALL @kind, default, @n.data.slots.2.2.kind, @n.data.kind',
      'CALL @kind, default, @kind, "?"',
      'CALL @id, default, @n.data.slots.2.2.id, @n.id',
      'CALL @parent, default, @n.data.slots.2.2.parent_id, @n.parent_id',
      'CALL @time, default, @n.data.slots.2.2.ts, @n.ts',
      'CALL @slot_count, default, @n.data.slots.0.0.count, 0',
      'CALL @raw, json, @n.data',
    ].join('\n'),
    render(j) {
      const ts = j.time ? new Date(j.time).toLocaleTimeString() : '';
      return `<div class="pnode">
        <div class="pnode-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="pnode-id">${esc(j.id)}</span>
          <span class="pnode-kind">${esc(j.kind)}</span>
          <span class="pnode-preview">${esc(String(j.content).slice(0, 60))}</span>
          <span class="pnode-ts">${esc(ts)}</span>
        </div>
        <div class="pnode-body"><pre>${esc(j.raw)}</pre></div>
      </div>`;
    },
  },
  'channel/item': {
    asm: 'CALL @name, default, @n.data.name, @n.id',
    render(j) {
      return `<span class="ch-hash">#</span> ${esc(j.name)}`;
    },
  },
  'channel/card': {
    asm: [
      'CALL @name, default, @n.data.name, @n.id',
      'MOV @id, @n.id',
      'CALL @raw, json, @n.data',
    ].join('\n'),
    render(j) {
      return `<div class="pnode">
        <div class="pnode-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="pnode-id">${esc(j.id)}</span>
          <span class="pnode-kind">channel</span>
          <span class="pnode-preview"># ${esc(j.name)}</span>
        </div>
        <div class="pnode-body"><pre>${esc(j.raw)}</pre></div>
      </div>`;
    },
  },
};

function renderNode(node, presetName) {
  const preset = viewPresets[presetName];
  if (!preset) return `<div class="pnode"><pre>${esc(JSON.stringify(node, null, 2))}</pre></div>`;
  const state = execAsm(preset.asm, { n: node });
  const json = {};
  for (const [k, v] of Object.entries(state)) {
    if (k !== 'n' && k !== 'each_idx' && !k.startsWith('_')) json[k] = v;
  }
  return preset.render(json);
}

function pickPreset(node, context) {
  const kind = jpath(node.data, 'kind', 'generic');
  if (context === 'chat') return kind === 'channel' ? 'channel/item' : 'message/compact';
  return kind === 'channel' ? 'channel/card' : 'message/card';
}

// ══════════════════════════════════════════════════════════
//  State + API
// ══════════════════════════════════════════════════════════

let allNodes = [];
let activeChannel = null;

document.querySelectorAll('.page-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById('page-' + btn.dataset.page);
    if (page) page.classList.add('active');
  });
});

function setStatus(msg, loading) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.classList.toggle('loading', !!loading);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

// ══════════════════════════════════════════════════════════
//  Channels
// ══════════════════════════════════════════════════════════

async function createChannel() {
  const input = document.getElementById('new-ch-input');
  const name = input.value.trim();
  if (!name) return;
  input.value = '';
  const res = await api('POST', '/api/pchat/node', { data: { kind: 'channel', name } });
  allNodes.push(res.node);
  selectChannel(res.node.id);
  renderAll();
}

function selectChannel(id) {
  activeChannel = id;
  renderChannelList();
  renderChat();
  const ch = allNodes.find(n => n.id === id);
  const name = ch ? jpath(ch.data, 'name', id) : id;
  document.getElementById('channel-label').innerHTML = '# <strong>' + esc(name) + '</strong>';
}

function renderChannelList() {
  const el = document.getElementById('channel-list');
  const channels = allNodes.filter(n => jpath(n.data, 'kind') === 'channel');
  el.innerHTML = channels.map(n => {
    const active = n.id === activeChannel ? ' active' : '';
    return `<div class="channel-item${active}" onclick="selectChannel('${n.id}')">${renderNode(n, 'channel/item')}</div>`;
  }).join('');
}

// ══════════════════════════════════════════════════════════
//  Messages + Rendering
// ══════════════════════════════════════════════════════════

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  if (!activeChannel) {
    const res = await api('POST', '/api/pchat/node', { data: { kind: 'channel', name: 'general' } });
    allNodes.push(res.node);
    selectChannel(res.node.id);
  }
  input.value = '';
  setStatus('Posting...', true);
  try {
    const res = await api('POST', '/api/pchat/node', { message: msg, parent_id: activeChannel });
    allNodes.push(res.node);
    renderAll();
    setStatus('Ready — ' + allNodes.length + ' nodes');
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

function renderChat() {
  const el = document.getElementById('chat-thread');
  if (!activeChannel) { el.innerHTML = '<div class="chat-empty">No channel selected</div>'; return; }
  const msgs = allNodes.filter(n => n.parent_id === activeChannel);
  if (!msgs.length) { el.innerHTML = '<div class="chat-empty">No messages yet. Say something!</div>'; return; }
  el.innerHTML = msgs.map(n => renderNode(n, 'message/compact')).join('');
  el.scrollTop = el.scrollHeight;
}

function renderNodeList() {
  const el = document.getElementById('node-list');
  if (!allNodes.length) { el.innerHTML = '<div class="empty" style="padding:12px">No nodes</div>'; return; }
  el.innerHTML = allNodes.map(n => renderNode(n, pickPreset(n, 'nodes'))).join('');
}

function renderRaw() {
  const el = document.getElementById('raw-view');
  if (!allNodes.length) { el.textContent = 'No nodes yet'; el.className = 'empty'; return; }
  el.textContent = JSON.stringify(allNodes[allNodes.length - 1], null, 2);
  el.className = '';
}

function renderAll() {
  renderChannelList();
  renderChat();
  renderNodeList();
  renderRaw();
  renderPresetList();
  if (activePreset) { populateSampleSelect(); liveUpdateView(); }
}

// ══════════════════════════════════════════════════════════
//  Reset + Load
// ══════════════════════════════════════════════════════════

async function resetAll() {
  await api('POST', '/api/pchat/reset');
  allNodes = [];
  activeChannel = null;
  document.getElementById('channel-label').textContent = 'Select or create a channel';
  renderAll();
  setStatus('Reset — Ready');
}

async function loadNodes() {
  try {
    const data = await api('GET', '/api/pchat/nodes');
    allNodes = data.nodes || [];
    const channels = allNodes.filter(n => jpath(n.data, 'kind') === 'channel');
    if (channels.length) selectChannel(channels[0].id);
    renderAll();
    setStatus('Ready — ' + allNodes.length + ' nodes');
  } catch (e) {
    setStatus('Ready');
  }
}

// ══════════════════════════════════════════════════════════
//  Views Editor
// ══════════════════════════════════════════════════════════

let activePreset = null;

function renderPresetList() {
  const el = document.getElementById('view-preset-list');
  el.innerHTML = Object.keys(viewPresets).map(name => {
    const active = name === activePreset ? ' active' : '';
    return `<div class="view-item${active}" onclick="selectPreset('${name}')">${esc(name)}</div>`;
  }).join('');
}

function selectPreset(name) {
  activePreset = name;
  renderPresetList();
  const preset = viewPresets[name];
  document.getElementById('view-asm').value = preset.asm || '';
  populateSampleSelect();
  liveUpdateView();
}

function populateSampleSelect() {
  const sel = document.getElementById('view-sample-select');
  const kind = activePreset ? activePreset.split('/')[0] : '';
  const matching = allNodes.filter(n => {
    const nk = jpath(n.data, 'kind', '');
    return nk === kind || !kind;
  });
  sel.innerHTML = matching.length
    ? matching.map(n => `<option value="${n.id}">${esc(n.id)} — ${esc(jpath(n.data,'content') || jpath(n.data,'name') || '').slice(0,30)}</option>`).join('')
    : '<option value="">no sample nodes</option>';
}

function liveUpdateView() {
  if (!activePreset) return;
  const asm = document.getElementById('view-asm').value;
  viewPresets[activePreset].asm = asm;

  const sel = document.getElementById('view-sample-select');
  const sampleId = sel.value;
  const sampleNode = allNodes.find(n => n.id === sampleId);

  if (!sampleNode) {
    document.getElementById('view-json').textContent = '(no sample node selected)';
    document.getElementById('view-html').innerHTML = '<span class="empty">(no sample)</span>';
    return;
  }

  try {
    const state = execAsm(asm, { n: sampleNode });
    const json = {};
    for (const [k, v] of Object.entries(state)) {
      if (k !== 'n' && k !== 'each_idx' && !k.startsWith('_')) json[k] = v;
    }
    document.getElementById('view-json').textContent = JSON.stringify(json, null, 2);

    const preset = viewPresets[activePreset];
    document.getElementById('view-html').innerHTML = preset.render(json);
  } catch (e) {
    document.getElementById('view-json').textContent = 'Error: ' + e.message;
    document.getElementById('view-html').innerHTML = '<span style="color:var(--red)">' + esc(e.message) + '</span>';
  }
}

loadNodes();
</script>
</body>
</html>
