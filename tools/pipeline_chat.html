<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Chat</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2129; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f85149; --yellow: #d29922;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font:12px/1.4 'Cascadia Code','Fira Code',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
button { cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; }
button:hover { background:var(--border); }
input, textarea { background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; padding:4px 6px; }
textarea { resize:vertical; }

.top-bar { display:flex; align-items:center; gap:8px; padding:4px 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.top-bar h1 { font-size:14px; font-weight:600; color:var(--accent); }
.spacer { flex:1; }
.btn { padding:4px 10px; }
.btn.sm { padding:2px 6px; font-size:11px; }
.btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }
.btn.danger { background:var(--red); color:#fff; border-color:var(--red); }

.page-tabs { display:flex; gap:0; padding:0 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.page-tab { padding:6px 16px; font-size:12px; font-weight:600; border:none; background:transparent; color:var(--text-dim); border-bottom:2px solid transparent; cursor:pointer; }
.page-tab:hover { color:var(--text); }
.page-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.page { display:none; flex:1; min-height:0; }
.page.active { display:flex; }

/* Main layout — sidebar + content */
.main-layout { flex:1; display:flex; min-height:0; }
.sidebar { width:200px; border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-hdr { padding:4px 8px; font-size:10px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:4px; }
.sidebar-body { flex:1; overflow-y:auto; padding:4px; }
.channel-item { display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:3px; cursor:pointer; font-size:11px; }
.channel-item:hover { background:var(--surface2); }
.channel-item.active { background:var(--accent); color:#000; }
.channel-item .ch-hash { color:var(--text-dim); font-weight:600; }
.channel-item.active .ch-hash { color:rgba(0,0,0,.5); }
.content-area { flex:1; display:flex; flex-direction:column; min-height:0; }

/* Chat */
.chat-thread { flex:1; overflow-y:auto; padding:8px 12px; }
.chat-msg { margin:6px 0; padding:8px 12px; border-radius:6px; font-size:11px; line-height:1.5; white-space:pre-wrap; word-break:break-word; background:var(--surface); border:1px solid var(--border); }
.chat-msg.self { border-color:var(--accent); border-left:3px solid var(--accent); }
.chat-msg .msg-hdr { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
.chat-msg .msg-ts { font-size:9px; color:var(--text-dim); margin-left:auto; }
.chat-msg .msg-user { color:var(--green); font-weight:600; margin-right:4px; }
.chat-msg .msg-content { }
.top-bar input { width:100px; font-size:11px; padding:2px 6px; }
.chat-input-bar { display:flex; gap:4px; padding:6px 12px; border-top:1px solid var(--border); flex-shrink:0; }
.chat-input-bar textarea { flex:1; min-height:32px; max-height:120px; resize:vertical; font-size:11px; }
.chat-empty { padding:20px; color:var(--text-dim); font-style:italic; text-align:center; }
.channel-label { padding:4px 12px; font-size:11px; color:var(--text-dim); border-bottom:1px solid var(--border); flex-shrink:0; }
.channel-label strong { color:var(--accent); }

/* Nodes/FS tab */
.data-view { flex:1; overflow-y:auto; padding:12px; min-height:0; }
.data-view pre { white-space:pre-wrap; word-break:break-word; font-size:11px; line-height:1.5; color:var(--text); }
.data-view .empty { color:var(--text-dim); font-style:italic; }

.node-list { flex:1; overflow-y:auto; padding:8px; min-height:0; }
.pnode { margin:4px 0; border:1px solid var(--border); border-radius:4px; background:var(--surface); }
.pnode-hdr { display:flex; align-items:center; gap:6px; padding:4px 8px; cursor:pointer; font-size:11px; }
.pnode-hdr:hover { background:var(--surface2); }
.pnode-id { color:var(--accent); font-weight:600; font-size:10px; }
.pnode-kind { font-size:9px; padding:1px 4px; border-radius:3px; background:var(--surface2); color:var(--text-dim); }
.pnode-body { display:none; padding:4px 8px 8px; border-top:1px solid var(--border); }
.pnode-body.open { display:block; }
.pnode-body pre { white-space:pre-wrap; word-break:break-word; font-size:10px; line-height:1.4; max-height:300px; overflow-y:auto; }

/* Shell tab */
.shell-layout { flex:1; display:flex; flex-direction:column; min-height:0; }
.shell-output { flex:1; overflow-y:auto; padding:8px 12px; font-size:11px; }
.shell-output .sh-line { margin:2px 0; }
.shell-output .sh-cmd { color:var(--green); }
.shell-output .sh-result { color:var(--text-dim); white-space:pre-wrap; }
.shell-output .sh-error { color:var(--red); }
.shell-input-bar { display:flex; gap:4px; padding:6px 12px; border-top:1px solid var(--border); flex-shrink:0; }
.shell-input-bar input { flex:1; font-size:11px; }

/* New channel input */
.new-ch { display:flex; gap:2px; padding:4px; border-top:1px solid var(--border); flex-shrink:0; }
.new-ch input { flex:1; font-size:10px; padding:2px 4px; }

/* Status */
.status-bar { font-size:10px; color:var(--text-dim); padding:2px 12px; border-top:1px solid var(--border); flex-shrink:0; background:var(--surface); }
.status-bar.loading { color:var(--yellow); }
</style>
</head>
<body>

<div class="top-bar">
  <h1>Pipeline Chat</h1>
  <span class="spacer"></span>
  <input id="username-input" placeholder="username" value="">
  <button class="btn sm danger" onclick="resetAll()">Reset</button>
</div>

<div class="page-tabs">
  <button class="page-tab active" data-page="chat">Chat</button>
  <button class="page-tab" data-page="shell">Shell</button>
  <button class="page-tab" data-page="fs">FS</button>
  <button class="page-tab" data-page="raw">Raw</button>
</div>

<!-- Chat Tab -->
<div class="page active" id="page-chat">
  <div class="main-layout">
    <div class="sidebar">
      <div class="sidebar-hdr">Channels</div>
      <div class="sidebar-body" id="channel-list"></div>
      <div class="new-ch">
        <input id="new-ch-input" placeholder="new channel" onkeydown="if(event.key==='Enter')createChannel()">
        <button class="btn sm" onclick="createChannel()">+</button>
      </div>
    </div>
    <div class="content-area">
      <div class="channel-label" id="channel-label">Select or create a channel</div>
      <div class="chat-thread" id="chat-thread">
        <div class="chat-empty">No channel selected</div>
      </div>
      <div class="chat-input-bar">
        <textarea id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="btn primary" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- Shell Tab -->
<div class="page" id="page-shell">
  <div class="shell-layout">
    <div class="shell-output" id="shell-output"></div>
    <div class="shell-input-bar">
      <span style="color:var(--green)">$</span>
      <input id="shell-input" placeholder="/ls, /mk channel lobby, /select lobby, /post hello ..." onkeydown="if(event.key==='Enter')runShell()">
      <button class="btn sm" onclick="runShell()">Run</button>
    </div>
  </div>
</div>

<!-- FS Tab -->
<div class="page" id="page-fs">
  <div class="node-list" id="fs-view"></div>
</div>

<!-- Raw Tab -->
<div class="page" id="page-raw">
  <div class="data-view">
    <pre id="raw-view" class="empty">Send a command to see raw responses</pre>
  </div>
</div>

<div class="status-bar" id="status-bar">Ready</div>

<script>
// 'use strict' removed — functions must be global for onclick handlers

function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════════

let activeChannelName = localStorage.getItem('pchat_channel') || null;
let cmdLog = [];  // shell history for Raw tab
const LS_KEY = 'pchat_state';  // localStorage cache

document.querySelectorAll('.page-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById('page-' + btn.dataset.page);
    if (page) page.classList.add('active');
  });
});

function setStatus(msg, loading) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.classList.toggle('loading', !!loading);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.detail || `HTTP ${r.status}`);
  return data;
}

function getUsername() {
  return document.getElementById('username-input').value.trim() || 'anon';
}

// ══════════════════════════════════════════════════════════
//  Core: one-request state fetch
// ══════════════════════════════════════════════════════════

async function fetchState(channel) {
  return api('POST', '/api/pchat/view', {
    channel: channel || null,
    user: getUsername(),
    msg_limit: 50,
  });
}

function cacheState(state) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch {}
}

function loadCachedState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch { return null; }
}

// ══════════════════════════════════════════════════════════
//  Shell exec — for Shell tab and mutations
// ══════════════════════════════════════════════════════════

async function shellExec(cmd, log = true) {
  const user = getUsername();
  const res = await api('POST', '/api/pchat/exec', { cmd, user, log });
  cmdLog.push({ cmd, user, result: res, ts: new Date().toISOString() });
  return res;
}

async function shellBatch(cmds, log = true) {
  const user = getUsername();
  const res = await api('POST', '/api/pchat/batch', { cmds, user, log });
  for (let i = 0; i < cmds.length; i++) {
    cmdLog.push({ cmd: cmds[i], user, result: res.results[i], ts: new Date().toISOString() });
  }
  return res.results;
}

// ══════════════════════════════════════════════════════════
//  Render from state object
// ══════════════════════════════════════════════════════════

function renderFromState(state) {
  renderChannelList(state.channels || []);
  if (state.active_channel) {
    activeChannelName = state.active_channel;
    localStorage.setItem('pchat_channel', activeChannelName);
    document.getElementById('channel-label').innerHTML = '# <strong>' + esc(activeChannelName) + '</strong>';
    renderMessages(state.messages || []);
  } else {
    document.getElementById('channel-label').textContent = 'Select or create a channel';
    document.getElementById('chat-thread').innerHTML = '<div class="chat-empty">No channel selected</div>';
  }
  cacheState(state);
}

// ══════════════════════════════════════════════════════════
//  Channels
// ══════════════════════════════════════════════════════════

async function createChannel() {
  const input = document.getElementById('new-ch-input');
  const name = input.value.trim();
  if (!name) return;
  input.value = '';
  setStatus('Creating channel...', true);
  try {
    // Batch: navigate, ensure channels dir, create node, navigate back
    await shellBatch([
      '/select pchat',
      '/mk channels channels',
      '/select channels',
      `/mk channel ${name}`,
      '/up',
      '/up',
    ]);
    // Fetch fresh state with new channel selected
    const state = await fetchState(name);
    renderFromState(state);
    setStatus('Ready');
  } catch (e) { setStatus('Error: ' + e.message); }
}

function renderChannelList(channels) {
  const el = document.getElementById('channel-list');
  if (!channels.length) { el.innerHTML = '<div class="chat-empty" style="font-size:10px">No channels</div>'; return; }
  el.innerHTML = channels.map(ch => {
    const name = ch.meta?.name || ch.name;
    const active = name === activeChannelName ? ' active' : '';
    return `<div class="channel-item${active}" onclick="selectChannel('${esc(name)}')"><span class="ch-hash">#</span> ${esc(name)}</div>`;
  }).join('');
}

async function selectChannel(name) {
  activeChannelName = name;
  localStorage.setItem('pchat_channel', name);
  document.getElementById('channel-label').innerHTML = '# <strong>' + esc(name) + '</strong>';
  setStatus('Loading...', true);
  try {
    const state = await fetchState(name);
    renderFromState(state);
    setStatus('Ready');
  } catch (e) { setStatus('Error: ' + e.message); }
}

// ══════════════════════════════════════════════════════════
//  Messages
// ══════════════════════════════════════════════════════════

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  if (!activeChannelName) {
    document.getElementById('new-ch-input').value = 'general';
    await createChannel();
  }
  input.value = '';
  setStatus('Posting...', true);
  try {
    // Batch: navigate to channel, post, navigate back — one HTTP request
    await shellBatch([
      '/select pchat',
      '/select channels',
      `/select ${activeChannelName}`,
      `/post ${msg}`,
      '/up',
      '/up',
      '/up',
    ]);
    // Fetch updated state — one more request
    const state = await fetchState(activeChannelName);
    renderFromState(state);
    setStatus('Ready');
  } catch (e) {
    setStatus('Error: ' + e.message);
  }
}

function renderMessages(items) {
  const el = document.getElementById('chat-thread');
  const msgs = items.filter(i => i.meta?.type === 'message');
  if (!msgs.length) {
    el.innerHTML = '<div class="chat-empty">No messages yet. Say something!</div>';
    return;
  }
  const currentUser = getUsername();
  el.innerHTML = msgs.map(m => {
    const meta = m.meta || {};
    const user = meta.user || 'anon';
    const ts = meta.ts ? new Date(meta.ts).toLocaleTimeString() : '';
    const content = m.data?.content || m.name || '';
    const isSelf = user === currentUser;
    return `<div class="chat-msg${isSelf ? ' self' : ''}">
      <div class="msg-hdr"><span class="msg-user">${esc(user)}</span><span class="msg-ts">${esc(ts)}</span></div>
      <div class="msg-content">${esc(content)}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════════════════════════
//  Shell interactive tab
// ══════════════════════════════════════════════════════════

async function runShell() {
  const input = document.getElementById('shell-input');
  const cmd = input.value.trim();
  if (!cmd) return;
  input.value = '';
  const outputEl = document.getElementById('shell-output');
  outputEl.innerHTML += `<div class="sh-line"><span class="sh-cmd">$ ${esc(cmd)}</span></div>`;
  try {
    const res = await shellExec(cmd);
    const cls = res.error ? 'sh-error' : 'sh-result';
    outputEl.innerHTML += `<div class="sh-line"><span class="${cls}">${esc(JSON.stringify(res, null, 2))}</span></div>`;
  } catch (e) {
    outputEl.innerHTML += `<div class="sh-line"><span class="sh-error">${esc(e.message)}</span></div>`;
  }
  outputEl.scrollTop = outputEl.scrollHeight;
  renderRaw();
}

// ══════════════════════════════════════════════════════════
//  FS view tab
// ══════════════════════════════════════════════════════════

async function renderFsView() {
  const el = document.getElementById('fs-view');
  try {
    const res = await api('GET', '/api/pchat/state');
    const children = res.children || [];
    if (!children.length) {
      el.innerHTML = '<div class="chat-empty" style="padding:12px">Empty workspace</div>';
      return;
    }
    el.innerHTML = children.map(c => {
      const meta = c.meta || {};
      return `<div class="pnode">
        <div class="pnode-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
          <span class="pnode-id">${esc(c.path)}</span>
          <span class="pnode-kind">${esc(meta.type || '?')}</span>
        </div>
        <div class="pnode-body"><pre>${esc(JSON.stringify(c, null, 2))}</pre></div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="chat-empty">${esc(e.message)}</div>`;
  }
}

// ══════════════════════════════════════════════════════════
//  Raw tab + Reset
// ══════════════════════════════════════════════════════════

function renderRaw() {
  const el = document.getElementById('raw-view');
  if (!cmdLog.length) { el.textContent = 'No commands yet'; el.className = 'empty'; return; }
  el.textContent = JSON.stringify(cmdLog, null, 2);
  el.className = '';
}

async function resetAll() {
  await shellExec('/reset');
  cmdLog = [];
  activeChannelName = null;
  localStorage.removeItem('pchat_channel');
  localStorage.removeItem(LS_KEY);
  document.getElementById('channel-label').textContent = 'Select or create a channel';
  document.getElementById('chat-thread').innerHTML = '<div class="chat-empty">No channel selected</div>';
  renderChannelList([]);
  renderRaw();
  setStatus('Reset — Ready');
}

// ══════════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════════

// Username persistence
const _usernameInput = document.getElementById('username-input');
_usernameInput.value = localStorage.getItem('pchat_user') || '';
_usernameInput.addEventListener('input', () => localStorage.setItem('pchat_user', _usernameInput.value));

// Tab switch hooks
document.querySelectorAll('.page-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.dataset.page === 'fs') renderFsView();
  });
});

// Boot: show cached state immediately, then refresh from server
(async () => {
  // 1. Render from localStorage cache (instant)
  const cached = loadCachedState();
  if (cached) {
    renderFromState(cached);
    setStatus('Cached — refreshing...', true);
  }

  // 2. Fetch fresh state from server (one request)
  try {
    // Session start
    await shellExec(`/session`, true);
    const state = await fetchState(activeChannelName);
    renderFromState(state);
    setStatus('Ready');
  } catch (e) {
    if (!cached) setStatus('Server unavailable');
    else setStatus('Using cached data (server unavailable)');
  }
})();
</script>
</body>
</html>
