// ── Init ───────────────────────────────────────────────
// ── DataStore (observable KV) ───────────────────────────
// Simple observable key-value store for workflow data bindings.
// Listeners fire when a key changes.
const _dataStore = {};
const _dsListeners = {};  // {key: [fn, ...]}
// Load persisted DataStore (unwrap legacy {value,dtype,chain} format)
try {
  const s = JSON.parse(localStorage.getItem('wf_datastore') || '{}');
  for (const [k, v] of Object.entries(s)) {
    _dataStore[k] = (v && typeof v === 'object' && 'value' in v && !Array.isArray(v)) ? v.value : v;
  }
} catch(_) {}

function _saveDataStore() { try { localStorage.setItem('wf_datastore', JSON.stringify(_dataStore)); } catch(_) {} }

function _notifyListeners(key, value, old) {
  // exact match
  if (_dsListeners[key]) {
    _dsListeners[key].forEach(fn => { try { fn(key, value, old); } catch(e) { log('ds listener error: ' + e.message); } });
  }
  // wildcard: 'entities.n_0' also fires 'entities.*'
  const dot = key.lastIndexOf('.');
  if (dot > 0) {
    const wildcard = key.slice(0, dot) + '.*';
    if (_dsListeners[wildcard]) {
      _dsListeners[wildcard].forEach(fn => { try { fn(key, value, old); } catch(e) { log('ds listener error: ' + e.message); } });
    }
  }
}

function dsSet(key, value) {
  const old = _dataStore[key];
  _dataStore[key] = value;
  _saveDataStore();
  if (old !== value) _notifyListeners(key, value, old);
}
function dsGet(key) { return _dataStore[key]; }
function dsOn(key, fn) {
  if (!_dsListeners[key]) _dsListeners[key] = [];
  _dsListeners[key].push(fn);
}
function dsOff(key, fn) {
  if (!_dsListeners[key]) return;
  _dsListeners[key] = _dsListeners[key].filter(f => f !== fn);
}
function dsOnce(key, fn) {
  const wrapper = (k, v, o) => { dsOff(key, wrapper); fn(k, v, o); };
  dsOn(key, wrapper);
}
function dsMatch(pattern) {
  // 'entities.*' → all keys starting with 'entities.'
  if (pattern.endsWith('.*')) {
    const prefix = pattern.slice(0, -1); // 'entities.'
    return Object.keys(_dataStore).filter(k => k.startsWith(prefix));
  }
  return Object.keys(_dataStore).filter(k => k === pattern);
}
function dsKeys() { return Object.keys(_dataStore); }

// ── Ingest workflow vars into DataStore ─────────────────
function ingestWorkflowVars(vars) {
  if (!vars || typeof vars !== 'object') return;
  for (const [k, v] of Object.entries(vars)) {
    dsSet(k, v);
  }
}

// ── Bindings: map DataStore keys to node fields ─────────
// bindings: [{ds_key, node_id, field, transform?}]
let _bindings = [];
try { _bindings = JSON.parse(localStorage.getItem('wf_bindings') || '[]'); } catch(_) {}

function _saveBindings() {
  try { localStorage.setItem('wf_bindings', JSON.stringify(_bindings)); } catch(_) {}
}

function applyBindings() {
  for (const b of _bindings) {
    const val = dsGet(b.ds_key);
    if (val === undefined) continue;
    const nd = nodes[b.node_id];
    if (!nd) continue;
    let resolved = val;
    if (b.transform === 'json' && typeof val === 'string') {
      try { resolved = JSON.parse(val); } catch(_) {}
    }
    nd[b.field] = resolved;
  }
  saveNodes();
  renderTree();
}

function findDsKeyForSlot(nodeId, field) {
  return _bindings.find(b => b.node_id === nodeId && b.field === field);
}

// ── Template resolution (inheritance via patches) ────────
function resolveTemplate(name) {
  const tpl = cardTemplates[name];
  if (!tpl) return cardTemplates.entity || { slots: [] };
  if (!tpl.extends) return tpl;
  const parent = resolveTemplate(tpl.extends);
  const slots = JSON.parse(JSON.stringify(parent.slots || []));
  for (const p of (tpl.patch || [])) {
    if (p.op === 'replace') {
      const idx = slots.findIndex(s => s.bind === p.bind);
      if (idx >= 0) Object.assign(slots[idx], p);
    } else if (p.op === 'add' && p.slot) {
      slots.push(p.slot);
    } else if (p.op === 'remove') {
      const idx = slots.findIndex(s => s.bind === p.bind);
      if (idx >= 0) slots.splice(idx, 1);
    }
  }
  return { ...tpl, slots, icon: tpl.icon || parent.icon };
}

// ── Patch proposals & provenance ─────────────────────────
let _pendingPatches = [];
let _provenance = [];
let _patchIdN = 0;
try { _pendingPatches = JSON.parse(localStorage.getItem('wf_pending_patches') || '[]'); } catch(_) {}
try { _provenance = JSON.parse(localStorage.getItem('wf_provenance') || '[]'); } catch(_) {}
try { _patchIdN = Math.max(0, ..._pendingPatches.map(p => p.id || 0), ..._provenance.map(p => p.patchId || 0)) + 1; } catch(_) {}

function _savePatches() { try { localStorage.setItem('wf_pending_patches', JSON.stringify(_pendingPatches)); } catch(_) {} }
function _saveProvenance() { try { localStorage.setItem('wf_provenance', JSON.stringify(_provenance)); } catch(_) {} }

function proposePatch(nodeId, data, meta = {}) {
  const nd = nodes[nodeId];
  if (!nd) { log('proposePatch: node ' + nodeId + ' not found'); return null; }
  const { tpl } = resolveView(nd);
  const patchId = _patchIdN++;
  const patch = { id: patchId, nodeId, data, meta, time: ts(), resolved: {} };
  let anyPending = false;

  for (const [key, val] of Object.entries(data)) {
    const slot = tpl.slots.find(s => s.bind === key || s.bind === key + '_list');
    if (!slot) {
      patch.resolved[key] = 'unknown';
      anyPending = true;
      continue;
    }

    const rule = slot.accept || 'auto';
    if (rule === 'auto') {
      nd[slot.bind] = val;
      patch.resolved[key] = 'accepted';
      _provenance.push({
        patchId, nodeId, field: slot.bind, dsKey: key,
        status: 'done', time: ts(), source: meta.source || 'proposePatch'
      });
    } else {
      patch.resolved[key] = 'pending';
      anyPending = true;
    }
  }

  if (anyPending) {
    _pendingPatches.push(patch);
    _savePatches();
  }
  _saveProvenance();
  saveNodes();
  renderTree();
  return patch;
}

function acceptPatch(patchId, key) {
  const idx = _pendingPatches.findIndex(p => p.id === patchId);
  if (idx < 0) return;
  const patch = _pendingPatches[idx];
  const nd = nodes[patch.nodeId];
  if (!nd) return;
  const { tpl } = resolveView(nd);
  const _findSlot = (k) => tpl.slots.find(s => s.bind === k || s.bind === k + '_list') || null;

  if (key) {
    const val = patch.data[key];
    const slot = _findSlot(key);
    if (slot) nd[slot.bind] = val;
    patch.resolved[key] = 'accepted';
    _provenance.push({ patchId, nodeId: patch.nodeId, field: slot ? slot.bind : key, dsKey: key, status: 'done', time: ts(), source: 'manual' });
  } else {
    for (const [k, status] of Object.entries(patch.resolved)) {
      if (status !== 'pending') continue;
      const val = patch.data[k];
      const slot = _findSlot(k);
      if (slot) nd[slot.bind] = val;
      patch.resolved[k] = 'accepted';
      _provenance.push({ patchId, nodeId: patch.nodeId, field: slot ? slot.bind : k, dsKey: k, status: 'done', time: ts(), source: 'manual' });
    }
  }

  // remove patch if nothing pending left
  const stillPending = Object.values(patch.resolved).some(s => s === 'pending' || s === 'unknown');
  if (!stillPending) _pendingPatches.splice(idx, 1);
  _savePatches();
  _saveProvenance();
  saveNodes();
  renderTree();
}

function rejectPatch(patchId, key) {
  const idx = _pendingPatches.findIndex(p => p.id === patchId);
  if (idx < 0) return;
  const patch = _pendingPatches[idx];
  if (key) {
    patch.resolved[key] = 'rejected';
    _provenance.push({ patchId, nodeId: patch.nodeId, field: key, dsKey: key, status: 'rejected', time: ts(), source: 'manual' });
  } else {
    for (const [k, status] of Object.entries(patch.resolved)) {
      if (status === 'pending' || status === 'unknown') {
        patch.resolved[k] = 'rejected';
        _provenance.push({ patchId, nodeId: patch.nodeId, field: k, dsKey: k, status: 'rejected', time: ts(), source: 'manual' });
      }
    }
  }
  const stillPending = Object.values(patch.resolved).some(s => s === 'pending' || s === 'unknown');
  if (!stillPending) _pendingPatches.splice(idx, 1);
  _savePatches();
  _saveProvenance();
}

function pendingPatchesForNode(nodeId) {
  return _pendingPatches.filter(p => p.nodeId === nodeId);
}

// ── Data Store page rendering ────────────────────────────
function renderDataTab() {
  const el = document.getElementById('data-store-view');
  if (!el) return;
  const keys = dsKeys();
  if (!keys.length) { el.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px;">No data yet. Run a workflow to populate.</div>'; return; }
  let h = '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
  h += '<tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:3px 6px;color:var(--accent);">Key</th><th style="text-align:left;padding:3px 6px;color:var(--accent);">Type</th><th style="text-align:left;padding:3px 6px;color:var(--accent);">Value</th></tr>';
  for (const k of keys) {
    const v = dsGet(k);
    const dtype = Array.isArray(v) ? (v.length && typeof v[0] === 'object' ? 'array_of_objects' : 'array') : typeof v === 'object' && v !== null ? 'object' : 'scalar';
    const full = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
    const short = full.length > 120 ? full.slice(0, 120) + '...' : full;
    const needsExpand = full.length > 120;
    const uid = 'ds_' + k.replace(/\W/g, '_');
    const bound = _bindings.filter(b => b.ds_key === k).map(b => b.node_id + '.' + b.field).join(', ');
    h += `<tr style="border-bottom:1px solid var(--border);">`;
    h += `<td style="padding:3px 6px;color:var(--accent3);font-weight:600;vertical-align:top;">${esc(k)}</td>`;
    h += `<td style="padding:3px 6px;vertical-align:top;"><span style="background:var(--surface2);padding:1px 4px;border-radius:3px;font-size:9px;">${dtype}</span></td>`;
    h += `<td style="padding:3px 6px;white-space:pre-wrap;word-break:break-word;">`;
    if (needsExpand) {
      h += `<span data-short="${uid}">${esc(short)}</span>`;
      h += `<span data-full="${uid}" style="display:none"><pre style="margin:0;font-size:11px;">${esc(full)}</pre></span>`;
      h += ` <button class="btn-expand" data-toggle="${uid}" style="font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline;">show all</button>`;
    } else {
      h += esc(full);
    }
    if (bound) h += `<br><span style="color:var(--green);font-size:9px;">→ ${esc(bound)}</span>`;
    h += `</td></tr>`;
  }
  h += '</table>';
  el.innerHTML = h;
  el.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = btn.dataset.toggle;
      const s = el.querySelector(`[data-short="${uid}"]`);
      const f = el.querySelector(`[data-full="${uid}"]`);
      const showing = f.style.display !== 'none';
      s.style.display = showing ? '' : 'none';
      f.style.display = showing ? 'none' : '';
      btn.textContent = showing ? 'show all' : 'collapse';
    });
  });
}

// ── Bindings tab rendering ──────────────────────────────
function exportBindingsDSL() {
  const ed = document.getElementById('bindings-editor');
  if (!ed) return;
  let lines = ['# Bindings: DataStore key -> node field'];
  lines.push(`# ${dsKeys().length} keys in DataStore, ${_bindings.length} bindings\n`);
  // DataStore dump
  lines.push('# DataStore:');
  for (const k of dsKeys()) {
    const v = dsGet(k);
    const display = typeof v === 'string' ? v.slice(0, 80) : JSON.stringify(v).slice(0, 80);
    lines.push(`#   ${k} = ${display}`);
  }
  lines.push('');
  // Bindings
  lines.push('bindings:');
  if (!_bindings.length) {
    lines.push('  # No bindings yet');
    lines.push('  # Format: ds_key -> node_id.field [transform]');
  }
  for (const b of _bindings) {
    let line = `  ${b.ds_key} -> ${b.node_id}.${b.field}`;
    if (b.transform) line += ` [${b.transform}]`;
    lines.push(line);
  }
  ed.value = lines.join('\n');
}

function importBindingsDSL() {
  const ed = document.getElementById('bindings-editor');
  if (!ed) return;
  const text = ed.value;
  const newBindings = [];
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('bindings:')) continue;
    // Parse: ds_key -> node_id.field [transform]
    const m = trimmed.match(/^(\S+)\s*->\s*(\S+)\.(\S+)\s*(?:\[(\w+)\])?/);
    if (m) {
      newBindings.push({ ds_key: m[1], node_id: m[2], field: m[3], transform: m[4] || null });
    }
  }
  _bindings = newBindings;
  _saveBindings();
  applyBindings();
  log(`imported ${_bindings.length} bindings`);
}

// ── Components tab JS ───────────────────────────────────
function renderComponentsTab() {
  const modeSelect = document.getElementById('compModeSelect');
  const typeSelect = document.getElementById('compTypeSelect');

  const status = document.getElementById('compEditStatus');

    }
  } else {
    // FieldMap mode
    typeSelect.innerHTML = '<option value="_fieldmap">FieldMap</option>';
    editor.value = fieldMapToDSL();
  }
  if (status) status.textContent = '';
}

function applyComponentEditor() {
  const modeSelect = document.getElementById('compModeSelect');
  const typeSelect = document.getElementById('compTypeSelect');
  const editor = document.getElementById('comp-editor');
  const status = document.getElementById('compEditStatus');
  if (!editor) return;

  const mode = modeSelect ? modeSelect.value : 'template';
  const text = editor.value;

  if (mode === 'template') {
    const parsed = parseDSLComponent(text);
    if (!parsed) {
      if (status) status.textContent = 'Parse error';
      if (status) status.style.color = 'var(--red)';
      return;
    }
    _componentTemplates[parsed.type] = parsed.template;
    if (parsed.renderer) _componentConfig[parsed.type] = {
      renderer: parsed.renderer,
      label: parsed.label || parsed.type,
      icon: parsed.icon || '?',
    };
    _saveComponentTemplates();
    if (status) { status.textContent = 'Applied'; status.style.color = 'var(--green)'; }
    log(`component "${parsed.type}" updated`);
  } else {
    // FieldMap
    _fieldMap = parseFieldMapDSL(text);
    _saveFieldMap();
    if (status) { status.textContent = 'FieldMap applied'; status.style.color = 'var(--green)'; }
    log('fieldmap updated');
  }
  renderTree();
}

function resetComponentEditor() {
  const typeSelect = document.getElementById('compTypeSelect');
  const modeSelect = document.getElementById('compModeSelect');
  const editor = document.getElementById('comp-editor');
  const status = document.getElementById('compEditStatus');

  if (modeSelect && modeSelect.value === 'fieldmap') {
    _fieldMap = {};
    _saveFieldMap();
    editor.value = fieldMapToDSL();
    if (status) { status.textContent = 'FieldMap cleared'; status.style.color = 'var(--orange)'; }
    return;
  }
  const type = typeSelect ? typeSelect.value : '';
  if (type && _defaultComponentTemplates[type]) {
    _componentTemplates[type] = _defaultComponentTemplates[type];
    _saveComponentTemplates();
    editor.value = componentToDSL(type);
    if (status) { status.textContent = 'Reset to default'; status.style.color = 'var(--orange)'; }
    log(`component "${type}" reset`);
  }
}

// ── Tab dual chat system ────────────────────────────────
// Every right sidebar tab has: Apply bar (modify content) + chat feed + Ask bar (read-only Q&A)
let _chatAbort = null;
let _dslSpec = '';

async function getDslSpec() {
  if (_dslSpec) return _dslSpec;
  try { const sr = await get('/api/workflow/spec'); _dslSpec = sr.spec || sr.content || ''; } catch(_) {}
  return _dslSpec;
}

function stopChat() {
  if (_chatAbort) {
    try { _chatAbort.abort(); } catch(_) {}
    _chatAbort = null;
    setStatus('cancelled', 'idle');
    log('chat cancelled');
  }
}

function addTabChatMsg(tab, role, content) {
  const feed = document.querySelector(`[data-tab-feed="${tab}"]`);
  if (!feed) return;
  const label = role === 'user' ? 'You' : role === 'system' ? 'System' : 'Worker';
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  msg.innerHTML = `<span class="chat-label ${role}">${label}</span> <span style="font-size:9px;color:var(--text-dim)">${ts()}</span><div class="chat-text">${esc(content)}</div>`;
  feed.insertAdjacentElement('afterbegin', msg);
}

// Build context as separate ChatML system blocks per tab
function buildTabContext(tab) {
  const messages = [];
  // DSL spec as system block
  if (_dslSpec) messages.push({ role: 'system', content: _dslSpec });
  // Tab-specific context
  switch (tab) {
    case 'yaml':
      messages.push({ role: 'system', content: 'Current Workflow YAML:\n' + (document.getElementById('rs-editor')?.value || '') });
      break;
    case 'tree-dsl': {
      const cards = Object.entries(cardTemplates).map(([n,t]) =>
        `${n} (icon:${t.icon}): [${t.slots.map(s => s.type + (s.bind ? ':' + s.bind : '')).join(', ')}]`
      ).join('\n');
      messages.push({ role: 'system', content: 'Tree DSL:\n' + (document.getElementById('tree-dsl-editor')?.value || '') + '\n\nCard templates:\n' + cards });
      break;
    }
    case 'bindings':
      messages.push({ role: 'system', content: 'Bindings:\n' + (document.getElementById('bindings-editor')?.value || '') + '\n\nDataStore keys: ' + dsKeys().join(', ') });
      break;
    case 'components': {
      const modeSelect = document.getElementById('compModeSelect');
      const mode = modeSelect ? modeSelect.value : 'template';
      const content = document.getElementById('comp-editor')?.value || '';
      if (mode === 'fieldmap') {
        messages.push({ role: 'system', content: 'FieldMap DSL:\n' + content + '\n\nSlot types: ' + Object.keys(_componentTemplates).join(', ') });
      } else {
        const typeSelect = document.getElementById('compTypeSelect');
        const type = typeSelect ? typeSelect.value : '';
        const syntax = 'Syntax: tag.class [data-attr="val"] {style}: text  ?condition  @loop items\nPseudo-tags: @text, @loop, @fragment\nInterpolation: {{field}}, {{item.field}}, {{C.configKey}}';
        messages.push({ role: 'system', content: 'Component Template "' + type + '":\n' + content + '\n\n' + syntax });
      }
      break;
    }
  }
  return messages;
}

function getTabEditor(tab) {
  switch (tab) {
    case 'yaml': return document.getElementById('rs-editor');
    case 'tree-dsl': return document.getElementById('tree-dsl-editor');
    case 'bindings': return document.getElementById('bindings-editor');
    case 'components': return document.getElementById('comp-editor');
  }
  return null;
}

function onTabApplied(tab) {
  if (tab === 'bindings') importBindingsDSL();
  else if (tab === 'components') applyComponentEditor();
  else if (tab === 'tree-dsl') renderTree();
}

// ── Apply: LLM modifies content ──
async function tabChatApply(tab) {
  const bar = document.querySelector(`[data-tab-chat="${tab}"]`);
  const inp = bar?.querySelector('textarea');
  if (!inp) return;
  const instruction = inp.value.trim();
  if (!instruction) return;
  inp.value = '';

  const worker = getWorkerByRole('generator') || getWorkerByRole('analyzer') || workers[0];
  if (!worker) { log('ERROR: no worker'); return; }

  addTabChatMsg(tab, 'system', 'Apply: ' + instruction);
  setStatus('applying...', 'busy');

  try {
    await getDslSpec();
    const ctxMsgs = buildTabContext(tab);
    const patchHint = (tab === 'yaml' || tab === 'bindings' || tab === 'tree-dsl')
      ? '\n\nRespond as:\n1. Full modified content (large changes)\n2. JSON set_path patches: [{"set_path":"key","value":"..."}]\nChoose efficient format. No prose.'
      : '\n\nReturn ONLY the modified content. No prose, no fences.';
    const messages = [...ctxMsgs, { role: 'user', content: instruction + patchHint }];

    _chatAbort = new AbortController();
    const res = await post('/api/llm/generate', {
      url: worker.url, messages, temperature: 0.2, max_tokens: 4096, no_think: true, max_continue: 5,
    }, { signal: _chatAbort.signal });
    _chatAbort = null;

    if (res.answer) {
      let text = res.answer.trim().replace(/^```[a-z]*\n?/, '').replace(/\n?```$/, '');
      const editor = getTabEditor(tab);
      // Try patches
      let patched = false;
      if (tab === 'yaml' || tab === 'bindings' || tab === 'tree-dsl') {
        try {
          const parsed = JSON.parse(text);
          if (Array.isArray(parsed) && parsed.length && parsed[0].set_path) {
            const patchRes = await post('/api/workflow/patch', { yaml: editor?.value || '', patches: parsed });
            if (patchRes.yaml) { if (editor) editor.value = patchRes.yaml; patched = true; addTabChatMsg(tab, 'system', parsed.length + ' patch(es) applied'); }
          }
        } catch(_) {}
      }
      if (!patched) {
        if (editor) editor.value = text;
        addTabChatMsg(tab, 'system', 'Content updated');
      }
      onTabApplied(tab);
    }
    setStatus('idle', 'idle');
  } catch (e) {
    _chatAbort = null;
    if (e.name === 'AbortError') { addTabChatMsg(tab, 'system', 'Cancelled'); setStatus('idle', 'idle'); }
    else { addTabChatMsg(tab, 'system', 'Error: ' + e.message); setStatus('error', 'error'); }
  }
}

// ── Ask: read-only Q&A, no modification ──
async function tabChatAsk(tab) {
  const bar = document.querySelector(`[data-tab-ask="${tab}"]`);
  const inp = bar?.querySelector('textarea');
  if (!inp) return;
  const question = inp.value.trim();
  if (!question) return;
  inp.value = '';

  const worker = getWorkerByRole('generator') || workers[0];
  if (!worker) { log('ERROR: no worker'); return; }

  addTabChatMsg(tab, 'user', question);
  setStatus('asking...', 'busy');

  try {
    await getDslSpec();
    const ctxMsgs = buildTabContext(tab);
    const messages = [...ctxMsgs, { role: 'user', content: question + '\n\nAnswer concisely.' }];

    _chatAbort = new AbortController();
    const res = await post('/api/llm/generate', {
      url: worker.url, messages, temperature: 0.4, max_tokens: 2048, no_think: true, max_continue: 5,
    }, { signal: _chatAbort.signal });
    _chatAbort = null;

    addTabChatMsg(tab, 'assistant', res.answer || '(no response)');
    setStatus('idle', 'idle');
  } catch (e) {
    _chatAbort = null;
    if (e.name !== 'AbortError') { addTabChatMsg(tab, 'system', 'Error: ' + e.message); setStatus('error', 'error'); }
    else setStatus('idle', 'idle');
  }
}

// ── Wire bindings tab buttons ───────────────────────────
document.getElementById('btnBindingsExport').addEventListener('click', exportBindingsDSL);
document.getElementById('btnBindingsImport').addEventListener('click', importBindingsDSL);
document.getElementById('btnBindingsClear').addEventListener('click', () => {
  if (confirm('Clear all bindings?')) {
    _bindings = [];
    _saveBindings();
    exportBindingsDSL();
    log('bindings cleared');
  }
});

// ── Wire components tab buttons ─────────────────────────
document.getElementById('btnCompApply').addEventListener('click', applyComponentEditor);
document.getElementById('btnCompReset').addEventListener('click', resetComponentEditor);
document.getElementById('compModeSelect').addEventListener('change', renderComponentsTab);
document.getElementById('compTypeSelect').addEventListener('change', renderComponentsTab);

// ── Wire tab Apply bars ─────────────────────────────────
document.querySelectorAll('[data-tab-chat]').forEach(bar => {
  const tab = bar.dataset.tabChat;
  const applyBtn = bar.querySelector('[data-tab-apply]');
  const textarea = bar.querySelector('textarea');
  if (applyBtn) applyBtn.addEventListener('click', () => tabChatApply(tab));
  if (textarea) {
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); tabChatApply(tab); }
    });
    autoResize(textarea, 80);
  }
});
// ── Wire tab Ask bars ───────────────────────────────────
document.querySelectorAll('[data-tab-ask]').forEach(bar => {
  const tab = bar.dataset.tabAsk;
  const askBtn = bar.querySelector('button');
  const textarea = bar.querySelector('textarea');
  if (askBtn) askBtn.addEventListener('click', () => tabChatAsk(tab));
  if (textarea) {
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); tabChatAsk(tab); }
    });
    autoResize(textarea, 60);
  }
});

// ── Init ───────────────────────────────────────────────
renderWorkers();
renderVarsFull();
renderConsole();
renderTree();
setTimeout(probeAll, 1000);
setInterval(probeAll, 15000);
log('workflow UI ready');
</script>
