<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workflow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #1a1b26;
  --surface: #24283b;
  --surface2: #2f3349;
  --border: #3b4261;
  --text: #c0caf5;
  --text-dim: #565f89;
  --accent: #7aa2f7;
  --accent2: #bb9af7;
  --accent3: #7dcfff;
  --green: #9ece6a;
  --red: #f7768e;
  --orange: #ff9e64;
  --yellow: #e0af68;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Consolas','Monaco','Courier New',monospace; font-size:13px; overflow:hidden; }

/* ── header ── */
.header { display:flex; align-items:center; padding:0 12px; height:36px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; gap:8px; }
.header h1 { font-size:14px; font-weight:600; color:var(--accent); white-space:nowrap; }
.header-tabs { display:flex; gap:0; margin-left:16px; }
.header-tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--text-dim); padding:6px 14px; font-family:inherit; font-size:12px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:1px; }
.header-tab:hover { color:var(--text); }
.header-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.header-tab .tab-layer { font-size:9px; opacity:.6; }
.hdr-status { display:flex; align-items:center; gap:5px; margin-left:12px; }
.hdr-status .dot { width:7px; height:7px; border-radius:50%; }
.hdr-status .dot.ok { background:var(--green); }
.hdr-status .dot.busy { background:var(--orange); animation:pulse .8s infinite; }
.hdr-status .dot.idle { background:var(--text-dim); }
.hdr-status .dot.error { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.hdr-status span { font-size:11px; color:var(--text-dim); }
.hdr-right { margin-left:auto; display:flex; gap:4px; align-items:center; }

/* ── layout ── */
#app { display:flex; flex-direction:column; height:100%; }
#main { display:flex; flex:1; min-height:0; }
#sidebar { width:200px; min-width:140px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); flex-shrink:0; }
#center { flex:1; display:flex; flex-direction:column; min-width:0; }
#right-sidebar { width:340px; min-width:200px; border-left:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); flex-shrink:0; transition:width .15s; overflow:hidden; }
#right-sidebar.collapsed { width:0; min-width:0; border:none; padding:0; }

/* ── sidebar ── */
#sidebar h3 { padding:8px 10px 4px; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.sidebar-section { padding:4px 8px; }
#worker-list { flex:1; overflow-y:auto; padding:2px 8px; }
.worker-card { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:5px 7px; margin-bottom:3px; font-size:11px; display:flex; align-items:center; gap:5px; }
.worker-card .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.worker-card .dot.ok { background:var(--green); }
.worker-card .dot.fail { background:var(--red); }
.worker-card .dot.unknown { background:var(--text-dim); }
.worker-card .info { flex:1; min-width:0; }
.worker-card .url { color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:block; font-size:10px; }
.worker-card .role-input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:1px 4px; width:72px; font-size:10px; font-family:inherit; border-radius:2px; margin-top:1px; }
.worker-card .btn-x { background:none; border:none; color:var(--red); cursor:pointer; font-size:13px; padding:0 2px; }
.add-row { display:flex; gap:3px; }
.add-row input { flex:1; min-width:0; font-size:11px; padding:3px 5px; }
.add-row button { font-size:11px; padding:3px 8px; }

/* ── inputs & buttons ── */
input, textarea, select { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:4px 6px; font-family:inherit; font-size:12px; border-radius:3px; outline:none; }
input:focus, textarea:focus { border-color:var(--accent); }
button, .btn { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 10px; font-family:inherit; font-size:12px; border-radius:3px; cursor:pointer; white-space:nowrap; }
button:hover, .btn:hover { background:var(--border); }
button.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); }
button.primary:hover { opacity:0.85; }
button.sm { font-size:10px; padding:2px 7px; }

/* ── feed ── */
#feed { flex:1; overflow-y:auto; padding:8px 10px; }
.msg { margin-bottom:5px; padding:5px 7px; border-radius:4px; border-left:3px solid var(--border); background:var(--surface); }
.msg.role-user { border-left-color:var(--accent); }
.msg.role-assistant, .msg.role-worker { border-left-color:var(--green); }
.msg.role-system { border-left-color:var(--orange); }
.msg.role-verifier { border-left-color:var(--accent2); }
.msg-header { display:flex; gap:5px; align-items:center; margin-bottom:2px; }
.msg-role { font-size:10px; text-transform:uppercase; font-weight:bold; padding:1px 5px; border-radius:2px; }
.role-user .msg-role { background:var(--accent); color:var(--bg); }
.role-assistant .msg-role, .role-worker .msg-role { background:var(--green); color:var(--bg); }
.role-system .msg-role { background:var(--orange); color:var(--bg); }
.role-verifier .msg-role { background:var(--accent2); color:var(--bg); }
.msg-name { color:var(--text-dim); font-size:11px; }
.msg-tag { font-size:10px; color:var(--accent3); background:var(--bg); padding:0 4px; border-radius:2px; }
.msg-content { white-space:pre-wrap; word-break:break-word; line-height:1.4; font-size:12px; }
.msg-think { margin-top:3px; }
.msg-think summary { color:var(--text-dim); font-size:11px; cursor:pointer; }
.msg-think pre { background:var(--bg); padding:4px 6px; border-radius:3px; font-size:11px; white-space:pre-wrap; max-height:200px; overflow-y:auto; margin-top:2px; color:var(--text-dim); }

/* ── input bar ── */
#input-bar { padding:6px 10px; border-top:1px solid var(--border); display:flex; gap:5px; background:var(--surface); flex-shrink:0; }
#input-bar textarea { flex:1; resize:none; min-height:28px; max-height:100px; font-size:12px; }
#input-bar button { align-self:flex-end; }

/* ── right sidebar internals ── */
.rs-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
.rs-tab { background:none; border:none; border-bottom:2px solid transparent; color:var(--text-dim); padding:5px 10px; font-family:inherit; font-size:11px; cursor:pointer; }
.rs-tab:hover { color:var(--text); }
.rs-tab.active { color:var(--accent2); border-bottom-color:var(--accent2); }
#rs-editor { flex:1; resize:none; border:none; padding:8px; font-size:12px; line-height:1.4; min-height:0; }
#rs-nl-bar { padding:5px 8px; border-top:1px solid var(--border); display:flex; gap:4px; align-items:flex-end; flex-shrink:0; }
#rs-nl-bar textarea { flex:1; resize:none; min-height:26px; max-height:80px; font-size:11px; padding:3px 6px; }
#rs-ask-area { flex:0 0 30%; min-height:60px; display:flex; flex-direction:column; border-top:1px solid var(--border); }
#rs-ask-bar { padding:4px 8px; display:flex; gap:4px; align-items:flex-end; flex-shrink:0; }
#rs-ask-bar textarea { flex:1; resize:none; min-height:24px; max-height:60px; font-size:11px; padding:3px 6px; }
#rs-ask-chat { flex:1; overflow-y:auto; padding:4px 8px; font-size:11px; }
.ask-msg { margin-bottom:4px; padding:3px 6px; border-radius:3px; }
.ask-msg.ask-user { background:var(--surface2); color:var(--accent); }
.ask-msg.ask-assistant { background:var(--bg); color:var(--text); }
.ask-msg .ask-ts { font-size:9px; color:var(--text-dim); margin-right:4px; }

/* ── console ── */
#console-panel { border-top:1px solid var(--border); background:var(--bg); max-height:130px; overflow-y:auto; flex-shrink:0; display:none; }
#console-panel.open { display:block; }
.console-hdr { display:flex; align-items:center; gap:6px; padding:4px 10px; font-size:10px; color:var(--text-dim); border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:1; }
#console-entries { padding:2px 10px 4px; }
.console-entry { font-size:11px; color:var(--text-dim); line-height:1.5; }
.console-entry .ts { opacity:.5; margin-right:4px; }

/* ── vars panel ── */
#vars-panel { border-top:1px solid var(--border); background:var(--surface); max-height:180px; overflow-y:auto; display:none; flex-shrink:0; }
#vars-panel.open { display:block; }
#vars-panel h4 { padding:4px 10px 2px; font-size:10px; color:var(--text-dim); text-transform:uppercase; cursor:pointer; display:flex; justify-content:space-between; }
#vars-content { padding:2px 10px 6px; font-size:11px; }
.var-row { display:flex; gap:6px; margin-bottom:1px; }
.var-key { color:var(--accent3); min-width:70px; flex-shrink:0; }
.var-val { color:var(--text); white-space:pre-wrap; word-break:break-word; }

/* ── settings overlay ── */
#settings-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center; }
#settings-overlay.open { display:flex; }
#settings-popup { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; min-width:280px; box-shadow:0 8px 32px rgba(0,0,0,.5); }
#settings-popup h3 { margin-bottom:10px; color:var(--accent); font-size:14px; }
#settings-popup label { display:block; margin-top:8px; font-size:11px; color:var(--text-dim); }
#settings-popup input[type=number] { width:100%; margin-top:2px; }
#settings-popup .row { display:flex; gap:8px; align-items:center; margin-top:8px; }

/* ── scrollbar ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-dim); }

/* ── resize handle ── */
.resize-h { width:4px; cursor:col-resize; background:transparent; flex-shrink:0; }
.resize-h:hover { background:var(--accent); opacity:0.3; }

/* ── card tree ── */
#tree { flex:1; overflow-y:auto; padding:8px 10px; }
.node { margin-bottom:4px; border:1px solid var(--border); border-radius:4px; background:var(--surface); }
.node.status-done { border-left:3px solid var(--green); }
.node.status-active { border-left:3px solid var(--orange); }
.node.status-fail { border-left:3px solid var(--red); }
.node.status-pending { border-left:3px solid var(--text-dim); }

.node-hdr { display:flex; align-items:center; gap:5px; padding:5px 8px; cursor:pointer; user-select:none; }
.node-hdr:hover { background:var(--surface2); }
.node-arrow { font-size:9px; color:var(--text-dim); transition:transform .15s; display:inline-block; width:10px; }
.node-arrow.open { transform:rotate(90deg); }
.node-icon { font-size:11px; width:16px; text-align:center; }
.node-title { font-size:12px; font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.node-badge { font-size:9px; padding:1px 5px; border-radius:2px; text-transform:uppercase; font-weight:bold; }
.node-badge.done { background:var(--green); color:var(--bg); }
.node-badge.active { background:var(--orange); color:var(--bg); }
.node-badge.fail { background:var(--red); color:var(--bg); }
.node-badge.pending { background:var(--surface2); color:var(--text-dim); }
.node-count { font-size:9px; color:var(--text-dim); }
.node-time { font-size:9px; color:var(--text-dim); }

.node-body { display:none; padding:0 8px 6px 28px; }
.node-body.open { display:block; }

.node-tags { display:flex; flex-wrap:wrap; gap:3px; margin-bottom:4px; }
.node-tag { font-size:10px; padding:2px 6px; border-radius:3px; background:var(--bg); border:1px solid var(--border); color:var(--accent3); max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:default; }
.node-tag:hover { border-color:var(--accent3); }
.node-tag.green { color:var(--green); border-color:rgba(158,206,106,.3); }

.node-answer { margin:4px 0; }
.node-answer-hdr { font-size:10px; color:var(--text-dim); margin-bottom:2px; display:flex; align-items:center; gap:4px; }
.node-answer-hdr .label { text-transform:uppercase; letter-spacing:.5px; flex:1; }
.node-answer-hdr button { font-size:10px; padding:1px 6px; }
.node-answer-hdr .btn-verify { color:var(--green); border-color:var(--green); }
.node-answer-hdr .btn-check { color:var(--accent3); border-color:var(--accent3); }
.node-answer-hdr .btn-generate { color:var(--accent2); border-color:var(--accent2); }
.node-answer-ta { background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:4px 6px; font-size:11px; width:100%; min-height:40px; max-height:250px; resize:vertical; font-family:inherit; line-height:1.4; color:var(--text); }
.node-answer-ta.empty { color:var(--text-dim); font-style:italic; min-height:24px; }
.node-answer-apply { display:none; margin-top:2px; font-size:10px; padding:1px 8px; }
.node-answer-apply.show { display:inline-block; }
.node-image { margin-top:4px; }
.node-image img { max-width:100%; max-height:300px; border-radius:4px; border:1px solid var(--border); cursor:pointer; }
.node-image img:hover { border-color:var(--accent); }

.node-lists { margin:4px 0; }
.node-list-hdr { font-size:10px; color:var(--text-dim); cursor:pointer; padding:2px 0; display:flex; align-items:center; gap:4px; }
.node-list-hdr .arrow { font-size:8px; display:inline-block; transition:transform .15s; }
.node-list-hdr .arrow.open { transform:rotate(90deg); }
.node-list-body { display:none; padding-left:12px; }
.node-list-body.open { display:block; }
.node-list-item { font-size:11px; padding:1px 0; display:flex; gap:4px; }
.node-list-item .bullet { color:var(--text-dim); }
.node-list-item.entity { color:var(--accent3); }
.node-list-item.axiom { color:var(--green); }
.node-list-item.hypothesis { color:var(--yellow); }

.node-thread-bar { font-size:10px; color:var(--text-dim); cursor:pointer; padding:3px 0; display:flex; align-items:center; gap:4px; border-top:1px solid var(--border); margin-top:4px; }
.node-thread-bar .arrow { font-size:8px; display:inline-block; transition:transform .15s; }
.node-thread-bar .arrow.open { transform:rotate(90deg); }
.node-thread-wrap { display:none; }
.node-thread-wrap.open { display:block; }
.node-thread-msgs { max-height:300px; overflow-y:auto; }

.node-tmsg { display:flex; gap:5px; padding:3px 0; border-bottom:1px solid rgba(59,66,97,.3); }
.node-tmsg-ava { width:20px; height:20px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold; flex-shrink:0; color:var(--bg); }
.node-tmsg-ava.user { background:var(--accent); }
.node-tmsg-ava.assistant, .node-tmsg-ava.worker { background:var(--green); }
.node-tmsg-ava.system { background:var(--orange); }
.node-tmsg-body { flex:1; min-width:0; }
.node-tmsg-nick { font-size:10px; font-weight:600; margin-bottom:1px; }
.node-tmsg-text { font-size:11px; white-space:pre-wrap; word-break:break-word; line-height:1.4; }

.node-thread-input { display:flex; gap:3px; margin-top:3px; }
.node-thread-input textarea { flex:1; resize:none; min-height:24px; max-height:60px; font-size:11px; padding:3px 5px; }
.node-thread-input button { font-size:10px; padding:2px 8px; align-self:flex-end; }

.node-actions { display:flex; gap:3px; margin-top:4px; padding-top:4px; border-top:1px solid var(--border); }
.node-actions button { font-size:10px; padding:2px 6px; }

.node-reactions { display:flex; flex-wrap:wrap; gap:3px; margin:4px 0; padding:3px 0; border-top:1px solid var(--border); }
.node-reaction { font-size:12px; padding:2px 6px; border-radius:3px; background:var(--bg); border:1px solid var(--border); cursor:default; display:inline-flex; align-items:center; gap:2px; }
.node-reaction.pass { border-color:rgba(158,206,106,.4); background:rgba(158,206,106,.1); }
.node-reaction.fail { border-color:rgba(247,118,142,.4); background:rgba(247,118,142,.1); }
.node-reaction .reaction-count { font-size:10px; color:var(--text-dim); }
.node-reaction.add-reaction { cursor:pointer; color:var(--text-dim); font-size:11px; border-style:dashed; }
.node-reaction.add-reaction:hover { border-color:var(--accent); color:var(--accent); }

.node-children { padding-left:16px; margin-top:2px; }

/* ── Schema page ── */
#page-schema { display:none; flex-direction:row; gap:0; min-height:0; overflow:hidden; }
#page-schema.show { display:flex; }
.schema-panel { flex:1; display:flex; flex-direction:column; min-height:0; overflow-y:auto; padding:8px; border-right:1px solid var(--border); }
.schema-panel:last-child { border-right:none; }
.schema-panel h3 { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
.schema-panel h3 button { font-size:10px; padding:1px 6px; }

/* type list */
.stype-item { background:var(--surface); border:1px solid var(--border); border-radius:4px; margin-bottom:4px; }
.stype-hdr { display:flex; align-items:center; gap:5px; padding:4px 7px; cursor:pointer; font-size:12px; }
.stype-hdr:hover { background:var(--surface2); }
.stype-hdr .arrow { font-size:9px; color:var(--text-dim); transition:transform .15s; }
.stype-hdr .arrow.open { transform:rotate(90deg); }
.stype-hdr .stype-icon { width:18px; text-align:center; }
.stype-hdr .stype-name { flex:1; font-weight:600; }
.stype-hdr .stype-count { font-size:10px; color:var(--text-dim); }
.stype-hdr .stype-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; padding:0 2px; opacity:.5; }
.stype-hdr .stype-del:hover { opacity:1; }
.stype-body { display:none; padding:4px 7px 6px 24px; border-top:1px solid var(--border); }
.stype-body.open { display:block; }

/* slot rows */
.slot-row { display:flex; align-items:center; gap:4px; padding:2px 0; font-size:11px; border-bottom:1px solid rgba(59,66,97,.3); }
.slot-row:last-child { border-bottom:none; }
.slot-row select, .slot-row input { font-size:10px; padding:1px 3px; height:20px; }
.slot-row select { width:70px; }
.slot-row .slot-bind { width:70px; }
.slot-row .slot-label { width:60px; }
.slot-row .slot-color { width:55px; }
.slot-row .slot-move { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:11px; padding:0 1px; }
.slot-row .slot-move:hover { color:var(--accent); }
.slot-row .slot-rm { background:none; border:none; color:var(--red); cursor:pointer; font-size:11px; padding:0 2px; opacity:.5; }
.slot-row .slot-rm:hover { opacity:1; }
.slot-add-row { margin-top:4px; }

/* icon editor inline */
.stype-icon-edit { width:24px; text-align:center; font-size:12px; padding:1px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:2px; }

/* type preview */
.stype-preview { margin-top:6px; padding:6px; background:var(--bg); border:1px solid var(--border); border-radius:4px; max-height:180px; overflow-y:auto; }
.stype-preview .node { border:none; margin:0; padding:0; }

/* flow steps */
.flow-step { background:var(--surface); border:1px solid var(--border); border-radius:4px; margin-bottom:4px; padding:6px 8px; display:flex; align-items:center; gap:5px; font-size:11px; position:relative; }
.flow-step::before { content:''; position:absolute; left:50%; top:-5px; width:1px; height:5px; background:var(--border); }
.flow-step:first-child::before { display:none; }
.flow-step select, .flow-step input { font-size:10px; padding:1px 3px; height:20px; }
.flow-step .step-type { width:80px; }
.flow-step .step-name { width:70px; }
.flow-step .step-worker { width:70px; }
.flow-step .step-var { width:60px; }
.flow-step .step-arrow { color:var(--green); margin:0 2px; }
.flow-step .step-rm { background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; padding:0 2px; opacity:.5; }
.flow-step .step-rm:hover { opacity:1; }
.flow-step .step-move { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:11px; padding:0 1px; }
.flow-step .step-move:hover { color:var(--accent); }

/* new type dialog */
.schema-inline-form { display:flex; gap:3px; margin-bottom:6px; }
.schema-inline-form input { font-size:11px; padding:2px 4px; }

/* ── Component rendering DSL ── */
.node-display { padding:4px 8px; }
.node-display .display-label { font-size:10px; text-transform:uppercase; color:var(--text-dim); margin-bottom:2px; }
.node-display .display-text { white-space:pre-wrap; font-size:12px; color:var(--text); }
.node-form { padding:4px 8px; }
.node-form .qf-item { margin-bottom:6px; }
.node-form .qf-item label { display:block; font-size:11px; color:var(--accent); margin-bottom:2px; }
.node-form .qf-hint { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
.node-form .qf-item input, .node-form .qf-item textarea { width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); padding:4px 6px; font-size:12px; font-family:inherit; border-radius:3px; resize:vertical; }
.node-form .qf-item input:focus, .node-form .qf-item textarea:focus { border-color:var(--accent); outline:none; }
.node-data-table { padding:4px 8px; }
.node-data-table .data-table-label { font-size:10px; text-transform:uppercase; color:var(--text-dim); margin-bottom:2px; }
.node-data-table table { width:100%; border-collapse:collapse; font-size:11px; }
.node-data-table th { text-align:left; padding:2px 6px; border-bottom:1px solid var(--border); color:var(--accent); font-weight:600; }
.node-data-table td { padding:2px 6px; border-bottom:1px solid var(--border); color:var(--text); }
.tab-chat-feed { flex:0 0 30%; min-height:60px; overflow-y:auto; padding:4px 8px; border-top:1px solid var(--border); font-size:11px; }
.tab-chat-feed:empty::before { content:'Chat history appears here'; color:var(--text-dim); font-size:10px; }
.tab-chat-feed .chat-msg { margin-bottom:6px; }
.tab-chat-feed .chat-label { font-weight:600; font-size:10px; }
.tab-chat-feed .chat-label.user { color:var(--accent); }
.tab-chat-feed .chat-label.assistant { color:var(--green); }
.tab-chat-feed .chat-label.system { color:var(--orange); }
.tab-chat-feed .chat-text { white-space:pre-wrap; margin-top:1px; color:var(--text); font-size:11px; }
.tab-chat-bar { padding:4px 8px; display:flex; gap:4px; align-items:flex-end; flex-shrink:0; border-top:1px solid var(--border); }
.tab-chat-bar textarea { flex:1; resize:none; min-height:24px; max-height:60px; font-size:11px; padding:3px 6px; }
.rs-nl-bar { padding:5px 8px; border-top:1px solid var(--border); display:flex; gap:4px; align-items:flex-end; flex-shrink:0; }
.rs-nl-bar textarea { flex:1; resize:none; min-height:26px; max-height:80px; font-size:11px; padding:3px 6px; }
</style>
</head>
<body>

<script>
// ── State ──────────────────────────────────────────────
let workers = [];
try { workers = JSON.parse(localStorage.getItem('reactive_workers') || '[]'); } catch(_) {}

let currentRunId = null;
let pollTimer = null;
let pollCursor = 0;
let lastVars = {};
let wfChatMessages = [];
let _activePage = 'tree';
let _activeRsTab = 'yaml';

// undo
let _undoStack = [];
let _log = [];

// ── Component Rendering DSL ────────────────────────────
// _componentConfig: per-slot-type rendering config
// _fieldMap: maps data keys to display names + formatting
// _componentTemplates: DSL template strings per slot type
// renderFromTemplate / renderSlotFromTemplate: template-driven rendering
// componentToDSL / parseDSLComponent: round-trip DSL <-> object
// fieldMapToDSL / parseFieldMapDSL: round-trip FieldMap <-> object

const _componentConfig = {
  tags:       { renderer: 'tags',       label: 'Tags',       icon: '#' },
  text:       { renderer: 'text',       label: 'Text',       icon: 'T' },
  list:       { renderer: 'list',       label: 'List',       icon: 'L' },
  thread:     { renderer: 'thread',     label: 'Thread',     icon: 'C' },
  reactions:  { renderer: 'reactions',  label: 'Reactions',  icon: 'R' },
  actions:    { renderer: 'actions',    label: 'Actions',    icon: 'A' },
  children:   { renderer: 'children',   label: 'Children',   icon: '+' },
  display:    { renderer: 'display',    label: 'Display',    icon: 'D' },
  form:       { renderer: 'form',       label: 'Form',       icon: 'F' },
  image:      { renderer: 'image',      label: 'Image',      icon: 'I' },
  data_table: { renderer: 'data_table', label: 'Data Table', icon: 'T' },
  chat:       { renderer: 'chat',       label: 'Chat',       icon: 'C' },
};

// FieldMap: maps raw data keys to display names + formatting hints
// { dataKey: { label, format?, color?, hide? } }
let _fieldMap = {};
try { _fieldMap = JSON.parse(localStorage.getItem('wf_fieldmap') || '{}'); } catch(_) {}

function R(key, ctx) {
  // Resolve a key through fieldMap: returns {label, value, color, hide}
  const fm = _fieldMap[key] || {};
  const label = fm.label || key;
  const color = fm.color || '';
  const hide = fm.hide || false;
  let value = ctx && ctx[key] !== undefined ? ctx[key] : '';
  if (fm.format === 'json' && typeof value === 'object') value = JSON.stringify(value, null, 2);
  if (fm.format === 'truncate' && typeof value === 'string' && value.length > 200) value = value.slice(0, 197) + '...';
  return { label, value, color, hide, key };
}

// ── Component Templates (DSL strings per slot type) ────
// Each template is a multi-line string that renderFromTemplate() evaluates.
// Supports: {{bind}}, {{label}}, {{#if bind}}...{{/if}}, {{#each items}}...{{/each}}, {{#loop arr}}...{{/loop}}
const _componentTemplates = {
  tags: `<div class="node-tags">{{#each tags}}<span class="node-tag{{#if green}} green{{/if}}" title="{{key}}: {{value}}">{{key}}: {{display}}</span>{{/each}}</div>`,
  text: `<div class="node-answer">
  <div class="node-answer-hdr"><span class="label">{{label}}</span>{{#each buttons}}<button class="btn sm" style="{{colorStyle}}" data-event="{{event}}" data-node="{{nodeId}}">{{label}}</button>{{/each}}</div>
  <textarea class="node-answer-ta{{emptyCls}}" data-ans="{{nodeId}}:{{bind}}" placeholder="(pending...)">{{text}}</textarea>
  <button class="btn sm node-answer-apply" data-apply-ans="{{nodeId}}:{{bind}}">Apply changes</button>
  {{#if think}}<details class="msg-think" style="margin-top:3px;"><summary>think</summary><pre>{{think}}</pre></details>{{/if}}
  {{#if imageUrl}}<div class="node-image"><img src="{{imageUrl}}" alt="Generated" loading="lazy" /></div>{{/if}}
</div>`,
  list: `{{#if hasItems}}<div class="node-lists">
  <div class="node-list-hdr" data-list-toggle="{{key}}"><span class="arrow{{#if isOpen}} open{{/if}}">&#9654;</span> {{label}} <span style="opacity:.5">{{count}}</span></div>
  <div class="node-list-body{{#if isOpen}} open{{/if}}" data-list-body="{{key}}">{{#loop items}}<div class="node-list-item" style="{{color}}"><span class="bullet">&#8226;</span>{{text}}</div>{{/loop}}</div>
</div>{{/if}}`,
  thread: `<div class="node-thread-bar" data-thread-toggle="{{nodeId}}">
  <span class="arrow{{#if threadOpen}} open{{/if}}">&#9654;</span> Thread <span style="opacity:.5">{{count}}</span>
</div>
<div class="node-thread-wrap{{#if threadOpen}} open{{/if}}" data-thread-wrap="{{nodeId}}">
  <div class="node-thread-msgs">{{#loop msgs}}{{msgHtml}}{{/loop}}</div>
  <div class="node-thread-input"><textarea placeholder="Reply..." data-tinp="{{nodeId}}" rows="1"></textarea><button class="btn sm" data-tsend="{{nodeId}}">Send</button></div>
</div>`,
  reactions: `{{#if hasReactions}}<div class="node-reactions">{{#loop groups}}<span class="node-reaction {{statusCls}}" title="{{tooltip}}">{{emoji}}<span class="reaction-count">{{countDisplay}}</span></span>{{/loop}}<button class="node-reaction add-reaction" data-event="add_reaction" data-node="{{nodeId}}" title="Add reaction">+</button></div>{{/if}}`,
  actions: `<div class="node-actions">{{#each items}}<button class="btn sm" style="{{colorStyle}}" data-event="{{event}}" data-node="{{nodeId}}">{{label}}</button>{{/each}}</div>`,
  children: `<div class="node-children" data-children="{{nodeId}}"></div>`,
  display: `<div class="node-display"><div class="display-label">{{label}}</div><div class="display-text">{{text}}</div></div>`,
  form: `<div class="node-form">{{#each fields}}<div class="qf-item"><label>{{label}}</label>{{#if hint}}<div class="qf-hint">{{hint}}</div>{{/if}}<{{element}} data-form-field="{{nodeId}}:{{bind}}" {{attrs}}>{{innerText}}</{{element}}></div>{{/each}}</div>`,
  image: `{{#if src}}<div class="node-image"><img src="{{src}}" alt="{{alt}}" loading="lazy" style="max-width:100%;max-height:300px;border-radius:4px;border:1px solid var(--border);" /></div>{{/if}}`,
  data_table: `{{#if hasRows}}<div class="node-data-table"><div class="data-table-label">{{label}}</div><table><thead><tr>{{#each cols}}<th>{{.}}</th>{{/each}}</tr></thead><tbody>{{#loop rows}}<tr>{{#each cells}}<td>{{.}}</td>{{/each}}</tr>{{/loop}}</tbody></table></div>{{/if}}`,
  chat: `<div class="tab-chat-feed" data-chat-feed="{{nodeId}}:{{bind}}"></div><div class="tab-chat-bar" data-chat-bar="{{nodeId}}:{{bind}}"><textarea placeholder="Chat..." rows="1"></textarea><button class="btn sm primary" data-chat-send="{{nodeId}}:{{bind}}">Send</button></div>`,
};

// Save defaults for reset
const _defaultComponentTemplates = {};
for (const [k, v] of Object.entries(_componentTemplates)) _defaultComponentTemplates[k] = v;

// Load saved component templates
try {
  const saved = JSON.parse(localStorage.getItem('wf_comp_templates') || 'null');
  if (saved) for (const [k, v] of Object.entries(saved)) _componentTemplates[k] = v;
} catch(_) {}

function _saveComponentTemplates() {
  try { localStorage.setItem('wf_comp_templates', JSON.stringify(_componentTemplates)); } catch(_) {}
}

// ── Template resolution helpers ────────────────────────
function _resolveText(tpl, ctx) {
  // Simple mustache-like: replace {{key}} with ctx[key]
  return tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => {
    const v = ctx[k];
    return v == null ? '' : esc(String(v));
  });
}

function _resolveRaw(tpl, ctx) {
  // Like _resolveText but no escaping (for pre-built HTML)
  return tpl.replace(/\{\{(\w+)\}\}/g, (_, k) => {
    const v = ctx[k];
    return v == null ? '' : String(v);
  });
}

function _checkIf(tpl, ctx) {
  // Handle {{#if key}}...{{/if}}
  return tpl.replace(/\{\{#if (\w+)\}\}([\s\S]*?)\{\{\/if\}\}/g, (_, k, body) => {
    return ctx[k] ? body : '';
  });
}

// ── renderFromTemplate: full template engine ───────────
function renderFromTemplate(type, ctx) {
  let tpl = _componentTemplates[type];
  if (!tpl) return '';
  // Process conditionals
  tpl = _checkIf(tpl, ctx);
  // Process {{#each arr}}...{{/each}} — arr must be pre-built array of ctx objects
  tpl = tpl.replace(/\{\{#each (\w+)\}\}([\s\S]*?)\{\{\/each\}\}/g, (_, arrKey, body) => {
    const arr = ctx[arrKey];
    if (!Array.isArray(arr)) return '';
    return arr.map(item => {
      if (typeof item === 'object') return _resolveRaw(_checkIf(body, item), item);
      return body.replace(/\{\{\.\}\}/g, esc(String(item)));
    }).join('');
  });
  // Process {{#loop arr}}...{{/loop}} — same as each but for raw HTML items
  tpl = tpl.replace(/\{\{#loop (\w+)\}\}([\s\S]*?)\{\{\/loop\}\}/g, (_, arrKey, body) => {
    const arr = ctx[arrKey];
    if (!Array.isArray(arr)) return '';
    return arr.map(item => {
      if (typeof item === 'object') return _resolveRaw(_checkIf(body, item), item);
      return body.replace(/\{\{\.\}\}/g, String(item));
    }).join('');
  });
  // Resolve remaining placeholders (raw — HTML already built by slot builders)
  tpl = _resolveRaw(tpl, ctx);
  return tpl;
}

// ── _buildSlotCtx: build template context for each slot type ──
// If slot.asm exists, run it first — its output registers override resolved + nd
function _buildSlotCtx(slot, nd, resolved) {
  const type = slot.type;
  const bind = slot.bind || '';

  // Slot-level asm: run per-slot assembly, merge into a local resolved
  let slotResolved = resolved;
  if (slot.asm) {
    const slotState = execViewAsm(slot.asm, nd);
    slotResolved = { ...resolved, ...slotState };
  }

  const val0 = resolveField(bind, slotResolved, nd);
  // Asm can override label and color via registers
  const asmLabel = slotResolved && slotResolved.label;
  const asmColor = slotResolved && slotResolved.color;
  const base = { nodeId: nd.id, bind, label: esc(asmLabel || slot.label || bind) };

  switch (type) {
    case 'tags': {
      const tags = val0 || {};
      const keys = Object.keys(tags);
      if (!keys.length) return null;
      base.tags = keys.map(k => {
        const val = tags[k];
        const isGreen = k.startsWith('used_') || k.startsWith('reaction');
        const display = String(val).length > 40 ? String(val).slice(0, 37) + '...' : String(val);
        return { key: esc(k), value: esc(String(val)), display: esc(display), green: isGreen };
      });
      return base;
    }
    case 'text': {
      const text = val0 || '';
      const thinkVal = resolveField(bind + 'Think', resolved, nd) || '';
      base.text = esc(text);
      base.emptyCls = text ? '' : ' empty';
      base.think = thinkVal ? esc(thinkVal) : '';
      base.imageUrl = nd.imageUrl ? esc(nd.imageUrl) : '';
      base.buttons = (slot.buttons || []).map(b => ({
        label: esc(b.label),
        event: esc(b.event),
        colorStyle: b.color ? `color:var(--${b.color});border-color:var(--${b.color})` : '',
        nodeId: nd.id,
      }));
      return base;
    }
    case 'list': {
      // asm can provide @items directly, or resolve via val0
      const items = (slotResolved && slotResolved.items) || val0 || [];
      if (!items.length) return null;
      const key = nd.id + ':' + bind;
      const isOpen = nd._listOpen && nd._listOpen[key];
      const colorVar = asmColor || slot.color;
      base.hasItems = true;

// ── DSL round-trip: component template <-> DSL string ──
function componentToDSL(type) {
  const tpl = _componentTemplates[type];
  if (!tpl) return '';
  // Compact: type header + template body
  let lines = [`@component ${type}`];
  // Include data-* attributes from config
  const cfg = _componentConfig[type];
  if (cfg) {
    lines.push(`  renderer: ${cfg.renderer}`);
    lines.push(`  label: ${cfg.label}`);
    lines.push(`  icon: ${cfg.icon}`);
  }
  lines.push(`  template: |`);
  tpl.split('\n').forEach(l => lines.push('    ' + l));
  return lines.join('\n');
}

function parseDSLComponent(dsl) {
  // Parse @component block back into {type, template, config}
  const m = dsl.match(/@component\s+(\w+)/);
  if (!m) return null;
  const type = m[1];
  const tplMatch = dsl.match(/template:\s*\|\s*\n([\s\S]*?)(?:\n@|\n\s*$|$)/);
  let template = '';
  if (tplMatch) {
    template = tplMatch[1].split('\n').map(l => l.replace(/^    /, '')).join('\n').trimEnd();
  }
  // Parse data-* attributes
  const result = { type, template };
  const rendererM = dsl.match(/renderer:\s*(\S+)/);
  if (rendererM) result.renderer = rendererM[1];
  const labelM = dsl.match(/label:\s*(.+)/);
  if (labelM) result.label = labelM[1].trim();
  const iconM = dsl.match(/icon:\s*(\S+)/);
  if (iconM) result.icon = iconM[1];
  return result;
}

// ── FieldMap DSL round-trip ────────────────────────────
function fieldMapToDSL() {
  let lines = ['@fieldmap'];
  for (const [k, v] of Object.entries(_fieldMap)) {
    let parts = [k];
    if (v.label) parts.push(`label:${v.label}`);
    if (v.format) parts.push(`format:${v.format}`);
    if (v.color) parts.push(`color:${v.color}`);
    if (v.hide) parts.push('hide');
    lines.push('  ' + parts.join(' '));
  }
  return lines.join('\n');
}

function parseFieldMapDSL(dsl) {
  const result = {};
  const lines = dsl.split('\n');
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('@') || trimmed.startsWith('#')) continue;
    const parts = trimmed.split(/\s+/);
    const key = parts[0];
    const entry = {};
    for (let i = 1; i < parts.length; i++) {
      const p = parts[i];
      if (p === 'hide') { entry.hide = true; continue; }
      const [k, ...v] = p.split(':');
      if (k && v.length) entry[k] = v.join(':');
    }
    result[key] = entry;
  }
  return result;
}

    steps++;

          Object.assign(state, execViewAsm(bodyLines.join('\n'), state.entity));

    w.status = r.ok ? 'ok' : 'fail';
  } catch(_) { w.status = 'fail'; }
  saveWorkers();
  renderWorkers();
}

function addWorker(url) {
  url = url.trim().replace(/\/+$/, '');
  if (!url || workers.find(w => w.url === url)) return;
  const w = { url, role: 'generator', status: 'unknown' };
  workers.push(w);
  saveWorkers();
  renderWorkers();
  probeWorker(w);
}

function probeAll() { workers.forEach(w => probeWorker(w)); }

// ── Feed ───────────────────────────────────────────────
function addMessage(role, name, content, extra) {
  extra = extra || {};
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = `msg role-${role}`;

  let header = `<div class="msg-header"><span class="msg-role">${role}</span>`;
  if (name) header += `<span class="msg-name">${esc(name)}</span>`;
  if (extra.tag) header += `<span class="msg-tag">${esc(extra.tag)}</span>`;
  header += '</div>';

  let body = `<div class="msg-content">${esc(content || '')}</div>`;
  if (extra.think) {
    body += `<details class="msg-think"><summary>think</summary><pre>${esc(extra.think)}</pre></details>`;
  }

  div.innerHTML = header + body;
  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;
}

function clearFeed() {
  document.getElementById('feed').innerHTML = '';
  lastVars = {};
  renderVarsFull();
}

// ── Vars ───────────────────────────────────────────────
function renderVarsFull() {
  const el = document.getElementById('vars-full');
  const keys = Object.keys(lastVars);
  if (!keys.length) { el.innerHTML = '<div style="color:var(--text-dim);padding:8px;">No variables yet. Run a workflow to see state.</div>'; return; }
  let html = '<table style="width:100%;border-collapse:collapse;">';
  for (const k of keys) {
    let val = lastVars[k];
    const isObj = typeof val === 'object';
    const full = isObj ? JSON.stringify(val, null, 2) : String(val);
    const short = full.length > 120 ? full.slice(0, 120) + '...' : full;
    const needsExpand = full.length > 120;
    const uid = 'var_' + k.replace(/\W/g, '_');
    html += `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:4px 8px;color:var(--accent3);vertical-align:top;white-space:nowrap;font-size:11px;width:1%;">${esc(k)}</td>
      <td style="padding:4px 8px;white-space:pre-wrap;word-break:break-word;font-size:11px;">`;
    if (needsExpand) {
      html += `<span data-short="${uid}">${isObj ? '<pre style="margin:0;font-size:11px;">' + esc(short) + '</pre>' : esc(short)}</span>`;
      html += `<span data-full="${uid}" style="display:none">${isObj ? '<pre style="margin:0;font-size:11px;">' + esc(full) + '</pre>' : esc(full)}</span>`;
      html += ` <button class="btn-expand" data-toggle="${uid}" style="font-size:9px;color:var(--accent);background:none;border:none;cursor:pointer;text-decoration:underline;">show all</button>`;
    } else {
      html += isObj ? '<pre style="margin:0;font-size:11px;">' + esc(full) + '</pre>' : esc(full);
    }
    html += `</td></tr>`;
  }
  html += '</table>';
  el.innerHTML = html;
  el.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = btn.dataset.toggle;
      const s = el.querySelector(`[data-short="${uid}"]`);
      const f = el.querySelector(`[data-full="${uid}"]`);
      const showing = f.style.display !== 'none';
      s.style.display = showing ? '' : 'none';
      f.style.display = showing ? 'none' : '';
      btn.textContent = showing ? 'show all' : 'collapse';
    });
  });
}

// ── Tree rendering ─────────────────────────────────────
function renderTree() {
  const el = document.getElementById('tree');
  el.innerHTML = '';
  const roots = Object.values(nodes).filter(n => !n.parentId);
  if (!roots.length) {
    el.innerHTML = '<div style="color:var(--text-dim);padding:16px;text-align:center;">No cards yet. Run a workflow or click + to create a root card.</div>';
    return;
  }
  roots.forEach(nd => el.appendChild(renderNode(nd)));
  saveNodes();
}

function renderNode(nd) {
  const { tpl, resolved } = resolveView(nd);
  const div = document.createElement('div');
  div.className = `node status-${nd.status}`;
  div.dataset.nodeId = nd.id;

  const bodyOpen = !nd.collapsed;
  const childCount = nd.children ? nd.children.length : 0;

  // header
  let hdr = `<div class="node-hdr" data-hdr="${nd.id}">
    <span class="node-arrow${bodyOpen?' open':''}">&#9654;</span>
    <span class="node-icon">${tpl.icon || '#'}</span>
    <span class="node-title">${esc(nd.title)}</span>`;
  if (childCount) hdr += `<span class="node-count">${childCount} sub</span>`;
  const pPatches = pendingPatchesForNode(nd.id);
  if (pPatches.length) {
    const pCount = pPatches.reduce((n, p) => n + Object.values(p.resolved).filter(s => s === 'pending' || s === 'unknown').length, 0);
    if (pCount) hdr += `<span class="node-badge" style="background:var(--yellow);color:#000;font-size:9px;padding:0 4px;border-radius:3px;margin-left:2px;" title="${pCount} pending patch(es)">${pCount} patch</span>`;
  }
  hdr += `<span class="node-badge ${nd.status}">${nd.status}</span>`;
  hdr += `<span class="node-time">${nd.time || ''}</span>`;
  hdr += '</div>';

  // body
  let body = `<div class="node-body${bodyOpen?' open':''}" data-body="${nd.id}">`;

  // render slots from template
  for (const slot of tpl.slots) {
    body += renderSlot(slot, nd, resolved);
  }

  // pending patches
  if (pPatches.length) {
    body += `<div class="node-patches" style="margin-top:4px;padding:4px 6px;background:var(--surface2);border-radius:3px;font-size:10px;">`;
    body += `<div style="color:var(--yellow);font-weight:600;margin-bottom:2px;">Pending patches:</div>`;
    for (const p of pPatches) {
      for (const [k, status] of Object.entries(p.resolved)) {
        if (status !== 'pending' && status !== 'unknown') continue;
        const preview = typeof p.data[k] === 'string' ? p.data[k].slice(0, 60) : JSON.stringify(p.data[k]).slice(0, 60);
        body += `<div style="display:flex;align-items:center;gap:4px;margin:1px 0;">`;
        body += `<span style="color:var(--accent3);">${esc(k)}</span>`;
        body += `<span style="color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(preview)}</span>`;
        body += `<button class="btn sm" data-patch-accept="${p.id}" data-patch-key="${esc(k)}" style="font-size:9px;padding:0 4px;color:var(--green);">&#10003;</button>`;
        body += `<button class="btn sm" data-patch-reject="${p.id}" data-patch-key="${esc(k)}" style="font-size:9px;padding:0 4px;color:var(--red);">&#10007;</button>`;
        body += `</div>`;
      }
    }
    body += `</div>`;
  }

  body += '</div>';
  div.innerHTML = hdr + body;

  // wire header toggle
  div.querySelector(`[data-hdr="${nd.id}"]`).addEventListener('click', () => {
    nd.collapsed = !nd.collapsed;
    const b = div.querySelector(`[data-body="${nd.id}"]`);
    const a = div.querySelector('.node-arrow');
    b.classList.toggle('open');
    a.classList.toggle('open');
    saveNodes();
  });

  // wire list toggles
  div.querySelectorAll(`[data-list-toggle]`).forEach(el => {
    el.addEventListener('click', () => {
      const key = el.dataset.listToggle;
      nd._listOpen = nd._listOpen || {};
      nd._listOpen[key] = !nd._listOpen[key];
      const lb = div.querySelector(`[data-list-body="${key}"]`);
      const ar = el.querySelector('.arrow');
      if (lb) lb.classList.toggle('open');
      if (ar) ar.classList.toggle('open');
      saveNodes();
    });
  });

  // wire thread toggle
  const tbar = div.querySelector(`[data-thread-toggle="${nd.id}"]`);
  if (tbar) {
    tbar.addEventListener('click', () => {
      nd.threadOpen = !nd.threadOpen;
      const tw = div.querySelector(`[data-thread-wrap="${nd.id}"]`);
      const ar = tbar.querySelector('.arrow');
      if (tw) tw.classList.toggle('open');
      if (ar) ar.classList.toggle('open');
      saveNodes();
    });
  }

  // wire thread send
  const tsend = div.querySelector(`[data-tsend="${nd.id}"]`);
  if (tsend) {
    tsend.addEventListener('click', () => {
      const inp = div.querySelector(`[data-tinp="${nd.id}"]`);
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      sendNodeChat(nd.id, text);
    });
    const tinp = div.querySelector(`[data-tinp="${nd.id}"]`);
    if (tinp) tinp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); tsend.click(); }
    });
  }

  // wire answer textareas (edit + apply)
  div.querySelectorAll('.node-answer-ta').forEach(ta => {
    const [nid, field] = (ta.dataset.ans || '').split(':');
    if (nid !== nd.id) return;
    ta.addEventListener('input', () => {
      ta.classList.remove('empty');
      const applyBtn = div.querySelector(`[data-apply-ans="${nid}:${field}"]`);
      if (applyBtn) applyBtn.classList.add('show');
    });
  });
  div.querySelectorAll('[data-apply-ans]').forEach(btn => {
    const [nid, field] = (btn.dataset.applyAns || '').split(':');
    if (nid !== nd.id) return;
    btn.addEventListener('click', () => {
      const ta = div.querySelector(`[data-ans="${nid}:${field}"]`);
      if (ta && nodes[nid]) {
        nodes[nid][field] = ta.value;
        saveNodes();
        btn.classList.remove('show');
        log(`applied ${field} edit on ${nodes[nid].title}`);
      }
    });
  });

  // wire all event buttons (actions, text buttons, reactions)
  div.querySelectorAll(`[data-event]`).forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      dispatchNodeEvent(nd.id, btn.dataset.event);
    });
  });

  // wire patch accept/reject buttons
  div.querySelectorAll('[data-patch-accept]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      acceptPatch(parseInt(btn.dataset.patchAccept), btn.dataset.patchKey);
    });
  });
  div.querySelectorAll('[data-patch-reject]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      rejectPatch(parseInt(btn.dataset.patchReject), btn.dataset.patchKey);
    });
  });

  // render children recursively
  const childContainer = div.querySelector(`[data-children="${nd.id}"]`);
  if (childContainer && nd.children) {
    nd.children.forEach(cid => {
      if (nodes[cid]) childContainer.appendChild(renderNode(nodes[cid]));
    });
  }

  return div;
}

function renderSlot(slot, nd, resolved) {
  const bind = slot.bind || '';
  // Slot-level asm
  let slotResolved = resolved;
  if (slot.asm) {
    const slotState = execViewAsm(slot.asm, nd);
    slotResolved = { ...resolved, ...slotState };
  }
  const val0 = resolveField(bind, slotResolved, nd);
  const asmColor = slotResolved && slotResolved.color;
  const asmLabel = slotResolved && slotResolved.label;
  switch (slot.type) {
    case 'tags': {
      const tags = val0 || {};
      const keys = Object.keys(tags);
      if (!keys.length) return '';
      return `<div class="node-tags">${keys.map(k => {
        const val = tags[k];
        const isGreen = k.startsWith('used_') || k.startsWith('reaction');
        const cls = isGreen ? ' green' : '';
        const display = String(val).length > 40 ? String(val).slice(0, 37) + '...' : String(val);
        return `<span class="node-tag${cls}" title="${esc(k)}: ${esc(String(val))}">${esc(k)}: ${esc(display)}</span>`;
      }).join('')}</div>`;
    }
    case 'text': {
      const text = val0 || '';
      const thinkVal = resolveField(bind + 'Think', resolved, nd) || '';
      const emptyCls = text ? '' : ' empty';
      const buttons = slot.buttons || [];
      let hdr = `<div class="node-answer-hdr"><span class="label">${esc(slot.label || bind)}</span>`;
      buttons.forEach(b => {
        const colorStyle = b.color ? `color:var(--${b.color});border-color:var(--${b.color})` : '';
        hdr += `<button class="btn sm" style="${colorStyle}" data-event="${esc(b.event)}" data-node="${nd.id}">${esc(b.label)}</button>`;
      });
      hdr += `</div>`;
      let html = `<div class="node-answer">${hdr}
        <textarea class="node-answer-ta${emptyCls}" data-ans="${nd.id}:${bind}" placeholder="(pending...)">${esc(text)}</textarea>
        <button class="btn sm node-answer-apply" data-apply-ans="${nd.id}:${bind}">Apply changes</button>`;
      if (thinkVal) {
        html += `<details class="msg-think" style="margin-top:3px;"><summary>think</summary><pre>${esc(thinkVal)}</pre></details>`;
      }
      if (nd.imageUrl) {
        html += `<div class="node-image"><img src="${esc(nd.imageUrl)}" alt="Generated" loading="lazy" /></div>`;
      }
      html += '</div>';
      return html;
    }
    case 'list': {
      const items = (slotResolved && slotResolved.items) || val0 || [];
      if (!items.length) return '';
      const key = nd.id + ':' + bind;
      const isOpen = nd._listOpen && nd._listOpen[key];
      const colorVar = asmColor || slot.color;
      const color = colorVar ? `color:var(--${colorVar})` : '';
      const label = asmLabel || slot.label || bind;
      return `<div class="node-lists">
        <div class="node-list-hdr" data-list-toggle="${key}">
          <span class="arrow${isOpen?' open':''}">&#9654;</span>
          ${esc(label)} <span style="opacity:.5">${items.length}</span>
        </div>
        <div class="node-list-body${isOpen?' open':''}" data-list-body="${key}">
          ${items.map(item => `<div class="node-list-item" style="${color}"><span class="bullet">&#8226;</span>${esc(typeof item === 'string' ? item : item.title || item.name || item.text || JSON.stringify(item))}</div>`).join('')}
        </div>
      </div>`;
    }
    case 'thread': {
      const msgs = val0 || [];
      const cnt = msgs.length;
      return `<div class="node-thread-bar" data-thread-toggle="${nd.id}">
        <span class="arrow${nd.threadOpen?' open':''}">&#9654;</span>
        Thread <span style="opacity:.5">${cnt}</span>
      </div>
      <div class="node-thread-wrap${nd.threadOpen?' open':''}" data-thread-wrap="${nd.id}">
        <div class="node-thread-msgs">${msgs.map(m => renderThreadMsg(m)).join('')}</div>
        <div class="node-thread-input">
          <textarea placeholder="Reply..." data-tinp="${nd.id}" rows="1"></textarea>
          <button class="btn sm" data-tsend="${nd.id}">Send</button>
        </div>
      </div>`;
    }
    case 'reactions': {
      const reactions = val0 || [];
      if (!reactions.length) return '';
      // group by emoji: {emoji: [author1, author2]}
      const groups = {};
      reactions.forEach(r => {
        const key = r.emoji || '?';
        if (!groups[key]) groups[key] = { emoji: key, authors: [], status: r.status };
        groups[key].authors.push(r.author || 'anon');
        if (r.status) groups[key].status = r.status;
      });
      let html = '<div class="node-reactions">';
      for (const g of Object.values(groups)) {
        const statusCls = g.status === 'pass' ? 'pass' : g.status === 'fail' ? 'fail' : '';
        const tooltip = g.authors.join(', ');
        html += `<span class="node-reaction ${statusCls}" title="${esc(tooltip)}">${g.emoji}<span class="reaction-count">${g.authors.length > 1 ? ' ' + g.authors.length : ''}</span></span>`;
      }
      // add reaction button
      html += `<button class="node-reaction add-reaction" data-event="add_reaction" data-node="${nd.id}" title="Add reaction">+</button>`;
      html += '</div>';
      return html;
    }
    case 'actions': {
      const items = slot.items || [];
      return `<div class="node-actions">${items.map(a => {
        if (typeof a === 'string') return `<button class="btn sm" data-event="${a}" data-node="${nd.id}">${a}</button>`;
        const colorStyle = a.color ? `color:var(--${a.color});border-color:var(--${a.color})` : '';
        return `<button class="btn sm" style="${colorStyle}" data-event="${esc(a.event)}" data-node="${nd.id}">${esc(a.label)}</button>`;
      }).join('')}</div>`;
    }
    case 'children': {
      return `<div class="node-children" data-children="${nd.id}"></div>`;
    }
    default: return '';
  }
}

function renderThreadMsg(m) {
  const role = m.role || 'system';
  const initial = (m.name || role).charAt(0).toUpperCase();
  let html = `<div class="node-tmsg">
    <div class="node-tmsg-ava ${role}">${initial}</div>
    <div class="node-tmsg-body">
      <div class="node-tmsg-nick" style="color:var(--${role === 'user' ? 'accent' : role === 'system' ? 'orange' : 'green'})">${esc(m.name || role)}</div>
      <div class="node-tmsg-text">${esc(m.content || '')}</div>`;
  if (m.think) {
    html += `<details class="msg-think"><summary>think</summary><pre>${esc(m.think)}</pre></details>`;
  }
  html += '</div></div>';
  return html;
}

// ── Node event dispatch ────────────────────────────────
// All button clicks route here. Built-in events have default handlers.
// Custom events log to console — hook into workflow triggers/macros later.
const _eventHandlers = {
  open_thread: (nd) => { nd.threadOpen = true; renderTree(); },
  add_child: (nd) => {
    const title = prompt('Child title:');
    if (!title) return;
    const childId = createNode({ parentId: nd.id, card: 'entity', title });
    nd.children = nd.children || [];
    nd.children.push(childId);
    saveNodes(); renderTree();
    log(`+ child "${title}" → ${nd.title}`);
  },
  add_reaction: (nd) => {
    const emoji = prompt('Reaction emoji:', '👍');
    if (!emoji) return;
    nd.reactions = nd.reactions || [];
    nd.reactions.push({ emoji, author: 'user', time: ts() });
    saveNodes(); renderTree();
    log(`reaction ${emoji} on ${nd.title}`);
  },
};

function dispatchNodeEvent(nodeId, event) {
  const nd = nodes[nodeId];
  if (!nd) return;
  log(`event: ${event} @ ${nd.title}`);
  const handler = _eventHandlers[event];
  if (handler) {
    handler(nd);
  } else {
    // no built-in handler → future: dispatch to workflow trigger/macro
    log(`  (no handler for "${event}" — wire via DSL)`);
  }
}

async function sendNodeChat(nodeId, text) {
  const nd = nodes[nodeId];
  if (!nd) return;
  const worker = getWorkerByRole('generator') || workers[0];
  if (!worker) { log('ERROR: no worker'); return; }

  nd.thread = nd.thread || [];
  nd.thread.push({ role: 'user', name: 'user', content: text, time: ts() });
  renderTree();
  setStatus('chatting...', 'busy');

  // build messages from thread history
  const messages = nd.thread.map(m => ({ role: m.role === 'worker' ? 'assistant' : m.role, content: m.content }));

  try {
    const res = await post('/api/llm/generate', {
      url: worker.url,
      messages,
      temperature: getSettings().temperature,
      max_tokens: getSettings().max_tokens,
      no_think: getSettings().no_think,
      max_continue: getSettings().max_continue,
    });
    nd.thread.push({ role: 'worker', name: 'generator', content: res.answer || '', think: res.think || '', time: ts() });
    saveNodes();
    renderTree();
    setStatus('idle', 'idle');
  } catch (e) {
    log('chat error: ' + e.message);
    setStatus('error', 'error');
  }
}

function createRootNode(title, data) {
  const id = createNode({
    card: 'root',
    title: title || 'Root',
    status: 'active',
    ...data
  });
  renderTree();
  log(`created root "${title}"`);
  return id;
}

// ── Workflow execution ─────────────────────────────────
async function runWorkflow(input) {
  const yaml = document.getElementById('rs-editor').value;
  const workerMap = buildWorkerMap();
  const settings = getSettings();

  if (!Object.keys(workerMap).length) { log('ERROR: no workers with roles assigned'); return; }
  if (input) addMessage('user', '', input);

  setStatus('running...', 'busy');
  log(`run: "${(input || '').slice(0, 60)}"`);

  try {
    const res = await post('/api/workflow/run', { yaml, input, workers: workerMap, settings, async_progress: true });
    if (res.error) { log('ERROR: ' + res.error); setStatus('error', 'error'); addMessage('system', '', 'Error: ' + res.error); return; }
    currentRunId = res.run_id;
    pollCursor = 0;
    startPolling();
  } catch (e) { log('ERROR: ' + e.message); setStatus('error', 'error'); }
}

function startPolling() { if (pollTimer) clearInterval(pollTimer); pollTimer = setInterval(pollProgress, 250); }

async function pollProgress() {
  if (!currentRunId) return;
  try {
    const res = await get(`/api/workflow/progress?run_id=${currentRunId}&cursor=${pollCursor}`);
    if (res.thread && res.thread.length) {
      for (const msg of res.thread) {
        addMessage(msg.role || 'worker', msg.name || '', msg.content || '', { think: msg.think, tag: msg.tag });
      }
    }
    if (res.next_cursor !== undefined) pollCursor = res.next_cursor;
    if (res.vars) { lastVars = res.vars; renderVarsFull(); ingestWorkflowVars(res.vars); }
    if (res.status !== 'running') {
      clearInterval(pollTimer); pollTimer = null; currentRunId = null;
      setStatus(res.status || 'done', res.status === 'error' ? 'error' : 'idle');
      log(`finished: ${res.status}`);
      if (res.vars) workflowVarsToTree(res.vars);
    }
  } catch (e) { log('poll error: ' + e.message); }
}

document.querySelectorAll('.resize-h').forEach(handle => {
  const target = handle.dataset.resize;
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const el = document.getElementById(target);
    const startX = e.clientX;
    const startW = el.offsetWidth;
    const isLeft = target === 'sidebar';
    function onMove(e2) { el.style.width = Math.max(120, startW + (isLeft ? (e2.clientX - startX) : (startX - e2.clientX))) + 'px'; }
    function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
});

// ── Tree DSL serialization ─────────────────────────────
function serializeNode(nd, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  const { tpl } = resolveView(nd);
  let lines = [];
  lines.push(`${pad}- card: ${nd.card}`);
  if (nd.view) lines.push(`${pad}  view: ${nd.view}`);
  lines.push(`${pad}  title: ${JSON.stringify(nd.title)}`);
  lines.push(`${pad}  status: ${nd.status}`);
  // Serialize bound slots (raw nd data, asm resolves at render time)
  for (const slot of tpl.slots) {
    if (!slot.bind) continue;
    const val = nd[slot.bind];
    if (val === undefined || val === null) continue;
    if (slot.type === 'text' || slot.type === 'display') {
      if (val) lines.push(`${pad}  ${slot.bind}: ${JSON.stringify(String(val).slice(0, 200) + (String(val).length > 200 ? '...' : ''))}`);
    } else if (slot.type === 'tags') {
      if (typeof val === 'object' && Object.keys(val).length) lines.push(`${pad}  ${slot.bind}: ${JSON.stringify(val)}`);
    } else if (slot.type === 'list') {
      const arr = Array.isArray(val) ? val : [];
      if (arr.length) {
        lines.push(`${pad}  ${slot.bind}:`);
        arr.forEach(item => {
          const txt = typeof item === 'string' ? item : (item.title || item.name || item.text || JSON.stringify(item));
          lines.push(`${pad}    - ${JSON.stringify(txt)}`);
        });
      }
    } else if (slot.type === 'thread') {
      const arr = Array.isArray(val) ? val : [];
      if (arr.length) lines.push(`${pad}  ${slot.bind}: ${arr.length} messages`);
    } else if (slot.type === 'children') {
      const children = (Array.isArray(val) ? val : []).map(cid => nodes[cid]).filter(Boolean);
      if (children.length) {
        lines.push(`${pad}  children:`);
        children.forEach(child => lines.push(serializeNode(child, indent + 2)));
      }
    }
  }
  return lines.join('\n');
}

function exportTreeDSL() {
  const roots = Object.values(nodes).filter(n => !n.parentId);
  let dsl = 'tree:\n';
  if (!roots.length) { dsl += '  # empty - add root cards or run a workflow\n'; }
  else { roots.forEach(r => { dsl += serializeNode(r, 1) + '\n'; }); }
  dsl += '\ncards:\n';
  for (const [name, tpl] of Object.entries(cardTemplates)) {
    dsl += `  ${name}:\n    icon: ${tpl.icon}\n    slots:\n`;
    tpl.slots.forEach(s => {
      let line = `      - type: ${s.type}`;
      if (s.bind) line += `, bind: ${s.bind}`;
      if (s.label) line += `, label: ${s.label}`;
      if (s.card) line += `, card: ${s.card}`;
      if (s.color) line += `, color: ${s.color}`;
      if (s.buttons) line += `, buttons: [${s.buttons.map(b => b.label + ':' + b.event).join(', ')}]`;
      if (s.items) line += `, items: [${(s.items || []).map(i => typeof i === 'string' ? i : i.label + ':' + i.event).join(', ')}]`;
      dsl += line + '\n';
    });
  }
  // views section
  if (Object.keys(cardViews).length) {
    dsl += '\nviews:\n';
    for (const [name, view] of Object.entries(cardViews)) {
      dsl += `  ${name}:\n    template: ${view.template}\n`;
      if (view.asm) {
        dsl += `    asm: |\n`;
        for (const line of view.asm.split('\n')) {
          dsl += `      ${line}\n`;
        }
      }
    }
  }
  document.getElementById('tree-dsl-editor').value = dsl;
}

// ── Wire workflow results to tree (template-driven) ────
function workflowVarsToTree(vars) {
  if (!vars) return;
  const rootTitle = vars.input ? String(vars.input).slice(0, 60) : 'Workflow result';
  const roots = Object.values(nodes).filter(n => !n.parentId);
  let rootId;
  if (roots.length && roots[roots.length - 1].status === 'active') {
    rootId = roots[roots.length - 1].id;
  } else {
    rootId = createNode({ card: 'root', title: rootTitle, status: 'active' });
  }
  const root = nodes[rootId];
  const { tpl } = resolveView(root);

  // Build patch data: match vars to slot binds
  const patchData = {};
  for (const slot of tpl.slots) {
    if (!slot.bind) continue;
    const dsKey = vars[slot.bind] !== undefined ? slot.bind
      : vars[slot.bind.replace(/_list$/, '')] !== undefined ? slot.bind.replace(/_list$/, '')
      : null;
    if (!dsKey) continue;
    const val = vars[dsKey];

    // Children: expand array into child nodes, then store child ids
    if (slot.type === 'children' && Array.isArray(val)) {
      const childCardType = slot.card || 'entity';
      val.forEach(item => {
        if (typeof item !== 'object') return;
        const title = item.title || item.name || Object.values(item)[0] || 'Entity';
        const existingChild = root.children.find(cid => nodes[cid] && nodes[cid].title === title);
        if (!existingChild) {
          const opts = { parentId: rootId, card: childCardType, title };
          for (const [ik, iv] of Object.entries(item)) opts[ik] = iv;
          const cid = createNode(opts);
          root.children.push(cid);
        }
      });
      continue;
    }
    patchData[slot.bind] = val;
  }

  // Scoped dsSet for each var
  for (const [k, v] of Object.entries(vars)) {
    dsSet(k + '.' + rootId, v);  // scoped to root node
  }

  // Propose patch — Schema rules decide auto/manual
  if (Object.keys(patchData).length) {
    proposePatch(rootId, patchData, { source: 'workflow' });
  } else {
    saveNodes();
    renderTree();
  }
}

function parseFieldMapDsl(text) {
  const maps = {};
  let current = null;
  for (const line of text.split('\n')) {
    const trimmed = line.replace(/#.*$/, '').trimEnd();
    if (!trimmed) continue;
    const fm = trimmed.match(/^fieldmap\s+(\w+)/);
    if (fm) { current = fm[1]; maps[current] = {}; continue; }
    if (current && trimmed.match(/^\s+\w+:/)) {
      const kv = trimmed.trim().match(/^(\w+):\s*(.+)/);
      if (kv) maps[current][kv[1]] = kv[2].trim();
    }
  }
  return maps;
}

function wireSlotEditors(container) {
  // slot field changes
  container.querySelectorAll('.slot-row').forEach(row => {
    const typeName = row.dataset.slotType;
    const idx = parseInt(row.dataset.slotIdx);
    row.querySelectorAll('[data-sf]').forEach(el => {
      el.addEventListener('change', () => {
        const field = el.dataset.sf;
        const tpl = cardTemplates[typeName];
        if (!tpl || !tpl.slots[idx]) return;
        tpl.slots[idx][field] = el.value || undefined;
        if (field === 'color' && !el.value) delete tpl.slots[idx].color;
        saveCardTemplates();
        // re-render preview only
        const body = container.querySelector(`[data-stype-body="${typeName}"]`);
        if (body) {
          const prev = body.querySelector('.stype-preview');
          if (prev) prev.innerHTML = renderTypePreview(typeName, tpl);
        }
      });
    });

    // move up/down
    row.querySelectorAll('[data-slot-move]').forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = btn.dataset.slotMove === 'up' ? -1 : 1;
        const tpl = cardTemplates[typeName];
        if (!tpl) return;
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= tpl.slots.length) return;
        [tpl.slots[idx], tpl.slots[newIdx]] = [tpl.slots[newIdx], tpl.slots[idx]];
        saveCardTemplates();
        renderTypesPanel();
      });
    });

    // remove
    const rmBtn = row.querySelector('[data-slot-remove]');
    if (rmBtn) rmBtn.addEventListener('click', () => {
      const tpl = cardTemplates[typeName];
      if (!tpl) return;
      tpl.slots.splice(idx, 1);
      saveCardTemplates();
      renderTypesPanel();
      log(`removed slot ${idx} from ${typeName}`);
    });
  });

  // add slot
  container.querySelectorAll('[data-slot-add]').forEach(btn => {
    btn.addEventListener('click', () => {
      const typeName = btn.dataset.slotAdd;
      const tpl = cardTemplates[typeName];
      if (!tpl) return;
      tpl.slots.push({ type: 'text', bind: 'field_' + tpl.slots.length });
      saveCardTemplates();
      renderTypesPanel();
      log(`added slot to ${typeName}`);
    });
  });

  // icon edit
  container.querySelectorAll('[data-icon-edit]').forEach(inp => {
    inp.addEventListener('change', () => {
      const typeName = inp.dataset.iconEdit;
      const tpl = cardTemplates[typeName];
      if (!tpl) return;
      tpl.icon = inp.value || '#';
      saveCardTemplates();
      log(`icon changed for ${typeName}: ${tpl.icon}`);
    });
  });

  // slot asm toggle: add/remove asm on slot
  container.querySelectorAll('[data-slot-asm-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = btn.closest('.slot-row');
      const typeName = row.dataset.slotType;
      const idx = parseInt(row.dataset.slotIdx);
      const tpl = cardTemplates[typeName];
      if (!tpl || !tpl.slots[idx]) return;
      if (tpl.slots[idx].asm) {
        delete tpl.slots[idx].asm;
      } else {
        tpl.slots[idx].asm = `; ${tpl.slots[idx].type} resolver\nCALL @${tpl.slots[idx].bind || 'items'}, get, @entity, "${tpl.slots[idx].bind || 'field'}"`;
      }
      saveCardTemplates();
      renderTypesPanel();
    });
  });

  // slot asm apply
  container.querySelectorAll('[data-slot-asm-apply]').forEach(btn => {
    btn.addEventListener('click', () => {
      const wrapper = btn.closest('.slot-asm-editor');
      const typeName = wrapper.dataset.slotAsmType;
      const idx = parseInt(wrapper.dataset.slotAsmIdx);
      const ta = wrapper.querySelector(`[data-slot-asm-ta="${idx}"]`);
      const tpl = cardTemplates[typeName];
      if (!tpl || !tpl.slots[idx] || !ta) return;
      tpl.slots[idx].asm = ta.value;
      saveCardTemplates();
      renderTree();
      log(`slot asm applied: ${typeName}[${idx}]`);
    });
  });
}
