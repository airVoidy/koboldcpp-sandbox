<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workflow v3</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface2: #1c2129; --border: #30363d;
  --text: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950;
  --red: #f85149; --yellow: #d29922; --orange: #db6d28; --accent2: #bc8cff;
  --accent3: #79c0ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font:12px/1.4 'Cascadia Code','Fira Code',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
button { cursor:pointer; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; }
button:hover { background:var(--border); }
.btn { padding:4px 10px; } .btn.sm { padding:2px 6px; font-size:11px; } .btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }
input, textarea, select { background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:3px; font:inherit; padding:4px 6px; }
textarea { resize:vertical; }
.esc { white-space:pre-wrap; word-break:break-word; }

/* Layout */
.top-bar { display:flex; align-items:center; gap:8px; padding:4px 12px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.top-bar h1 { font-size:14px; font-weight:600; color:var(--accent); }
.main { flex:1; display:flex; min-height:0; }
.panel { display:flex; flex-direction:column; border-right:1px solid var(--border); min-height:0; }
.panel-left { width:260px; }
.panel-center { flex:1; min-width:0; }
.panel-right { width:380px; border-right:none; }
.panel-hdr { padding:4px 8px; font-size:11px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; flex-shrink:0; }
.panel-body { flex:1; overflow-y:auto; padding:8px; min-height:0; }

/* Workers */
.worker-row { display:flex; align-items:center; gap:4px; padding:2px 0; font-size:11px; }
.worker-dot { width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }
.worker-dot.offline { background:var(--red); }

/* Queue lanes */
.lane { margin-bottom:8px; }
.lane-hdr { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
.job-chip { display:inline-flex; align-items:center; gap:3px; padding:2px 6px; border-radius:3px; font-size:10px; margin:1px 2px; }
.job-chip.pending { background:var(--surface2); color:var(--text-dim); }
.job-chip.active { background:var(--accent); color:#000; animation:pulse 1s infinite; }
.job-chip.done { background:var(--green); color:#000; }
.job-chip.failed { background:var(--red); color:#fff; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

/* Cards */
.node { margin:4px 0; padding:0; border:1px solid var(--border); border-radius:4px; background:var(--surface); }
.node-hdr { display:flex; align-items:center; gap:4px; padding:4px 8px; cursor:pointer; font-size:11px; }
.node-hdr:hover { background:var(--surface2); }
.node-icon { color:var(--accent); font-weight:bold; }
.node-title { flex:1; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.node-badge { font-size:9px; padding:1px 4px; border-radius:3px; }
.node-badge.done { background:var(--green); color:#000; }
.node-badge.active { background:var(--accent); color:#000; }
.node-badge.pending { background:var(--surface2); color:var(--text-dim); }
.node-badge.failed { background:var(--red); color:#fff; }
.node-body { display:none; padding:4px 8px 8px; }
.node-body.open { display:block; }
.node-slot { margin:3px 0; }

/* Slot components */
.slot-text textarea { width:100%; min-height:40px; font-size:11px; }
.slot-text .slot-label { font-size:10px; color:var(--text-dim); margin-bottom:2px; }
.slot-list-hdr { font-size:11px; cursor:pointer; display:flex; align-items:center; gap:4px; }
.slot-list-hdr:hover { color:var(--accent); }
.slot-list-body { display:none; padding-left:12px; }
.slot-list-body.open { display:block; }
.slot-list-item { font-size:11px; padding:1px 0; }
.slot-tags { display:flex; flex-wrap:wrap; gap:3px; }
.slot-tag { font-size:10px; padding:1px 5px; border-radius:3px; background:var(--surface2); }

/* Event log */
.event-item { font-size:10px; padding:2px 0; border-bottom:1px solid var(--surface2); }
.event-ts { color:var(--text-dim); }
.event-type { font-weight:600; }
.event-type.done { color:var(--green); }
.event-type.failed { color:var(--red); }

/* Tabs */
.tab-bar { display:flex; gap:2px; padding:2px 8px; border-bottom:1px solid var(--border); flex-shrink:0; }
.tab-btn { padding:3px 8px; font-size:11px; border:none; background:transparent; color:var(--text-dim); border-bottom:2px solid transparent; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <h1>Workflow v3</h1>
  <span style="color:var(--text-dim);font-size:10px;">job-based reactive</span>
  <span id="statusDot" style="width:8px;height:8px;border-radius:50%;background:var(--text-dim);margin-left:auto;"></span>
  <span id="statusText" style="font-size:11px;color:var(--text-dim);">idle</span>
</div>

<div class="main">
  <!-- Left: Workers + Job Queues -->
  <div class="panel panel-left">
    <div class="panel-hdr">WORKERS <button class="btn sm" id="btnImportV2" title="Import from v2" style="margin-left:auto;font-size:9px;">v2</button> <button class="btn sm" id="btnAddWorker">+</button></div>
    <div id="worker-add-form" style="display:none;padding:4px 8px;border-bottom:1px solid var(--border);">
      <div style="display:flex;gap:3px;align-items:center;">
        <input id="newWorkerUrl" placeholder="http://host:port" style="flex:1;font-size:10px;padding:2px 4px;" />
        <input id="newWorkerRole" placeholder="role" style="width:60px;font-size:10px;padding:2px 4px;" value="generator" />
        <button class="btn sm primary" id="btnWorkerOk" style="font-size:10px;">Add</button>
        <button class="btn sm" id="btnWorkerCancel" style="font-size:10px;">x</button>
      </div>
    </div>
    <div class="panel-body" id="workers-panel"></div>
    <div class="panel-hdr" style="border-top:1px solid var(--border);">JOB QUEUES</div>
    <div class="panel-body" id="queues-panel" style="flex:2;">
      <div style="font-size:10px;color:var(--text-dim);">Run a v3 workflow to see queues</div>
    </div>
  </div>

  <!-- Center: Card Tree -->
  <div class="panel panel-center">
    <div class="panel-hdr">
      CARDS
      <span id="cardCount" style="color:var(--text-dim);font-size:10px;margin-left:auto;"></span>
    </div>
    <div class="panel-body" id="cards-panel"></div>
  </div>

  <!-- Right: YAML + Events -->
  <div class="panel panel-right">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="yaml">YAML</button>
      <button class="tab-btn" data-tab="events">Events</button>
      <button class="tab-btn" data-tab="state">State</button>
    </div>

    <!-- YAML tab -->
    <div id="tab-yaml" style="flex:1;display:flex;flex-direction:column;min-height:0;">
      <textarea id="yamlEditor" spellcheck="false" style="flex:1;border:none;padding:8px;font-size:11px;line-height:1.3;min-height:0;resize:none;">workflow: behavior_case_v3
version: 3

context:
  user_prompt: >
    написать 4 описания внешности демониц в разных образах
    [проверить, что разные образы, разный цвет глаз,
    разный цвет волос, разные позы,
    в описании должны быть элементы, по которым даже без указания расы понятно, что перед тобой демоница,
    стиль: аниме, должен быть явно указан в описании]

config:
  params_int:
    grammar: |
      root ::= digits term
      digits ::= [0-9] | [0-9][0-9] | [0-9][0-9][0-9]
      term ::= " " | "\n" | "\""
    capture: "[0-9]+"
    coerce: int
  params_binary:
    grammar: |
      root ::= digit term
      digit ::= "0" | "1"
      term ::= " " | "\n" | "\""
    capture: "[01]"
    coerce: int

payload_templates:
  user_instruct:
    mode: text
    template: ${input}

  user_chat:
    mode: chat
    messages:
      - role: ${role}
        content: ${input}

jobs:
  - id: claims
    worker: analyzer
    payload_from: user_instruct
    payload_args:
      input: claims($context.user_prompt)
    priority: high
    temp: 0.1
    max: 2048
    no_think: true

  - id: answer
    worker: generator
    payload_from: user_chat
    payload_args:
      role: user
      input: $context.user_prompt
    temp: 0.7
    max: 2048

on:
  - job: claims
    event: done
    do: |
      CALL @parsed, parse_sections, @claims
      MOV @entities, @parsed.entities
      MOV @axioms, @parsed.axioms
      MOV @hypotheses, @parsed.hypotheses

  - job: answer
    event: done
    do: |
      MOV @root.answer, @answer
      CALL @numbered_answer, numbered, @answer
    then:
      - enqueue: table

  - job: table
    event: done
    do: |
      CALL @entity_nodes, parse_table_rows, @table
      MOV @root.entities, @entity_nodes
    then:
      - enqueue: start_line_probe
        for_each: entity_nodes

  - job: start_line_probe
    event: done
    do: |
      MOV @item._startNum, @_event.result
      CALL @item._firstLine, slice_lines, @answer, @item._startNum, @item._startNum
    then:
      - enqueue: end_line_probe
        for_each: entity_nodes

  - job: end_line_probe
    event: done
    do: |
      MOV @item.endLineNumber, @_event.result
      CALL @item.answer, slice_lines, @answer, @item._startNum, @item.endLineNumber
    then:
      - enqueue: confirm_probe

  - job: confirm_probe
    event: done
    do: |
      MOV @item.confirmed, @_event.result
    then:
      - enqueue: style_check

  - job: style_check
    event: done
    do: |
      MOV @item.style_check, @_event.result
    then:
      - enqueue: reaction_check

  - job: reaction_check
    event: done
    do: |
      MOV @item.reaction, @_event.result
      CALL @item.reactionStatus, check_status, @_event.result
    then:
      - enqueue: comfyui_gen

job_templates:
  table:
    worker: analyzer
    payload_from: user_instruct
    payload_args:
      input: table($answer)
    temp: 0.1
    max: 2048
    no_think: true

  start_line_probe:
    worker: generator
    mode: probe_continue
    grammar: $config.params_int.grammar
    capture:
      regex: $config.params_int.capture
      coerce: $config.params_int.coerce
    stop: [" ", "\n", "\""]
    messages:
      - user: ${numbered_answer}
      - assistant: |-
          <think>
          I will split the text into blocks.
          The description titled "${item._title}" starts at line number "
    temp: 0
    max: 4

  end_line_probe:
    worker: generator
    mode: probe_continue
    grammar: $config.params_int.grammar
    capture:
      regex: $config.params_int.capture
      coerce: $config.params_int.coerce
    stop: [" ", "\n", "\""]
    messages:
      - user: ${numbered_answer}
      - assistant: |-
          <think>
          Разделю текст на блоки.
          Описание "${item._title}" начинается со строки
          под номером "${item._startNum}" "${item._firstLine}"
          и длится до строки под номером "line number:
    temp: 0
    max: 4

  confirm_probe:
    worker: generator
    mode: probe_continue
    grammar: $config.params_binary.grammar
    capture:
      regex: $config.params_binary.capture
      coerce: $config.params_binary.coerce
    stop: [" ", "\n", "\""]
    messages:
      - user: ${numbered_answer}
      - assistant: |-
          <think>
          Описание "${item._title}":
          ${item.answer}
          ((answer generated) == true) ===
    temp: 0
    max: 2

  style_check:
    worker: analyzer
    mode: probe_continue
    grammar: $config.params_binary.grammar
    capture:
      regex: $config.params_binary.capture
      coerce: $config.params_binary.coerce
    stop: [" ", "\n", "\""]
    messages:
      - user: |
          Описание:
          ${item.answer}
          Вопрос: Соответствует ли стиль "аниме"?
      - assistant: |-
          <think>
          ((стиль аниме) == true) ===
    temp: 0
    max: 2

  reaction_check:
    worker: analyzer
    payload: |
      Evaluate this text. Reply PASS if good, FAIL + reason if not.
      ${item.answer}
    temp: 0.2
    max: 512
    no_think: true

  comfyui_gen:
    type: comfyui
    worker: comfyui
    workflow: "C:/Users/vAiry/.lmstudio/models/Z-Image +LoRA.json"
    node: "6"
    field: "text"
    payload: ${item.answer}
    server: "http://127.0.0.1:8188"
</textarea>
      <div style="padding:4px 8px;display:flex;gap:4px;border-top:1px solid var(--border);flex-shrink:0;">
        <button class="btn sm primary" id="btnRun">Run</button>
        <button class="btn sm" id="btnStop">Stop</button>
        <span id="runStatus" style="font-size:10px;color:var(--text-dim);margin-left:auto;"></span>
      </div>
    </div>

    <!-- Events tab -->
    <div id="tab-events" style="flex:1;display:none;flex-direction:column;min-height:0;">
      <div class="panel-body" id="events-panel">
        <div style="font-size:10px;color:var(--text-dim);">Events appear here when jobs complete</div>
      </div>
    </div>

    <!-- State tab -->
    <div id="tab-state" style="flex:1;display:none;flex-direction:column;min-height:0;">
      <div class="panel-body" id="state-panel">
        <pre id="stateView" style="font-size:10px;white-space:pre-wrap;"></pre>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════
function esc(s) { return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ts() { return new Date().toLocaleTimeString('en-GB', { hour12: false }); }
async function post(path, body) { const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) }); return r.json(); }
async function get(path) { return (await fetch(path)).json(); }

// ══════════════════════════════════════════════════════════
//  WORKERS
// ══════════════════════════════════════════════════════════
let workers = [];
try { workers = JSON.parse(localStorage.getItem('v3_workers') || '[]'); } catch(_) {}
if (!workers.length) workers = [{ url: 'http://127.0.0.1:5001', role: 'generator', status: 'unknown' }];

function saveWorkers() { localStorage.setItem('v3_workers', JSON.stringify(workers)); }

function buildWorkerMap() {
  const m = {};
  for (const w of workers) if (w.role && w.url) m[w.role] = w.url;
  return m;
}

async function checkWorker(w) {
  try {
    const r = await fetch(w.url + '/api/extra/version', { signal: AbortSignal.timeout(3000) });
    w.status = r.ok ? 'ok' : 'offline';
  } catch(_) { w.status = 'offline'; }
}

function renderWorkers() {
  const el = document.getElementById('workers-panel');
  let html = '';
  for (let i = 0; i < workers.length; i++) {
    const w = workers[i];
    html += `<div class="worker-row">
      <span class="worker-dot${w.status === 'ok' ? '' : ' offline'}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(w.url)}">${esc(w.url)}</span>
      <input value="${esc(w.role)}" style="width:60px;font-size:10px;padding:1px 3px;" data-worker-role="${i}" />
      <button class="btn sm" data-worker-del="${i}" style="color:var(--red);padding:0 4px;">&times;</button>
    </div>`;
  }
  el.innerHTML = html;
  // wire
  el.querySelectorAll('[data-worker-role]').forEach(inp => {
    inp.addEventListener('change', () => { workers[+inp.dataset.workerRole].role = inp.value; saveWorkers(); });
  });
  el.querySelectorAll('[data-worker-del]').forEach(btn => {
    btn.addEventListener('click', () => { workers.splice(+btn.dataset.workerDel, 1); saveWorkers(); renderWorkers(); });
  });
}

document.getElementById('btnAddWorker').addEventListener('click', () => {
  document.getElementById('worker-add-form').style.display = 'block';
  document.getElementById('newWorkerUrl').focus();
});
document.getElementById('btnWorkerCancel').addEventListener('click', () => {
  document.getElementById('worker-add-form').style.display = 'none';
});
document.getElementById('btnWorkerOk').addEventListener('click', () => {
  const url = document.getElementById('newWorkerUrl').value.trim();
  const role = document.getElementById('newWorkerRole').value.trim();
  if (!url || !role) return;
  workers.push({ url, role, status: 'unknown' });
  saveWorkers();
  renderWorkers();
  document.getElementById('worker-add-form').style.display = 'none';
  document.getElementById('newWorkerUrl').value = '';
  checkWorker(workers[workers.length - 1]).then(renderWorkers);
});
document.getElementById('btnImportV2').addEventListener('click', () => {
  const v2w = JSON.parse(localStorage.getItem('reactive_workers') || '[]');
  if (!v2w.length) return;
  const existing = new Set(workers.map(w => w.url + ':' + w.role));
  let added = 0;
  for (const w of v2w) {
    if (!existing.has(w.url + ':' + w.role)) {
      workers.push({ url: w.url, role: w.role, status: 'unknown' });
      added++;
    }
  }
  if (added) { saveWorkers(); renderWorkers(); workers.forEach(w => checkWorker(w).then(renderWorkers)); }
});

// ══════════════════════════════════════════════════════════
//  ASSEMBLY VM (client-side, for card rendering)
// ══════════════════════════════════════════════════════════
function asmTokenize(line) {
  const tokens = []; let i = 0;
  while (i < line.length) {
    if (line[i] === ' ' || line[i] === '\t' || line[i] === ',') { i++; continue; }
    if (line[i] === ';') break;
    if (line[i] === '"' || line[i] === "'") {
      const q = line[i]; i++; let s = '';
      while (i < line.length && line[i] !== q) { s += line[i]; i++; }
      if (i < line.length) i++;
      tokens.push(s);
    } else {
      let s = '';
      while (i < line.length && line[i] !== ' ' && line[i] !== '\t' && line[i] !== ',') { s += line[i]; i++; }
      tokens.push(s);
    }
  }
  return tokens;
}

function asmResolve(token, state) {
  if (token === '_') return undefined;
  if (token === 'true') return true;
  if (token === 'false') return false;
  if (token.startsWith('@')) {
    const parts = token.slice(1).split('.');
    let val = state[parts[0]];
    for (let i = 1; i < parts.length; i++) { if (val == null || typeof val !== 'object') return undefined; val = val[parts[i]]; }
    return val;
  }
  if (token.startsWith('+')) { const n = parseInt(token.slice(1)); return isNaN(n) ? token : n; }
  if (token.startsWith('{') || token.startsWith('[')) { try { return JSON.parse(token); } catch(_) {} }
  const n = Number(token); if (!isNaN(n) && token !== '') return n;
  return token;
}

function asmStore(state, ref, value) {
  if (!ref || ref === '_') return;
  const name = ref.startsWith('@') ? ref.slice(1) : ref;
  const parts = name.split('.');
  if (parts.length === 1) { state[parts[0]] = value; return; }
  let obj = state[parts[0]];
  if (obj == null || typeof obj !== 'object') { state[parts[0]] = {}; obj = state[parts[0]]; }
  for (let i = 1; i < parts.length - 1; i++) { if (obj[parts[i]] == null || typeof obj[parts[i]] !== 'object') obj[parts[i]] = {}; obj = obj[parts[i]]; }
  obj[parts[parts.length - 1]] = value;
}

// ── Render builtins: produce HTML from data ──
const _builtins = {
  get(a) { return a[0] != null ? a[0][a[1]] : undefined; },
  set(a) { if (a[0] != null) a[0][a[1]] = a[2]; },
  fmt(a) { let s = String(a[0] || ''); for (let i = 1; i < a.length; i++) s = s.replace(`{${i-1}}`, String(a[i] ?? '')); return s; },
  concat(a) { return String(a[0] ?? '') + String(a[1] ?? ''); },
  len(a) { return Array.isArray(a[0]) ? a[0].length : 0; },
  add(a) { return (+a[0] || 0) + (+a[1] || 0); },
  pluck(a) { return Array.isArray(a[0]) ? a[0].map(i => i != null ? i[a[1]] : undefined).filter(v => v != null) : []; },
  map_fmt(a) { const arr = a[0], tpl = String(a[1] || '{0}'); return Array.isArray(arr) ? arr.map(item => { let s = tpl; if (typeof item === 'object') { for (const [k,v] of Object.entries(item)) s = s.replace(`{${k}}`, String(v??'')); } else { s = s.replace('{0}', String(item??'')); } return s; }) : []; },
  default(a) { return a[0] != null && a[0] !== '' ? a[0] : a[1]; },
  keys(a) { return a[0] != null && typeof a[0] === 'object' ? Object.keys(a[0]) : []; },
  json(a) { try { return JSON.stringify(a[0], null, 2); } catch(_) { return String(a[0]); } },
  slice(a) { return Array.isArray(a[0]) ? a[0].slice(+a[1]||0, a[2]!=null?+a[2]:undefined) : String(a[0]||'').slice(+a[1]||0, a[2]!=null?+a[2]:undefined); },

  // HTML template builtins — produce component HTML
  tpl(a) {
    const type = a[0];
    switch (type) {
      case 'text': {
        const val = String(a[1] ?? ''), label = String(a[2] ?? '');
        const empty = val ? '' : ' empty';
        return `<div class="node-slot slot-text">
          <div class="slot-label">${esc(label)}</div>
          <textarea readonly class="esc${empty}">${esc(val)}</textarea>
        </div>`;
      }
      case 'list': {
        const items = a[1] || [], label = String(a[2] ?? ''), color = a[3] || '';
        if (!Array.isArray(items) || !items.length) return '';
        const colorStyle = color ? `color:var(--${color})` : '';
        return `<div class="node-slot">
          <div class="slot-list-hdr" style="${colorStyle}">&#9654; ${esc(label)} <span style="opacity:.5">${items.length}</span></div>
          <div class="slot-list-body open">${items.map(i => `<div class="slot-list-item" style="${colorStyle}">&#8226; ${esc(typeof i === 'string' ? i : i.text || i.title || i.name || JSON.stringify(i))}</div>`).join('')}</div>
        </div>`;
      }
      case 'tags': {
        const tags = a[1] || {};
        if (typeof tags !== 'object') return '';
        const keys = Array.isArray(tags) ? [] : Object.keys(tags);
        if (!keys.length) return '';
        return `<div class="node-slot slot-tags">${keys.map(k => `<span class="slot-tag">${esc(k)}: ${esc(String(tags[k]).slice(0,40))}</span>`).join('')}</div>`;
      }
      case 'badge': {
        const text = String(a[1] ?? ''), cls = a[2] || '';
        return `<span class="node-badge ${esc(cls)}">${esc(text)}</span>`;
      }
      case 'raw': return String(a[1] ?? '');
      default: return `<div class="node-slot">[unknown tpl: ${esc(type)}]</div>`;
    }
  },
  append(a) { return String(a[0] ?? '') + String(a[1] ?? ''); },
};

function execAsm(code, extraState) {
  if (!code || !code.trim()) return {};
  const state = { ...extraState };
  const lines = code.split('\n');
  const labels = {};
  for (let i = 0; i < lines.length; i++) { const l = lines[i].trim(); if (l.startsWith(':')) labels[l] = i; }
  let ip = 0; const max = lines.length * 50; let steps = 0;
  while (ip < lines.length && steps < max) {
    steps++;
    const line = lines[ip].trim();
    if (!line || line.startsWith(';') || line.startsWith(':') || line.startsWith('#')) { ip++; continue; }
    const tokens = asmTokenize(line);
    if (!tokens.length) { ip++; continue; }
    const op = tokens[0];
    if (op === 'MOV') { asmStore(state, tokens[1], asmResolve(tokens[2], state)); ip++; }
    else if (op === 'CALL') {
      const dst = tokens[1], fn = tokens[2], args = tokens.slice(3).map(t => asmResolve(t, state));
      const b = _builtins[fn];
      if (b) { const r = b(args); if (dst !== '_') asmStore(state, dst, r); }
      ip++;
    }
    else if (op === 'EACH') {
      const itemRef = tokens[1], list = asmResolve(tokens[2], state), bodyLen = asmResolve(tokens[3], state);
      if (Array.isArray(list) && bodyLen > 0) {
        const bodyCode = lines.slice(ip+1, ip+1+bodyLen).join('\n');
        for (let idx = 0; idx < list.length; idx++) {
          asmStore(state, itemRef, list[idx]);
          state['each_idx'] = idx;
          const sub = execAsm(bodyCode, state);
          Object.assign(state, sub);
        }
      }
      ip += 1 + (bodyLen || 0);
    }
    else if (op === 'CMP') {
      const cmpOp = tokens[2], a = asmResolve(tokens[3], state), b = asmResolve(tokens[4], state);
      let r = false;
      if (cmpOp === 'eq') r = a == b; else if (cmpOp === 'ne') r = a != b;
      else if (cmpOp === 'gt') r = a > b; else if (cmpOp === 'lt') r = a < b;
      asmStore(state, tokens[1], r); ip++;
    }
    else if (op === 'JIF') {
      const cond = asmResolve(tokens[1], state), target = tokens[2];
      if (cond) {
        if (target.startsWith(':') && labels[target] !== undefined) ip = labels[target];
        else ip += (typeof asmResolve(target, state) === 'number' ? asmResolve(target, state) : 1);
      } else { ip++; }
    }
    else { ip++; }
  }
  return state;
}

// ══════════════════════════════════════════════════════════
//  CARD RENDERING (assembly-driven)
// ══════════════════════════════════════════════════════════

// Default card render assembly — can be overridden per card type
const DEFAULT_CARD_ASM = `; default card renderer
CALL @_tags, tpl, "tags", @entity.tags
CALL @_text, tpl, "text", @entity.answer, "Result"
CALL @_html, append, @_tags, @_text
`;

let nodes = {};
try { nodes = JSON.parse(localStorage.getItem('v3_nodes') || '{}'); } catch(_) {}
function saveNodes() { localStorage.setItem('v3_nodes', JSON.stringify(nodes)); }

function renderCard(nd) {
  const asm = nd._renderAsm || DEFAULT_CARD_ASM;
  const result = execAsm(asm, { entity: nd });
  const bodyHtml = result._html || '';

  const div = document.createElement('div');
  div.className = 'node';
  div.dataset.nodeId = nd.id;

  const open = !nd.collapsed;
  div.innerHTML = `
    <div class="node-hdr" data-hdr="${nd.id}">
      <span style="font-size:9px;${open ? 'transform:rotate(90deg);' : ''}">&#9654;</span>
      <span class="node-icon">${esc(nd.icon || '#')}</span>
      <span class="node-title">${esc(nd.title)}</span>
      <span class="node-badge ${nd.status}">${esc(nd.status)}</span>
    </div>
    <div class="node-body${open ? ' open' : ''}" data-body="${nd.id}">${bodyHtml}</div>`;

  div.querySelector(`[data-hdr="${nd.id}"]`).addEventListener('click', () => {
    nd.collapsed = !nd.collapsed;
    saveNodes();
    renderCards();
  });
  return div;
}

function renderCards() {
  const panel = document.getElementById('cards-panel');
  panel.innerHTML = '';
  const roots = Object.values(nodes).filter(n => !n.parentId);
  if (!roots.length) {
    panel.innerHTML = '<div style="font-size:10px;color:var(--text-dim);">No cards yet. Run a v3 workflow.</div>';
  }
  for (const nd of roots) {
    panel.appendChild(renderCard(nd));
  }
  document.getElementById('cardCount').textContent = Object.keys(nodes).length + ' nodes';
}

// ══════════════════════════════════════════════════════════
//  V3 RUNTIME INTEGRATION
// ══════════════════════════════════════════════════════════
let _runId = null;
let _pollTimer = null;

async function runV3() {
  const yaml = document.getElementById('yamlEditor').value;
  const workerMap = buildWorkerMap();

  document.getElementById('runStatus').textContent = 'starting...';
  document.getElementById('statusDot').style.background = 'var(--accent)';
  document.getElementById('statusText').textContent = 'running';

  try {
    const res = await post('/api/workflow/v3/run', { yaml, workers: workerMap });
    if (res.error) {
      document.getElementById('runStatus').textContent = 'error: ' + res.error;
      document.getElementById('statusDot').style.background = 'var(--red)';
      return;
    }
    _runId = res.run_id;
    document.getElementById('runStatus').textContent = 'run: ' + _runId;
    startPolling();
  } catch (e) {
    document.getElementById('runStatus').textContent = 'failed: ' + e.message;
  }
}

function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(pollStatus, 500);
}

async function pollStatus() {
  if (!_runId) return;
  try {
    const status = await get(`/api/workflow/v3/status?run_id=${_runId}`);
    if (status.error) return;
    renderQueues(status.queues);
    renderEvents(status.events);
    renderState(status);
    updateCardsFromState(status);

    // Check if all done
    const allJobs = Object.values(status.jobs || {});
    const allDone = allJobs.length > 0 && allJobs.every(j => j.status === 'done' || j.status === 'failed' || j.status === 'cancelled');
    if (allDone) {
      clearInterval(_pollTimer);
      _pollTimer = null;
      document.getElementById('statusDot').style.background = 'var(--green)';
      document.getElementById('statusText').textContent = 'done';
    }
  } catch(_) {}
}

function renderQueues(queues) {
  const el = document.getElementById('queues-panel');
  if (!queues || !Object.keys(queues).length) {
    el.innerHTML = '<div style="font-size:10px;color:var(--text-dim);">No queues</div>';
    return;
  }
  let html = '';
  for (const [worker, jobs] of Object.entries(queues)) {
    html += `<div class="lane"><div class="lane-hdr">${esc(worker)}</div>`;
    for (const j of jobs) {
      html += `<span class="job-chip ${j.status}">${esc(j.id)}</span>`;
    }
    if (!jobs.length) html += `<span style="font-size:10px;color:var(--text-dim);">empty</span>`;
    html += `</div>`;
  }
  el.innerHTML = html;
}

function renderEvents(events) {
  const el = document.getElementById('events-panel');
  if (!events || !events.length) return;
  let html = '';
  for (const e of events) {
    const t = new Date(e.ts * 1000).toLocaleTimeString('en-GB', { hour12: false });
    html += `<div class="event-item"><span class="event-ts">${t}</span> <span class="event-type ${e.type}">${esc(e.type)}</span> ${esc(e.job_id)}</div>`;
  }
  el.innerHTML = html;
}

function renderState(status) {
  const el = document.getElementById('stateView');
  el.textContent = JSON.stringify({ state: status.state, jobs: status.jobs }, null, 2);
}

function updateCardsFromState(status) {
  // Create/update cards from job results
  let changed = false;
  for (const [jid, job] of Object.entries(status.jobs || {})) {
    if (!nodes[jid]) {
      nodes[jid] = {
        id: jid, title: jid, status: job.status,
        icon: job.status === 'done' ? 'J' : job.status === 'active' ? '>' : '?',
        answer: job.result || '',
        tags: { worker: job.worker, priority: job.priority },
        collapsed: false,
      };
      changed = true;
    } else {
      if (nodes[jid].status !== job.status) {
        nodes[jid].status = job.status;
        nodes[jid].icon = job.status === 'done' ? 'J' : job.status === 'active' ? '>' : '?';
        if (job.result) nodes[jid].answer = job.result;
        changed = true;
      }
    }
  }
  if (changed) { saveNodes(); renderCards(); }
}

// ══════════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['yaml', 'events', 'state'].forEach(t => {
      const el = document.getElementById('tab-' + t);
      if (el) el.style.display = t === btn.dataset.tab ? 'flex' : 'none';
    });
  });
});

// ══════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════
document.getElementById('btnRun').addEventListener('click', runV3);
document.getElementById('btnStop').addEventListener('click', () => {
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  document.getElementById('statusDot').style.background = 'var(--text-dim)';
  document.getElementById('statusText').textContent = 'stopped';
});

renderWorkers();
renderCards();
workers.forEach(w => checkWorker(w).then(renderWorkers));
</script>
</body>
</html>
